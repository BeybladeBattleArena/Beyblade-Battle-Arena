<style>
    /* UI Layers */
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    
    /* Round & Score UI */
    #hud-top { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; }
    
    /* Flex wrappers to arrange Stats cleanly without overlapping */
    .hud-side-wrapper { display: flex; flex-direction: column; gap: 5px; transition: 0.3s; }
    
    #round-info { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; border: 1px solid #444; }
    #round-text { font-size: 20px; font-weight: bold; color: #00ffff; }
    .score-container { display: flex; gap: 5px; margin-top: 5px; }
    .score-box { width: 15px; height: 15px; border: 2px solid #fff; border-radius: 3px; background: transparent; }
    .score-box.filled { background: #00ffff; box-shadow: 0 0 5px #00ffff; }
    .score-box.cpu-filled { background: #ff4400; box-shadow: 0 0 5px #ff4400; }
    
    /* Clean HTML Stat Displays - REPLACED WITH RADIAL HUDS */
    .hud-container {
        position: relative;
        width: 120px;
        height: 120px;
        background: radial-gradient(circle at center, #1a1a1a 0%, #0b0b0b 70%);
        border-radius: 50%;
        box-shadow: 0 0 15px rgba(0,0,0,0.9) inset;
        border: 2px solid #222;
        margin-top: 5px;
        transition: 0.3s;
    }

    .rpm-meter-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 0 2px rgba(255,255,255,0.2)); 
    }

    .hp-display {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        font-weight: 900;
        font-size: 20px;
        color: #fff;
        text-shadow: 2px 2px 0px #000;
        display: flex;
        align-items: baseline;
        gap: 2px;
    }

    .hp-current { transition: color 0.3s ease; }
    .hp-divider { font-size: 14px; color: #666; }
    .hp-max { font-size: 12px; color: #888; }

    .hp-label {
        position: absolute;
        top: 58%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 10px;
        color: #555;
        font-weight: 900;
        letter-spacing: 2px;
    }

    .rpm-display {
        position: absolute;
        bottom: 5px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        font-weight: 900;
        font-style: italic;
        font-size: 16px;
        letter-spacing: 1px;
        transition: color 0.1s, text-shadow 0.1s, box-shadow 0.3s;
        z-index: 10;
        background: rgba(0,0,0,0.6);
        padding: 2px 8px;
        border-radius: 4px;
        border: 1px solid #333;
    }
    .rpm-label { font-size: 8px; color: inherit; opacity: 0.8; }
    
    #match-timer { font-size: 30px; font-weight: 900; background: rgba(0,0,0,0.5); padding: 5px 20px; border-radius: 8px; border: 1px solid #444; height: 35px; }
    
    /* Joystick */
    #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; pointer-events: auto; }
    
    /* Skills Menu */
    #skills-menu { position: absolute; top: 220px; left: 15px; width: 160px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
    .skill-btn { position: relative; background: rgba(0, 150, 255, 0.8); border: 2px solid #fff; color: white; padding: 15px; font-weight: bold; border-radius: 4px; overflow: hidden; cursor: pointer; text-align: center; }
    .skill-btn.cooldown { background: #555; color: #aaa; }
    .cd-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: rgba(255,255,255,0.5); font-weight: 900; }
    
    /* Hotkey Badges */
    .hotkey-badge { position: absolute; top: 2px; left: 4px; font-size: 10px; color: #fff; background: rgba(0,0,0,0.6); padding: 2px 4px; border-radius: 3px; font-weight: bold; }

    /* Ultimate Button flows dynamically */
    #ultimate-btn { background: #443300; color: #888; font-weight: 900; padding: 15px; border: 3px solid #555; border-radius: 8px; pointer-events: none; transition: 0.3s; text-align: center; margin-top: 5px; }
    #ultimate-btn.ready { background: gold; color: black; border-color: white; pointer-events: auto; box-shadow: 0 0 15px gold; cursor: pointer; }
    
    /* Spirit Gauge */
    #spirit-gauge-container { position: absolute; bottom: 20px; left: 160px; right: 160px; height: 20px; background: #333; border: 2px solid #aaa; border-radius: 10px; overflow: hidden; }
    #spirit-fill { width: 0%; height: 100%; background: linear-gradient(90deg, cyan, blue); transition: width 0.1s linear; }

    /* Minigame Overlays - X4 SCALED LAUNCHER & RIPCORD */
    #minigame-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; pointer-events: auto; }
    #instruction-text { font-size: 18px; color: #00ffff; margin-bottom: 20px; text-align: center; padding: 0 20px; }
    #countdown-text { font-size: 60px; font-weight: 900; font-style: italic; color: white; text-shadow: 2px 2px 10px #ff0000; height: 80px; }
    
    #launcher-container { position: relative; width: 600px; height: 250px; margin-top: 20px; overflow: hidden; display: none; }
    #player-launcher-img { 
        position: absolute; 
        right: 40px; 
        top: -60px; 
        image-rendering: pixelated; 
        z-index: 10; 
        filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); 
        transform: scale(4); 
        transform-origin: top right; 
    }
    
    #target-arrow { position: absolute; right: 140px; top: -10px; color: #fff; font-size: 30px; font-weight: bold; z-index: 15; text-shadow: 0 2px 5px black; }
    
    #ripcord-wrapper { position: absolute; left: -300px; top: 120px; height: auto; z-index: 5; display: flex; align-items: center; } 
    #player-ripcord-img { image-rendering: pixelated; position: relative; z-index: 6; }
    
    .launch-zone { position: absolute; height: 140%; top: -20%; z-index: 4; border-radius: 4px; box-shadow: 0 0 10px inset rgba(255,255,255,0.5); }
    #zone-good { background: rgba(255, 165, 0, 0.8); }
    #zone-great { background: rgba(255, 0, 0, 0.9); }
    #zone-marvelous { background: rgba(0, 255, 255, 0.9); box-shadow: 0 0 15px cyan; display: none; z-index: 7;} 

    /* Post-Round Click Overlay */
    #next-round-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:90; flex-direction:column; justify-content:center; align-items:center; cursor: pointer; pointer-events: auto; backdrop-filter: blur(2px); }
    #round-winner-text { font-size: 60px; font-weight: 900; font-style: italic; color: #ffaa00; text-shadow: 2px 2px 10px #000; text-align: center; margin-bottom: 20px; }

    /* Match Result Splash */
    #splash-screen { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:100; flex-direction:column; justify-content:center; align-items:center; }
    #splash-title { font-size: 60px; font-weight: 900; font-style: italic; margin-bottom: 20px; text-align: center; }
    #splash-subtitle { font-size: 24px; color: #aaa; cursor: pointer; animation: blink 1.5s infinite; text-align: center; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* --- ARENA TUTORIAL VN OVERLAY --- */
    #arena-tutorial-vn {
        display: none; position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
        width: 80%; max-width: 800px; background: rgba(0, 0, 0, 0.85);
        border: 3px solid #00aaff; border-radius: 10px; padding: 20px; z-index: 100;
        box-shadow: 0 0 30px rgba(0, 170, 255, 0.5); pointer-events: auto; cursor: pointer;
    }
    #arena-tut-portrait { position: absolute; bottom: 100%; left: 20px; height: 180px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
    #arena-tut-name { color: #00aaff; font-weight: bold; font-size: 18px; margin-bottom: 10px; letter-spacing: 2px; }
    #arena-tut-text { color: white; font-size: 20px; line-height: 1.5; }
    #arena-tut-next { position: absolute; bottom: 10px; right: 20px; color: #ffaa00; font-size: 24px; font-weight: bold; animation: blink 1s infinite; }

    /* NEW: Balloon Tally */
    #balloon-tally {
        display: none; position: absolute; bottom: 20px; right: 30px; 
        color: #ff0044; font-size: 42px; font-style: italic; font-weight: 900; 
        -webkit-text-stroke: 2px white; filter: drop-shadow(2px 2px 4px #000); z-index: 100;
    }
</style>

<canvas id="gameCanvas" style="display: block; width: 100vw; height: 100vh;"></canvas>

<div id="balloon-tally">0 / 15</div>

    <img id="arena-tut-portrait" src="images/dialogue_portraits/Miko_Nanami.png" onerror="this.style.display='none'">

        <div style="font-size: 40px;">🔄</div>
        <div style="width: 200px; height: 15px; background: #333; border: 2px solid white; border-radius: 8px; margin: 10px auto; overflow: hidden;">
            <div id="grapple-meter" style="width: 0%; height: 100%; background: yellow;"></div>
        </div>

    <div id="joystick-zone"></div>

</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    function safeNum(val, fallback) {
        let num = parseFloat(val);
        return !isNaN(num) ? num : fallback;
    }
	
	// --- THE FIX: GLOBAL AUDIO KILLSWITCH ---
    window.stopArenaAudio = function() {
        if (playerBey && playerBey.spinSFX) { playerBey.spinSFX.pause(); playerBey.spinSFX = null; }
        if (cpuBey && cpuBey.spinSFX) { cpuBey.spinSFX.pause(); cpuBey.spinSFX = null; }
    };

    let matchStats = {
        playerScore: 0, cpuScore: 0, totalDamageDealt: 0, totalTimeElapsed: 0,
        roundsPlayed: 0, turnaboutsAchieved: 0, perfectRounds: 0, ultimateFinishes: 0
    };

    const playerBuild = window.ActiveBey || JSON.parse(localStorage.getItem('activeBey'));
    const savedCpuData = window.ActiveOpponent || JSON.parse(localStorage.getItem('activeOpponent'));
    
    if (!playerBuild || !savedCpuData) {
        window.navigateTo('home-menu.html');
        throw new Error("Missing Beyblade data! Aborting arena load and redirecting..."); 
    }

    const cpuData = window.opponentsDB ? window.opponentsDB.find(opp => opp.id === savedCpuData.id) || savedCpuData : savedCpuData;
    let arenaStyle = cpuData.arenaStyle || Math.floor(Math.random() * 3) + 1;

    document.getElementById('top-info-bar').style.display = 'none';

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let width = window.innerWidth;
    let height = window.innerHeight;
    canvas.width = width; canvas.height = height;

    window.addEventListener('resize', () => {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        if (gameState === "SELECT_LAUNCH") drawArena(); 
    });

    let gameState = "SELECT_LAUNCH"; 
    let p1Score = 0; let cpuScore = 0; let currentRound = 1;
    let matchTimerMs = 120000; 
    let p1Spirit = 0; 
    let playerLaunchSite = null;
    let cpuLaunchSite = null; 
    let playerStartRpmMod = 0.8;
    let activeSkills = []; 
    let playerUltimate = null;

    let roundConcluding = false;
    let roundConcludeTimer = 0;
    let battleStartTime = 0; 

    let hasMarvelousLaunch = false; 
    let ripcordPos = -300; 
    let ripcordAnimation;
    let ripcordData = null;
    
    let currentNativePixel = 0;
    const SCALE = 4;
    const READ_HEAD_OFFSET = 460; 

    let keys = { w: false, a: false, s: false, d: false, arrowup: false, arrowdown: false, arrowleft: false, arrowright: false };
    let joyX = 0, joyY = 0; let isJoystickActive = false;
    let mouseTarget = null;

    // --- NEW: Balloon System Tracking ---
    let activeBalloons = [];
    let balloonImg = new Image();
    balloonImg.src = 'images/beyblade_parts/arena_props/redballoon.png';

    // =========================================================
    // --- THE TUTORIAL MANAGER ENGINE (EXPANDED FOR COMBAT) ---
    // =========================================================
    window.TutorialManager = {
        isActive: window.ActiveTutorial === "basics" || window.ActiveTutorial === "combat",
        tutorialType: window.ActiveTutorial,
        phase: 0,
        launches: 0,
        accAngle: 0,
        lastAngle: null,
        
        // Combat Tracking
        combatPhase: 0,
        collisionsDone: 0,
        specialsDone: 0,
        balloonsPopped: 0,

        vnQueue: [],
        vnCallback: null,

        start: function() {
            document.getElementById('instruction-text').style.display = 'none'; 
            
            if (this.tutorialType === "basics") {
                document.getElementById('arena-tut-portrait').src = "images/dialogue_portraits/Miko_Nanami.png";
                document.getElementById('arena-tut-name').innerText = "Miko";
                this.showVN([
                    "Alright! First things first: The Launch!",
                    "You need a strong, steady pull to get good RPMs.",
                    "Try to tap when the arrow at the end of the launcher aligns with the Orange (Good) or Red (Great) sections!",
                    "Some Launchers and Ripcords may alter the spacing of these sections or provide even stronger launches, like Marvelous Launches!",
                    "Get 5 'Good' or better launches to prove you've got the hang of it!"
                ], () => {
                    document.getElementById('instruction-text').style.display = 'block';
                });
            } else if (this.tutorialType === "combat") {
                document.getElementById('arena-tut-portrait').src = "images/dialogue_portraits/Toma_Tsukishiro.png";
                document.getElementById('arena-tut-name').innerText = "Toma";
                this.showVN([
                    "Alright, check it: Launch your Bey into the stadium, and I'll do the same. At least two Bladers launch into the stadium at the exact same time to start a match.",
                    "A match is divided into multiple rounds, and when a Blader scores a point, the round is over. Points are scored in a few ways!",
                    "First, there's bursting your opponent's build wide open by reducing its HP to zero from physical combat. That's called a Burst Finish.",
                    "Second, there's using the force of your hit to send the opponent outside the stadium, either through wall pockets or up and over the wall itself. This results in a Knockout Finish. Keep in mind, accidentally derping yourself outside the stadium counts as a Knockout Finish too, <player>.",
                    "Third, and the most technical, if you ask me, is the Spin Finish! Outlast your opponent with sheer technical skill, mind games, and evasion until their Bey runs out of RPM and falls flat on its face.",
                    "Now launch your Bey and use your fighting spirit to make it collide with mine!"
                ], () => {
                    document.getElementById('instruction-text').innerText = "Launch your Beyblade into the stadium to face Toma!";
                    document.getElementById('instruction-text').style.display = 'block';
                });
            }
        },

        showVN: function(lines, callback) {
            this.vnQueue = lines;
            this.vnCallback = callback;
            this.advanceVN();
        },

        advanceVN: function() {
            const vnBox = document.getElementById('arena-tutorial-vn');
            if (this.vnQueue.length === 0) {
                vnBox.style.display = 'none';
                if (this.vnCallback) this.vnCallback();
                return;
            }
            vnBox.style.display = 'block';
            let line = this.vnQueue.shift();
            let coloredName = `<span style="color: #00aaff;">${window.PlayerData.accountName || "Rookie"}</span>`;
            document.getElementById('arena-tut-text').innerHTML = line.replaceAll("<player>", coloredName);
        },

        handleLaunch: function(rpmMod) {
            if (this.tutorialType === "combat") {
                // Toma's tutorial doesn't force 5 perfect launches, just let them in!
                this.combatPhase = 1;
                document.getElementById('minigame-overlay').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'block';
                startBattleEngine();
                gameState = "DROP_IN";
                return;
            }

            if (rpmMod >= 1.0) {
                this.launches++;
                if (this.launches >= 5) {
                    this.showVN([
                        "Five perfect launches! You're a natural!",
                        "Let's see how it behaves in the stadium."
                    ], () => {
                        this.phase = 2; 
                        document.getElementById('minigame-overlay').style.display = 'none';
                        document.getElementById('ui-layer').style.display = 'block';
                        startBattleEngine();
                        gameState = "DROP_IN";
                    });
                } else {
                    let praises = ["Nice one!", "Great pull!", "Looking good!", "Keep it up!"];
                    let praise = praises[Math.floor(Math.random() * praises.length)];
                    this.showVN([
                        `${praise} That's ${this.launches}/5 successful launches!`,
                        "Okay, here comes another one! Ready, <player>?"
                    ], () => {
                        resetRoundTutorial();
                    });
                }
            } else {
                this.showVN([
                    "Oof, that was a little weak. Make sure you hit those colored zones!",
                    "Let's try that one again."
                ], () => {
                    resetRoundTutorial();
                });
            }
        },

        registerCollision: function(wasSkillActive) {
            if (this.tutorialType !== "combat" || !this.isActive) return;

            if (this.combatPhase === 1) {
                this.combatPhase = 2;
                this.showVN([
                    "Nice, you've got the hang of it. Did you notice how, when the metal parts of our builds collided, they recoiled from one another?",
                    "This is because every combination of parts in your Bey's build adds weight to that build. Heavier Beys take less knockback from a collision than lighter Beys.",
                    "The speed of each Bey at the time of impact is also important. Speed is affected by a few parts in your build, including your Attack Ring, Spin Gear, and whatever tip your build is sporting.",
                    "Why don't you come hit me 5 times to see how the collisions interact?"
                ], () => {
                    this.combatPhase = 3;
                    this.collisionsDone = 0;
                });
            } else if (this.combatPhase === 3) {
                this.collisionsDone++;
                if (this.collisionsDone >= 5) {
                    this.combatPhase = 4;
                    
                    const skillsUI = document.getElementById('skills-menu');
                    skillsUI.style.boxShadow = "0 0 30px gold";
                    
                    this.showVN([
                        "Cool! Next up: special attacks! See those special attacks listed there?",
                        "Those are what your build can do when you concentrate your power into a single attack! These types of attacks can turn the tide of battle one way or the other. Once you use one, though, it'll temporarily go on a cooldown.",
                        "Try hitting me with a special attack 3 times to see how they work!"
                    ], () => {
                        skillsUI.style.boxShadow = "none";
                        this.combatPhase = 5;
                        this.specialsDone = 0;
                    });
                }
            } else if (this.combatPhase === 5 && wasSkillActive) {
                this.specialsDone++;
                if (this.specialsDone >= 3) {
                    this.combatPhase = 6;
                    this.showVN([
                        "Great job. Okay, let's relaunch, I wanna try something."
                    ], () => {
                        triggerTutorialRelaunch();
                        this.combatPhase = 7;
                        this.showVN([
                            "I'm gonna make my Bey move around the stadium, next. Come hit me 3 times, any way you want!"
                        ], () => {
                            document.getElementById('instruction-text').style.display = 'block';
                            document.getElementById('instruction-text').innerText = "Launch to catch Toma!";
                        });
                    });
                }
            } else if (this.combatPhase === 8) {
                this.collisionsDone++;
                if (this.collisionsDone >= 3) {
                    this.combatPhase = 9;
                    cpuBey.isGhost = true; // Remove Toma!
                    cpuBey.x = -999;
                    
                    this.showVN([
                        "Hey, champ-in-the-making! You're getting pretty good at this.",
                        "I've pumped up a few balloon targets for you to pop! Let's say... 15 balloons total. Go ahead and pop 'em.",
                        "But watch yourself, I switched the stadium style on you! Now you've got some openings in the stadium walls to watch out for while you shred the red menace!"
                    ], () => {
                        arenaStyle = 1; // CHANGE TO DANGER POCKETS!
                        this.combatPhase = 10;
                        document.getElementById('balloon-tally').style.display = 'block';
                        this.spawnBalloons(1);
                    });
                }
            }
        },

        spawnBalloons: function(wave) {
            activeBalloons = [];
            const cx = width / 2; const cy = height / 2;
            const maxR = Math.min(width, height) / 2 * 0.9;
            
            if (wave === 1) {
                activeBalloons.push({ x: cx, y: cy, baseZ: 15 });
                activeBalloons.push({ x: cx - 60, y: cy - 60, baseZ: 15 });
                activeBalloons.push({ x: cx + 60, y: cy - 60, baseZ: 15 });
                activeBalloons.push({ x: cx - 60, y: cy + 60, baseZ: 15 });
                activeBalloons.push({ x: cx + 60, y: cy + 60, baseZ: 15 });
            } else if (wave === 2) {
                let pR = maxR * 0.85; 
                activeBalloons.push({ x: cx + Math.cos(-Math.PI/2)*pR, y: cy + Math.sin(-Math.PI/2)*pR, baseZ: 15 });
                activeBalloons.push({ x: cx + Math.cos(Math.PI/4)*pR, y: cy + Math.sin(Math.PI/4)*pR, baseZ: 15 });
                activeBalloons.push({ x: cx + Math.cos(3*Math.PI/4)*pR, y: cy + Math.sin(3*Math.PI/4)*pR, baseZ: 15 });
                let highR = maxR * 0.65;
                activeBalloons.push({ x: cx + Math.cos(Math.PI)*highR, y: cy + Math.sin(Math.PI)*highR, baseZ: 15 });
                activeBalloons.push({ x: cx + Math.cos(0)*highR, y: cy + Math.sin(0)*highR, baseZ: 15 });
            } else if (wave === 3) {
                for (let i=0; i<5; i++) {
                    activeBalloons.push({ angle: (i/5)*Math.PI*2, radius: maxR * 0.75, baseZ: 15, isMoving: true });
                }
            }
        },

		checkBalloons: function() {
            if (activeBalloons.length === 0) {
                if (this.balloonsPopped === 5) this.spawnBalloons(2);
                else if (this.balloonsPopped === 10) this.spawnBalloons(3);
                else if (this.balloonsPopped >= 15) {
                    this.combatPhase = 99; // DONE!
                    document.getElementById('ui-layer').style.pointerEvents = 'none'; // Take away control
                    
                    // --- THE FIX: KILL THE AUDIO BEFORE LEAVING ---
                    if (playerBey && playerBey.spinSFX) { playerBey.spinSFX.pause(); playerBey.spinSFX = null; }
                    if (cpuBey && cpuBey.spinSFX) { cpuBey.spinSFX.pause(); cpuBey.spinSFX = null; }

                    setTimeout(() => {
                        window.navigateTo('adventure.html');
                    }, 2000);
                }
            }
        },

        update: function(dt, bey, cx, cy) {
            if (!this.isActive || !bey || bey.currentRpm <= 0) return;

            // Unlimited Spin during tutorials
            bey.currentRpm = bey.maxRpm;
            
            if (this.tutorialType === "combat") {
                if (this.combatPhase === 7 && gameState === "BATTLE") {
                    this.combatPhase = 8;
                    this.collisionsDone = 0;
                }
                
                // Handle Wave 3 Moving Balloons
                if (this.combatPhase === 10) {
                    activeBalloons.forEach(b => {
                        if (b.isMoving) {
                            b.angle += 0.01;
                            let wobbleR = b.radius + Math.sin(performance.now()*0.002)*30; // Move up and down walls
                            b.x = cx + Math.cos(b.angle) * wobbleR;
                            b.y = cy + Math.sin(b.angle) * wobbleR;
                        }
                    });
                }
                return;
            }

            // --- MIKO'S BASICS TUTORIAL ---
            if (this.phase === 2) {
                this.phase = 2.5;
                setTimeout(() => {
                    this.showVN([
                        "Look at it go! Notice how the Beyblade has its own movement properties?",
                        "This is based on how you build your kit!",
                        "Build one way or another to change inherent movement properties, like changing to a different tip to increase friction with the stadium floor, or switching to a wider weight disk to try to increase spin time!",
                        "There are tons of possibilities!"
                    ], () => {
                        this.phase = 3;
                    });
                }, 3000);
            }

            if (this.phase === 3) {
                this.phase = 3.5;
                const rpmUI = document.getElementById('p1-rpm-wrapper');
                rpmUI.style.boxShadow = "0 0 20px gold";
                rpmUI.style.transform = "translateX(-50%) scale(1.2)";
                
                this.showVN([
                    "Take a look at your RPM meter. This represents a Beyblade's remaining spin time.",
                    "I set up a lot of portable fans around the arena so your Beyblade has plenty of extra spin right now!",
                    "Don't question it."
                ], () => {
                    rpmUI.style.boxShadow = "";
                    rpmUI.style.transform = "translateX(-50%) scale(1)";
                    this.phase = 4;
                });
            }

            if (this.phase === 4) {
                this.phase = 4.5;
                const hpUI = document.querySelector('.hud-container');
                hpUI.style.boxShadow = "0 0 30px gold inset";
                
                this.showVN([
                    "Now look at your Bey's HP. This represents a beyblade's durability in battle.",
                    "Running out of HP means your build is likely to burst apart.",
                    "Talk about a terrible way to lose. First they beat you, then you gotta pick up the pieces and go home.",
                    "But that's why we leave nothing to chance! Craft the best build you possibly can for any occasion!",
                    "And once your Bey hits the stadium, use your fighting spirit to move it! (Or your WASD keys, your arrow keys, or the virtual joystick. Your call.)",
                    "Give it a try! Make 3 Clockwise laps around the stadium basin."
                ], () => {
                    hpUI.style.boxShadow = "0 0 15px rgba(0,0,0,0.9) inset";
                    this.phase = 5;
                    this.lastAngle = Math.atan2(bey.y - cy, bey.x - cx);
                    this.accAngle = 0;
                });
            }

            if (this.phase === 5 || this.phase === 6) {
                let currentAngle = Math.atan2(bey.y - cy, bey.x - cx);
                if (this.lastAngle !== null) {
                    let delta = currentAngle - this.lastAngle;
                    if (delta > Math.PI) delta -= Math.PI * 2;
                    if (delta < -Math.PI) delta += Math.PI * 2;
                    this.accAngle += delta;
                }
                this.lastAngle = currentAngle;

                if (this.phase === 5 && this.accAngle >= Math.PI * 2 * 3) {
                    this.phase = 5.5;
                    this.showVN([
                        "Awesome! You've got the hang of it.",
                        "There's something so soulful and fulfilling about the connection between an instrument and its wielder.",
                        "Now, if you think you're all that, make 3 Counter-Clockwise laps around the stadium basin!"
                    ], () => {
                        this.phase = 6;
                        this.accAngle = 0;
                        this.lastAngle = Math.atan2(bey.y - cy, bey.x - cx);
                    });
                }

                if (this.phase === 6 && this.accAngle <= -Math.PI * 2 * 3) {
                    this.phase = 7;
                    this.showVN([
                        "Perfect control!",
                        "Now you're ready to learn the specifics of battle!"
                    ], () => {
                        window.ActiveTutorial = null;
                        if (playerBey && playerBey.spinSFX) {
                            playerBey.spinSFX.pause(); playerBey.spinSFX = null;
                        }
                        window.navigateTo('adventure.html');
                    });
                }
            }
        }
    };

    function handleTouchJoy(e) { 
        e.preventDefault(); 
        if(roundConcluding) return; 
        
        let touch = e.touches ? e.touches[0] : e; 
        let rect = joyZone.getBoundingClientRect(); 
        let dx = touch.clientX - (rect.left + rect.width/2); 
        let dy = touch.clientY - (rect.top + rect.height/2); 
        let maxDist = rect.width/2; 
        let dist = Math.sqrt(dx*dx + dy*dy); 
        if (dist > maxDist) { dx = (dx/dist)*maxDist; dy = (dy/dist)*maxDist; } 
        joyX = dx/maxDist; joyY = dy/maxDist; 
    }
    joyZone.addEventListener('touchstart', (e) => { isJoystickActive = true; handleTouchJoy(e); }, {passive: false});
    joyZone.addEventListener('touchmove', handleTouchJoy, {passive: false});

    function resolveImageUrl(partData, category) {
        if (!partData) return '';
        let partObj = partData;
        if (typeof partData === 'string' && window.equipmentDB && window.equipmentDB[category]) {
            partObj = window.equipmentDB[category].find(p => p.id === partData);
        }
        if (!partObj) return '';
        if (partObj.activeStyle && partObj.activeStyle.topDownImage) return partObj.activeStyle.topDownImage;
        if (partObj.styles && partObj.styles.length > 0 && partObj.styles[0].topDownImage) return partObj.styles[0].topDownImage;
        return partObj.topDownImage || partObj.fallbackImage || partObj.image || '';
    }

    function resolvePartImageObj(partData, category) {
        let url = resolveImageUrl(partData, category);
        if (url) { let img = new Image(); img.src = url; return img; }

    }

    function drawArena() {
        ctx.clearRect(0, 0, width, height);
        const cx = width / 2; const cy = height / 2;
        const maxRadius = Math.min(width, height) / 2 * 0.9; 

        ctx.beginPath(); ctx.arc(cx, cy, maxRadius, 0, Math.PI * 2); ctx.fillStyle = '#222'; ctx.fill(); ctx.lineWidth = 10; ctx.strokeStyle = '#555'; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, maxRadius * 0.65, 0, Math.PI * 2); ctx.fillStyle = '#2a2a2a'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#444'; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, maxRadius * 0.3, 0, Math.PI * 2); ctx.fillStyle = '#333'; ctx.fill(); ctx.stroke();

        ctx.strokeStyle = '#111'; 
        ctx.lineWidth = 12;
        if (arenaStyle === 1) {
            ctx.beginPath(); ctx.arc(cx, cy, maxRadius, -Math.PI/2 - 0.2, -Math.PI/2 + 0.2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, maxRadius, Math.PI/4 - 0.2, Math.PI/4 + 0.2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, maxRadius, 3*Math.PI/4 - 0.2, 3*Math.PI/4 + 0.2); ctx.stroke();
        } else if (arenaStyle === 2) {
            ctx.beginPath(); ctx.arc(cx, cy, maxRadius, -0.4, 0.4); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, maxRadius, Math.PI - 0.4, Math.PI + 0.4); ctx.stroke();
        }

        if (gameState === "SELECT_LAUNCH") {
            ctx.fillStyle = "rgba(0, 255, 0, 0.1)"; ctx.fillRect(0, 0, width * 0.425, height); 
            
            if (!cpuLaunchSite && !TutorialManager.isActive) {
                let r = Math.random() * (maxRadius * 0.5); 
                let theta = (Math.random() - 0.5) * Math.PI; 
                cpuLaunchSite = {
                    x: cx + (maxRadius * 0.25) + Math.cos(theta) * r,
                    y: cy + Math.sin(theta) * r
                };
            }

            if (cpuLaunchSite && !TutorialManager.isActive) {
                ctx.beginPath(); ctx.ellipse(cpuLaunchSite.x, cpuLaunchSite.y, 25, 10, 0, 0, Math.PI * 2); 
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fill();
            }

            if (playerLaunchSite) {
                ctx.beginPath(); ctx.ellipse(playerLaunchSite.x, playerLaunchSite.y, 25, 10, 0, 0, Math.PI * 2); 
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fill();
                
                ctx.beginPath(); ctx.arc(playerLaunchSite.x, playerLaunchSite.y, 4, 0, Math.PI * 2); 
                ctx.fillStyle = '#ff0000'; ctx.fill();
            }
        }
    }

    // --- THE REAL FIX: BULLETPROOF STAT CALCULATOR ---
    function calculateStats(build) {
        // Start at ZERO so we don't artificially mega-buff the Beyblades!
        let totals = { hp: 0, rpm: 0, attack: 0, defense: 0, stamina: 0, speed: 0, weight: 0, grip: 0, mobility: 0, recoil: 0, recoilReduction: 0, endurance: 0, balance: 0, spiritCharge: 0, cdr: 0 };
        
        if (build && build.stats) {
            for (let key in build.stats) {
                let val = parseFloat(build.stats[key]);
                if (!isNaN(val)) totals[key] = val;
            }
            if (build.stats.spin && !build.stats.rpm) {

    function generateRadialHUDs() {
        const p1Svg = document.getElementById('p1-rpm-meter');
        const cpuSvg = document.getElementById('cpu-rpm-meter');
        p1Svg.innerHTML = ''; cpuSvg.innerHTML = '';
        p1Segments = []; cpuSegments = [];

        const RADIUS = 46; 
        const CX = 60; const CY = 60; 

        function createSegment(cx, cy, radius, length, thickness, angleRad, color) {
            let innerR = radius - length / 2; let outerR = radius + length / 2;
            let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", cx + innerR * Math.cos(angleRad)); line.setAttribute("y1", cy + innerR * Math.sin(angleRad));
            line.setAttribute("x2", cx + outerR * Math.cos(angleRad)); line.setAttribute("y2", cy + outerR * Math.sin(angleRad));
            line.setAttribute("stroke-width", thickness); line.setAttribute("stroke-linecap", "butt"); line.setAttribute("stroke", color);
            return line;
        }

        for (let i = 0; i < NUM_HUD_SEGMENTS; i++) {
            let progress = i / (NUM_HUD_SEGMENTS - 1);
            let length = 4 + (progress * 14); let thickness = 2 + (progress * 5);
            let hue = progress * 120; let color = `hsl(${hue}, 100%, 50%)`;

            let p1Angle = 135 - (progress * 270);
            let line1 = createSegment(CX, CY, RADIUS, length, thickness, p1Angle * (Math.PI / 180), color);
            p1Svg.appendChild(line1);
            p1Segments.push({ element: line1, threshold: (i + 1) / NUM_HUD_SEGMENTS });

            let cpuAngle = 45 + (progress * 270);
            let line2 = createSegment(CX, CY, RADIUS, length, thickness, cpuAngle * (Math.PI / 180), color);
            cpuSvg.appendChild(line2);
            cpuSegments.push({ element: line2, threshold: (i + 1) / NUM_HUD_SEGMENTS });
        }
    }

    const wCenter = windSpriteSize / 2;
    const wBaseRadius = 100;
    const wSegments = 20;
    const wStep = (Math.PI * 1.5) / wSegments; 
    
    for (let i = 0; i < wSegments; i++) {
        let a1 = i * wStep; let a2 = (i + 1) * wStep + 0.1;
        let alpha = Math.sin((i / (wSegments - 1)) * Math.PI);
        wCtx.beginPath(); wCtx.arc(wCenter, wCenter, wBaseRadius, a1, a2);
        wCtx.strokeStyle = `rgba(210, 240, 255, ${alpha})`; 
        wCtx.lineWidth = 2; wCtx.lineCap = "round";
        wCtx.shadowBlur = 4; wCtx.shadowColor = "rgba(210, 240, 255, 0.8)";

    function updateDropIn(dt) {
        function dropBey(bey) {
            if (!bey || bey.isGhost || bey.isLanded) return;
            
            bey.vz -= 0.05 * dt; 
            bey.z += bey.vz * (dt * 0.05);

            let spinSpeed = (bey.currentRpm * dt) / 25000; 
            
            // --- WAGON-WHEEL EFFECT PREVENTION ---
            if (spinSpeed > 0.8) spinSpeed = 0.8 + (spinSpeed * 0.01);
            bey.rotation += spinSpeed * bey.spinDir;

            if (bey.z <= 0) {
                
                let rawMaterial = (bey.tipType || "plastic").toLowerCase();
                let safeMaterial = "plastic"; 
                
                if (rawMaterial.includes("rubber")) safeMaterial = "rubber";
                else if (rawMaterial.includes("metal")) safeMaterial = "metal";
                else if (rawMaterial.includes("ball") || rawMaterial.includes("bearing")) safeMaterial = "ballbearing";
                else if (rawMaterial.includes("plastic")) safeMaterial = "plastic";

                let snd = new Audio(`audio/sounds/bounce_landing_${safeMaterial}.wav`);
                
                snd.volume = Math.max(0.02, 0.4 * Math.pow(0.5, bey.bounceCount)); 
                
                let w = parseFloat(bey.stats.weight) || 35; 
                let rate = 1.0;
                if (w <= 55) rate = 1.02;
                else if (w <= 62) rate = 1.01;
                else if (w <= 69) rate = 1.0;
                else if (w <= 75) rate = 0.99;
                else rate = 0.98;

                snd.preservesPitch = false; 
                snd.mozPreservesPitch = false;
                snd.playbackRate = rate;
                snd.play().catch(e => {});

                let bm = 0.4; 
                if (safeMaterial === "rubber") bm = 0.60; 
                else if (safeMaterial === "plastic") bm = 0.40; 
                else if (safeMaterial === "metal" || safeMaterial === "ballbearing") bm = 0.30; 
                
                if (bey.tipShape === "Flat") bm *= 0.85; 
                if (bey.tipShape === "Sharp") bm *= 1.15; 

                let weightFactor = Math.max(0.5, 1 - ((w - 30) / 100)); 
                bm *= weightFactor;

                bey.vz = Math.abs(bey.vz) * bm;
                bey.bounceCount++;

                if (bey.vz < 2.0) {
                    bey.isLanded = true;
                    bey.z = 0;
                    bey.vz = 0;
                    bey.x = bey.targetX; 
                    bey.y = bey.targetY;
                }
            }
        }
        
        dropBey(playerBey);
        dropBey(cpuBey);
        
        if ((!playerBey || playerBey.isLanded) && (!cpuBey || cpuBey.isLanded)) {
            gameState = "BATTLE";
            battleStartTime = Date.now();
            
            if (playerBey && !playerBey.isGhost) initSpin(playerBey);
            if (cpuBey && !cpuBey.isGhost) initSpin(cpuBey);
        }
    }

    function updatePhysics(dt) {
        let inputX = 0; let inputY = 0;
        
        if (roundConcluding) {
            joyX = 0; joyY = 0;
        } else {
            if (keys.a || keys.arrowleft) inputX -= 1;
            if (keys.d || keys.arrowright) inputX += 1;
            if (keys.w || keys.arrowup) inputY -= 1;
            if (keys.s || keys.arrowdown) inputY += 1;

            if (inputX !== 0 || inputY !== 0) {
                let dist = Math.sqrt(inputX*inputX + inputY*inputY);
                joyX = inputX/dist; joyY = inputY/dist; 
            } else if (mouseTarget && gameState === "BATTLE") {
                let dx = mouseTarget.x - playerBey.x;
                let dy = mouseTarget.y - playerBey.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 15) { joyX = dx/dist; joyY = dy/dist; } 
                else { joyX = 0; joyY = 0; } 
            } else if (!isJoystickActive) {
                joyX = 0; joyY = 0;
            }
        }

        if (window.SkillEngine) window.SkillEngine.update(dt, playerBey, cpuBey, joyX, joyY);
        if (cpuBey && cpuBey.activeAttacks) cpuBey.activeAttacks.forEach(atk => { if (atk.currentCd > 0) atk.currentCd -= dt; });
        if (cpuBey && matchTimerMs <= 60000) { cpuBey.spirit += (0.002 * dt) * (1 + ((cpuBey.stats.spiritCharge||0)/100)); }
        if (cpuBey) cpuBey.spirit = Math.min(100, cpuBey.spirit);

        if (cpuData.aiScript && window.SkillEngine && cpuBey && !cpuBey.isBursted && !roundConcluding && !cpuBey.isGhost) { 
            // --- TOMA'S TUTORIAL OVERRIDE AI ---
            if (window.ActiveTutorial === "combat") {
                const cx = width / 2; const cy = height / 2;
                if (TutorialManager.combatPhase < 6) {
                    // Pull to center smoothly
                    let cdx = cx - cpuBey.x; let cdy = cy - cpuBey.y;
                    cpuBey.vx += cdx * 0.0015; cpuBey.vy += cdy * 0.0015;
                } else if (TutorialManager.combatPhase >= 7 && TutorialManager.combatPhase < 9) {
                    // Circle the basin
                    let cdx = cx - cpuBey.x; let cdy = cy - cpuBey.y;
                    let angle = Math.atan2(cdy, cdx) + (Math.PI / 2); 
                    cpuBey.vx += Math.cos(angle) * 0.06;
                    cpuBey.vy += Math.sin(angle) * 0.06;
                    cpuBey.vx += cdx * 0.0005; cpuBey.vy += cdy * 0.0005; // Keep him from flying out
                }
            } else {
                cpuData.aiScript(cpuBey, playerBey, window.SkillEngine); 
            }
        }
        
        const cx = width / 2; const cy = height / 2; const maxRadius = Math.min(width, height) / 2 * 0.9;
        const basinRadius = maxRadius * 0.3; const rampRadius = maxRadius * 0.65;

        TutorialManager.update(dt, playerBey, cx, cy);

        // --- BALLOON COLLISION LOGIC ---
        if (activeBalloons.length > 0 && playerBey.z <= 0 && !playerBey.isBursted) {
            for (let i = activeBalloons.length - 1; i >= 0; i--) {
                let b = activeBalloons[i];
                let bDist = Math.sqrt((playerBey.x - b.x)**2 + (playerBey.y - b.y)**2);
                if (bDist < playerBey.radius + 35) { 
                    activeBalloons.splice(i, 1);
                    TutorialManager.balloonsPopped++;
                    document.getElementById('balloon-tally').innerText = `${TutorialManager.balloonsPopped} / 15`;
                    
                    let popSfx = new Audio('audio/sounds/balloonpop.wav');
                    popSfx.volume = 0.5; popSfx.play().catch(e=>{});
                    
                    let colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'];
                    for(let p=0; p<15; p++) {
                        let ang = Math.random() * Math.PI*2; let spd = Math.random()*5+2;
                        particles.push({x: b.x, y: b.y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, life: 1.0, decay: 0.05, color: colors[Math.floor(Math.random()*colors.length)], size: 3});
                    }
                    TutorialManager.checkBalloons();
                }
            }
        }

        function processBey(bey, isPlayer) {
            if (!bey || bey.isBursted) return;

			if (bey.activeAuraDuration > 0) {
                bey.activeAuraDuration -= dt;
                if (bey.activeAuraDuration <= 0) {
                    bey.activeAura = null; 
                    bey.tempRecoilReduction = 0; 
                    bey.tempDefense = 0; 
                    bey.tempAttack = 0; 
                    bey.tempWeight = 0; 
                    bey.tempSpeed = 0; 
                    bey.tempGrip = 0; 
                    bey.tempStamina = 0; 
                    bey.tempEndurance = 0; 
                }
            }

            if (bey.spinSFX) {
                if (bey.spinSFX.duration && bey.spinSFX.currentTime >= bey.spinSFX.duration - 0.08) {
                    bey.spinSFX.currentTime = 0.20382;
                    if (bey.spinSFX.paused) bey.spinSFX.play().catch(e=>console.log(e));
                }

                let rpmRatio = bey.maxRpm > 0 ? bey.currentRpm / bey.maxRpm : 0;
                let targetVolume = 0;
                const maxVolume = 0.15;

                if (bey.isBursted || bey.ringOut || bey.currentRpm <= 0) {
                    targetVolume = 0;
                } else if (rpmRatio >= 0.50) {
                    targetVolume = maxVolume; 
                } else if (rpmRatio > 0.35) {
                    targetVolume = maxVolume * ((rpmRatio - 0.35) / 0.15);
                }

                bey.spinSFX.volume = Math.max(0, Math.min(maxVolume, targetVolume));
                
                if (targetVolume === 0 && !bey.spinSFX.paused) {
                    bey.spinSFX.pause();
                } else if (targetVolume > 0 && bey.spinSFX.paused) {
                    bey.spinSFX.play().catch(e=>console.log(e));
                }
            }
            
            let speedStat = safeNum(bey.stats.speed, 0) + safeNum(bey.tempSpeed, 0); 
            let gripStat = safeNum(bey.stats.grip, 0) + safeNum(bey.tempGrip, 0); 
            let staminaStat = safeNum(bey.stats.stamina, 0) + safeNum(bey.tempStamina, 0);
            
            let rpmRatio = bey.currentRpm / bey.maxRpm;
            let balanceStat = safeNum(bey.stats.balance, 0); 
            bey.wobbleFactor = rpmRatio > 0.45 ? 0 : (1.0 - (rpmRatio / 0.45)) * (1 - Math.min(0.8, balanceStat * 0.005));

            if (bey.currentRpm > 0) {
                let spinSpeed = (bey.currentRpm * dt) / 25000; 
                if (spinSpeed > 0.8) spinSpeed = 0.8 + (spinSpeed * 0.01);
                bey.rotation += spinSpeed * bey.spinDir;
            }

            let dxCenter = cx - bey.x; let dyCenter = cy - bey.y;
            if (dxCenter === 0 && dyCenter === 0) { dxCenter = 0.1; dyCenter = 0.1; }
            let distFromCenter = Math.max(1, Math.sqrt(dxCenter**2 + dyCenter**2));
            
            let dirToCenterX = dxCenter / distFromCenter; 
            let dirToCenterY = dyCenter / distFromCenter;
            
            let autoX = 0; let autoY = 0;

            if (bey.tipShape === "Sharp") {
                autoX = dirToCenterX; autoY = dirToCenterY;
            } else if (bey.tipShape === "Flat") {
                autoX = -dirToCenterY * bey.spinDir; autoY = dirToCenterX * bey.spinDir;
            } else {
                autoX = (dirToCenterX * 0.5) + (-dirToCenterY * bey.spinDir * 0.5);
                autoY = (dirToCenterY * 0.5) + (dirToCenterX * bey.spinDir * 0.5);
            }

            let moveSpeed = speedStat * 0.00425; 
            let accelX = 0; let accelY = 0;

            if (bey.currentRpm > 0) {
                if (isPlayer) {
                    let controlWeight = Math.min(0.95, Math.max(0.1, 0.60 + (safeNum(bey.stats.mobility, 0) * 0.03)));
                    if (joyX === 0 && joyY === 0) controlWeight = 0; 

                    let autoWeight = 1.0 - controlWeight;
                    let finalDirX = (joyX * controlWeight) + (autoX * autoWeight);
                    let finalDirY = (joyY * controlWeight) + (autoY * autoWeight);
                    
                    let finalDist = Math.max(0.01, Math.sqrt(finalDirX**2 + finalDirY**2));
                    accelX = (finalDirX / finalDist) * moveSpeed; 
                    accelY = (finalDirY / finalDist) * moveSpeed;
                } else {
                    let dx = playerBey.x - bey.x; let dy = playerBey.y - bey.y; 
                    let d = Math.max(1, Math.sqrt(dx*dx + dy*dy)); 
                    accelX = (dx / d) * moveSpeed; accelY = (dy / d) * moveSpeed;
                }
                
                bey.vx += accelX; bey.vy += accelY;

                if (distFromCenter > basinRadius && distFromCenter <= rampRadius) { bey.vx += dirToCenterX * 0.017; bey.vy += dirToCenterY * 0.017; } 
                else if (distFromCenter > rampRadius) { bey.vx += dirToCenterX * 0.068; bey.vy += dirToCenterY * 0.068; }
            }

            let friction = 0.99 - (gripStat * 0.0002) - (bey.wobbleFactor * 0.02); 
            if (bey.currentRpm <= 0) friction *= 0.90; 

            bey.vx *= friction; bey.vy *= friction;
            bey.x += bey.vx; bey.y += bey.vy;

            let newDist = Math.sqrt((bey.x - cx)**2 + (bey.y - cy)**2);
            
            if (newDist + bey.radius > maxRadius) {
                let hitGap = false;
                
                if (bey.z <= 0 && gameState === "BATTLE" && Date.now() - battleStartTime > 500) {
                    let angle = Math.atan2(bey.y - cy, bey.x - cx);
                    if (angle < 0) angle += Math.PI * 2; 
                    
                    if (arenaStyle === 1) { 
                        if ((angle > 4.5 && angle < 4.9) || (angle > 0.5 && angle < 1.0) || (angle > 2.1 && angle < 2.6)) hitGap = true;
                    } else if (arenaStyle === 2) { 
                        if ((angle > 5.8 || angle < 0.5) || (angle > 2.7 && angle < 3.5)) hitGap = true;
                    }
                }

                if (hitGap) {
                    bey.currentHp = 0; 
                    bey.ringOut = true;
                    
                    // --- TUTORIAL RELAUNCH CHECK ---
                    if (isPlayer && TutorialManager.isActive && TutorialManager.tutorialType === "combat") {
                        if (TutorialManager.combatPhase >= 10 && !TutorialManager.relaunching) {
                            TutorialManager.relaunching = true;
                            TutorialManager.showVN([
                                "Don't sweat it, it happens. Get back in there, dude!"
                            ], () => {
                                TutorialManager.relaunching = false;
                                triggerTutorialRelaunch();
                            });
                        }
                    }

                } else {
                    bey.x = cx - dirToCenterX * (maxRadius - bey.radius); 
                    bey.y = cy - dirToCenterY * (maxRadius - bey.radius);
                    bey.vx *= -0.6; 
                    bey.vy *= -0.6;
                    
                    let impactSpeed = Math.sqrt(bey.vx**2 + bey.vy**2);
                    let wobblePenalty = 1 + bey.wobbleFactor;
                    
                    let wallRecoilDmg = Math.max(0, (impactSpeed * safeNum(bey.stats.recoil, 0) * 0.05) - safeNum(bey.stats.recoilReduction, 0)) * wobblePenalty;
                    bey.currentHp -= wallRecoilDmg * 0.5; 
                    bey.currentRpm -= (impactSpeed * 2 + wallRecoilDmg) * wobblePenalty; 
                    
                    if (bey.currentHp <= 0 && !bey.isBursted && !bey.ringOut) {
                        triggerBurst(bey, impactSpeed, -dirToCenterX, -dirToCenterY); 
                    }
                }
            }
            
            let currentSpeed = Math.sqrt(bey.vx**2 + bey.vy**2);
            let baseDecay = 0.15 - (staminaStat * 0.001);
            bey.currentRpm -= Math.max(0.1, baseDecay + (currentSpeed * 0.02) + (bey.wobbleFactor * 2.0));
            
            bey.currentRpm = Math.max(0, bey.currentRpm);
            bey.currentHp = Math.max(0, bey.currentHp);
        }

        processBey(playerBey, true); 
        
        if (!cpuBey.isGhost) {
            processBey(cpuBey, false);

            let dx = cpuBey.x - playerBey.x; let dy = cpuBey.y - playerBey.y;
            let distance = Math.sqrt(dx * dx + dy * dy); let minDist = playerBey.radius + cpuBey.radius;

            if (distance < minDist && !playerBey.ringOut && !cpuBey.ringOut && !playerBey.isBursted && !cpuBey.isBursted) {
                
                if (distance === 0) { dx = 0.1; dy = 0.1; distance = Math.sqrt(dx * dx + dy * dy); }
                
                let overlap = minDist - distance; let nx = dx / distance; let ny = dy / distance;
                playerBey.x -= nx * (overlap / 2); playerBey.y -= ny * (overlap / 2); cpuBey.x += nx * (overlap / 2); cpuBey.y += ny * (overlap / 2);

                let relVx = playerBey.vx - cpuBey.vx; let relVy = playerBey.vy - cpuBey.vy;
                let impactSpeed = Math.max(1, Math.sqrt(relVx*relVx + relVy*relVy));
                
                let isHeavyClash = (playerBey.auraDuration > 0 || cpuBey.auraDuration > 0 || impactSpeed > 15);

                if (isHeavyClash) {
                    let randHeavy = Math.floor(Math.random() * 5) + 1;
                    let clashSFX = new Audio(`audio/sounds/Beyblade_Clash_Heavy${randHeavy}.wav`);
                    clashSFX.volume = 0.45;
                    clashSFX.play().catch(e => console.log("SFX blocked by browser:", e));
                } else {
                    let randNormal = Math.floor(Math.random() * 13) + 1;
                    let clashSFX = new Audio(`audio/sounds/Beyblade_Clash_Normal${randNormal}.wav`);
                    clashSFX.volume = 0.40;
                    clashSFX.play().catch(e => console.log("SFX blocked by browser:", e));
                }
                
                let impactX = playerBey.x + (nx * playerBey.radius);
                let impactY = playerBey.y + (ny * playerBey.radius);
                let sparkCount = Math.min(20, Math.max(5, Math.floor(impactSpeed * 2)));
                
                for (let i = 0; i < sparkCount; i++) {
                    let angle = Math.random() * Math.PI * 2; 
                    let speed = Math.random() * 3 + 2 + (impactSpeed * 0.1);
                    particles.push({ x: impactX, y: impactY, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0, decay: Math.random() * 0.06 + 0.03, color: Math.random() > 0.5 ? '#ffcc00' : '#ffffff', size: Math.random() * 3 + 1 });
                }

                let pWeight = Math.max(1, safeNum(playerBey.stats.weight, 10) + safeNum(playerBey.tempWeight, 0)); 
                let cWeight = Math.max(1, safeNum(cpuBey.stats.weight, 10) + safeNum(cpuBey.tempWeight, 0));
                
                let pKnockbackMod = ((cWeight / pWeight) * 0.275) * (1 + playerBey.wobbleFactor); 
                let cKnockbackMod = ((pWeight / cWeight) * 0.275) * (1 + cpuBey.wobbleFactor);
                let baseBounce = impactSpeed * 0.8 + 4.5; 
                
                playerBey.vx = -nx * baseBounce * pKnockbackMod; playerBey.vy = -ny * baseBounce * pKnockbackMod;
                cpuBey.vx = nx * baseBounce * cKnockbackMod; cpuBey.vy = ny * baseBounce * cKnockbackMod;

                let pAtk = safeNum(playerBey.stats.attack, 0) + safeNum(playerBey.tempAttack, 0); let pDef = safeNum(playerBey.stats.defense, 0) + safeNum(playerBey.tempDefense, 0); let pEnd = safeNum(playerBey.stats.endurance, 0) + safeNum(playerBey.tempEndurance, 0);
                let cAtk = safeNum(cpuBey.stats.attack, 0) + safeNum(cpuBey.tempAttack, 0); let cDef = safeNum(cpuBey.stats.defense, 0) + safeNum(cpuBey.tempDefense, 0); let cEnd = safeNum(cpuBey.stats.endurance, 0) + safeNum(cpuBey.tempEndurance, 0);

                let pDmgToC_HP = Math.max(0.5, (pAtk * impactSpeed * 0.1) - (cDef * 0.4));
                let pDmgToC_RPM = Math.max(1.0, (pAtk * impactSpeed * 0.3) - (cEnd * 0.8));
                let cDmgToP_HP = Math.max(0.5, (cAtk * impactSpeed * 0.1) - (pDef * 0.4));
                let cDmgToP_RPM = Math.max(1.0, (cAtk * impactSpeed * 0.3) - (pEnd * 0.8));

                playerBey.currentHp -= cDmgToP_HP; playerBey.currentRpm -= cDmgToP_RPM;
                cpuBey.currentHp -= pDmgToC_HP; cpuBey.currentRpm -= pDmgToC_RPM;
                matchStats.totalDamageDealt += pDmgToC_HP;

                let pRecoilStat = safeNum(playerBey.stats.recoil, 0); let pRecoilReduc = safeNum(playerBey.stats.recoilReduction, 0) + safeNum(playerBey.tempRecoilReduction, 0);
                let cRecoilStat = safeNum(cpuBey.stats.recoil, 0); let cRecoilReduc = safeNum(cpuBey.stats.recoilReduction, 0) + safeNum(cpuBey.tempRecoilReduction, 0);
                
                let pRecoilDmg = Math.max(0, (pDmgToC_HP * (pRecoilStat * 0.02)) - (pRecoilReduc * 0.1)) * (1 + playerBey.wobbleFactor);
                let cRecoilDmg = Math.max(0, (cDmgToP_HP * (cRecoilStat * 0.02)) - (cRecoilReduc * 0.1)) * (1 + cpuBey.wobbleFactor);

                playerBey.currentHp -= pRecoilDmg; playerBey.currentRpm -= pRecoilDmg * 2; 
                cpuBey.currentHp -= cRecoilDmg; cpuBey.currentRpm -= cRecoilDmg * 2;
                
                playerBey.currentHp = Math.max(0, playerBey.currentHp);
                cpuBey.currentHp = Math.max(0, cpuBey.currentHp);

                if (playerBey.currentHp === 0 && !playerBey.isBursted) triggerBurst(playerBey, impactSpeed, -nx, -ny);
                if (cpuBey.currentHp === 0 && !cpuBey.isBursted) triggerBurst(cpuBey, impactSpeed, nx, ny);

                p1Spirit += (impactSpeed * 0.2) * (1 + (safeNum(playerBey.stats.spiritCharge, 0)/100));

		// --- TELL THE TUTORIAL A COLLISION HAPPENED ---
                if (TutorialManager.isActive && TutorialManager.tutorialType === "combat") {
                    let usedSpecial = playerBey.tutorialSpecialUsed || false;
                    TutorialManager.registerCollision(usedSpecial);
                    playerBey.tutorialSpecialUsed = false; // Reset it after registering
                }
            }
        }

        // --- THE FIX: TUTORIAL INVINCIBILITY ---
        // Constantly regenerate HP and RPM during the lesson so nobody dies,
        // UNLESS they fall into a stadium pocket (ringOut)!
        if (window.ActiveTutorial) {
            if (playerBey && !playerBey.ringOut) {
                playerBey.currentHp = playerBey.maxHp;
                playerBey.currentRpm = playerBey.maxRpm;
            }
            if (cpuBey && !cpuBey.ringOut) {
                cpuBey.currentHp = cpuBey.maxHp;
                cpuBey.currentRpm = cpuBey.maxRpm;
            }
        }
    }

    function drawBattle(timestamp) {
        drawArena(); 
        
        // --- DRAW BALLOONS ---
        activeBalloons.forEach((b, i) => {
            let wobbleZ = b.baseZ + Math.sin(timestamp * 0.005 + i) * 5; 
            let scale = 1 + (wobbleZ * 0.003);
            let rSize = 75 * scale; 
            
            ctx.save();
            // Drop shadow
            ctx.beginPath();
            ctx.ellipse(b.x, b.y, 25, 12, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,0,0, 0.3)`;
            ctx.fill();
            
            // Image
            ctx.translate(b.x, b.y - wobbleZ);
            ctx.drawImage(balloonImg, -rSize/2, -rSize/2, rSize, rSize);
            ctx.restore();
        });

        function drawBey(bey) {
            if (!bey || bey.isGhost) return; 
            if (bey.isBursted || (bey.currentHp <= 0 && !bey.ringOut)) return; 
            
            let isFallen = (bey.currentRpm <= 0 && bey.currentHp > 0 && !bey.ringOut);
            let wobbleOffsetX = 0; let wobbleOffsetY = 0;
            
            if (isFallen) {
                bey.rotation = Math.sin(timestamp * 0.01) * 0.35;
                wobbleOffsetX = Math.sin(timestamp * 0.01) * 2;
            } 
            else if (bey.wobbleFactor > 0) {
                let wobbleSpeed = timestamp * 0.05; 
                wobbleOffsetX = Math.sin(wobbleSpeed) * (bey.wobbleFactor * 4);
                wobbleOffsetY = Math.cos(wobbleSpeed * 1.3) * (bey.wobbleFactor * 4);
            }

            let renderZ = bey.z || 0;
            let scale = 1 + (renderZ * 0.003); 
            if (bey.skillState && bey.skillState.z) scale += bey.skillState.z * 0.03; 
            let renderSize = bey.radius * 8.0 * scale;

            if (renderZ > 0) {
                ctx.save();
                ctx.beginPath();
                let shadowScale = Math.max(0.2, 1 - (renderZ / 400));
                ctx.ellipse(bey.x, bey.y, bey.radius * shadowScale, (bey.radius * 0.5) * shadowScale, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0,0,0, ${Math.max(0.1, 0.4 * shadowScale)})`;
                ctx.fill();
                ctx.restore();
            }

            ctx.save();
            ctx.translate(bey.x + wobbleOffsetX, bey.y + wobbleOffsetY - renderZ);
            
            let rpmRatio = bey.maxRpm > 0 ? bey.currentRpm / bey.maxRpm : 0;
            let windFactor = 0;
            
            if (rpmRatio > 0.5) {
                windFactor = Math.min(1.0, (rpmRatio - 0.5) / 0.2); 
            }
            
            if (windFactor > 0 && !isFallen && !bey.isBursted && bey.windStreaks) {
                ctx.save();
                ctx.scale(1, 0.9); 
                ctx.globalCompositeOperation = 'screen';
                
                for (let streak of bey.windStreaks) {
                    streak.angle += streak.speed * bey.spinDir; 
                    let wobble = Math.sin(timestamp * streak.wobbleSpeed + streak.wobbleOffset) * 0.05;
                    let currentScale = streak.radiusScale + wobble;
                    let wSize = windSpriteSize * currentScale * scale; 

                    ctx.save();
                    ctx.rotate(streak.angle);
                    ctx.globalAlpha = streak.maxAlpha * windFactor; 
                    ctx.drawImage(windSprite, -wSize / 2, -wSize / 2, wSize, wSize);
                    ctx.restore();
                }
                ctx.restore();
            }
               

            // --- THE FIX: DRAW THE ACTIVE ATTACK LAYER ON TOP ---
            if (bey.passiveAura) {
                ctx.save();
                ctx.scale(1, 0.95); 
                ctx.globalCompositeOperation = 'screen'; 
                ctx.beginPath();
                // Drawn slightly larger and softer than the active attack
                ctx.arc(0, 0, renderSize * 0.48, 0, Math.PI * 2);
                ctx.fillStyle = bey.passiveAura;
                ctx.shadowBlur = 20; 
                ctx.shadowColor = bey.passiveAura;
                ctx.fill();
                ctx.restore();
            }

            // --- THE FIX: DRAW THE ACTIVE ATTACK LAYER ON TOP ---
            if (bey.activeAura && bey.activeAuraDuration > 0) {
                ctx.save();
                ctx.scale(1, 0.95); 
                ctx.globalCompositeOperation = 'screen'; 
                let pulse = 1 + Math.sin(timestamp * 0.02) * 0.08;
                let fade = Math.min(1.0, bey.activeAuraDuration / 200); 
                
                ctx.beginPath();
                ctx.arc(0, 0, (renderSize * 0.45) * pulse, 0, Math.PI * 2);
                ctx.fillStyle = bey.activeAura;
                ctx.globalAlpha = fade * 0.8; 
                ctx.shadowBlur = 30; 
                ctx.shadowColor = bey.activeAura;
                ctx.fill();
                ctx.restore();
            }
                
            if (isFallen) {
                ctx.scale(1, 0.45); 
                ctx.translate(0, renderSize * 0.15); 
            }
            
            ctx.beginPath(); ctx.arc(0, 0, bey.radius * scale, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fill();

            ctx.rotate(bey.rotation);

            if (bey.images) {
                if (bey.images.bb) ctx.drawImage(bey.images.bb, -renderSize/2, -renderSize/2, renderSize, renderSize);
                if (bey.images.sg) ctx.drawImage(bey.images.sg, -renderSize/2, -renderSize/2, renderSize, renderSize);
                if (bey.images.wd) ctx.drawImage(bey.images.wd, -renderSize/2, -renderSize/2, renderSize, renderSize);
                if (bey.images.sar) ctx.drawImage(bey.images.sar, -renderSize/2, -renderSize/2, renderSize, renderSize);                 
                if (bey.images.ar) ctx.drawImage(bey.images.ar, -renderSize/2, -renderSize/2, renderSize, renderSize);
                if (bey.images.bc) ctx.drawImage(bey.images.bc, -renderSize/2, -renderSize/2, renderSize, renderSize);
            }
            ctx.restore();

            if (bey.wobbleFactor > 0.5 && !isFallen) {
                ctx.beginPath(); ctx.arc(bey.x + wobbleOffsetX, bey.y + wobbleOffsetY, bey.radius * scale, 0, Math.PI * 2);
                ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 2; ctx.stroke();
            }

            if (bey.visualText) {
                ctx.fillStyle = bey.visualTextColor; ctx.font = 'bold 16px Arial';
                ctx.fillText(bey.visualText, bey.x - 40, bey.y - 30);
            }
        }

        drawBey(playerBey); drawBey(cpuBey);
        
        for (let i = 0; i < burstParticles.length; i++) {
            let bp = burstParticles[i];
            bp.x += bp.vx; bp.y += bp.vy;
            bp.vx *= bp.friction; bp.vy *= bp.friction; 
            bp.rotation += bp.rotSpeed; bp.rotSpeed *= bp.friction; 
            
            ctx.save();
            ctx.translate(bp.x, bp.y); ctx.rotate(bp.rotation);
            ctx.drawImage(bp.img, -bp.size/2, -bp.size/2, bp.size, bp.size);
            ctx.restore();
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life -= p.decay; 
            if (p.life <= 0) { particles.splice(i, 1); } 
            else {
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0; 
            }
        }
    }

    function checkRoundCondition() {
        if (roundConcluding) return; 
        
        if (window.ActiveTutorial) return; // Never auto-end during tutorials

        let pAlive = playerBey.currentHp > 0 && playerBey.currentRpm > 0 && !playerBey.ringOut;
        let cAlive = cpuBey.currentHp > 0 && cpuBey.currentRpm > 0 && !cpuBey.ringOut;
        let timeOut = matchTimerMs <= 0;

        if (!pAlive || !cAlive || timeOut) {
            roundConcluding = true;
            roundConcludeTimer = 2500; 
        }
    }

    function processRoundWinner() {
        gameState = "ROUND_OVER";
        
        if (playerBey && playerBey.spinSFX) { playerBey.spinSFX.pause(); playerBey.spinSFX = null; }
        if (cpuBey && cpuBey.spinSFX) { cpuBey.spinSFX.pause(); cpuBey.spinSFX = null; }
        
        let winner = "DRAW";
        
        let pAlive = playerBey.currentHp > 0 && playerBey.currentRpm > 0 && !playerBey.ringOut;
        let cAlive = cpuBey.currentHp > 0 && cpuBey.currentRpm > 0 && !cpuBey.ringOut;
        let timeOut = matchTimerMs <= 0;

        if (timeOut) {
            let pPercent = (playerBey.currentHp / playerBey.maxHp) + (playerBey.currentRpm / playerBey.maxRpm);
            let cPercent = (cpuBey.currentHp / cpuBey.maxHp) + (cpuBey.currentRpm / cpuBey.maxRpm);
            winner = pPercent > cPercent ? "PLAYER" : (cPercent > pPercent ? "CPU" : "DRAW");
        } else if (pAlive && !cAlive) {
            winner = "PLAYER";
        } else if (cAlive && !pAlive) {
            winner = "CPU";
        }

        let resultOverlay = document.getElementById('next-round-overlay');
        let resultText = document.getElementById('round-winner-text');

        if (winner === "PLAYER") {
            p1Score++; document.getElementById(`p1-pt${p1Score}`).classList.add('filled');
            matchStats.playerScore = p1Score;
            
            if (playerBey.currentHp >= playerBey.maxHp) matchStats.perfectRounds++;
            if (playerBey.currentHp / playerBey.maxHp <= 0.25 || playerBey.currentRpm / playerBey.maxRpm <= 0.25) matchStats.turnaboutsAchieved++;                
            
            resultText.innerText = "PLAYER WINS THE ROUND";
            resultText.style.color = "#00ffff";
        } else if (winner === "CPU") {
            cpuScore++; document.getElementById(`cpu-pt${cpuScore}`).classList.add('cpu-filled'); matchStats.cpuScore = cpuScore; 
            
            resultText.innerText = "CPU WINS THE ROUND";
            resultText.style.color = "#ff4400";
        } else {
            resultText.innerText = "DRAW";
            resultText.style.color = "#fff";
        }

        matchStats.roundsPlayed++;
        matchStats.totalTimeElapsed += (120000 - Math.max(0, matchTimerMs)); 

        resultOverlay.style.display = 'flex'; 
    }

	window.advanceMatch = function() {
        document.getElementById('next-round-overlay').style.display = 'none';
        
        if (p1Score >= 3) { endMatch("YOU WIN!", "#00ffff"); } 
        else if (cpuScore >= 3) { endMatch("YOU LOSE...", "#ff4400"); } 
        else { resetRound(); }
    }

    // --- THE FIX: DYNAMIC ROUTING ---
    window.returnFromArena = function() {
        // Did we drop a breadcrumb from adventure.html?
        if (localStorage.getItem('isStoryBattle') === 'true') {
			window.stopArenaAudio(); // <--- Kills the audio before leaving!
            localStorage.removeItem('isStoryBattle'); // Clean up the breadcrumb
            window.navigateTo('adventure.html'); // Go back to the story!
        } else {
            window.navigateTo('beybattle.html'); // Default to free battle
        }
    };

    function resetRound() {
        currentRound++;
        document.getElementById('round-text').innerText = `ROUND ${currentRound}`;
        document.getElementById('ui-layer').style.display = 'none';
        document.getElementById('minigame-overlay').style.display = 'flex';
        
        document.getElementById('launcher-container').style.display = 'none';
        document.getElementById('countdown-text').innerText = '';
        instruction.innerText = "Tap the arena on your side to choose your launch site!";
        
        setupLaunchMinigame(); 
        playerLaunchSite = null;
        cpuLaunchSite = null;
        gameState = "SELECT_LAUNCH";
        
        burstParticles = []; 
        drawArena(); 
    }

    function endMatch(title, color) {
        document.getElementById('ui-layer').style.display = 'none';
        const splash = document.getElementById('splash-screen');
        const titleEl = document.getElementById('splash-title');
        
        document.getElementById('top-info-bar').style.display = 'flex';
        
        splash.style.display = 'flex';
        titleEl.innerText = title;
        titleEl.style.color = color;
        titleEl.style.textShadow = `0 0 20px ${color}`;
        
        localStorage.setItem('postMatchReceipt', JSON.stringify(matchStats));
    }

    function gameLoop(timestamp) {
        if (!lastTime) lastTime = timestamp; 
        let dt = timestamp - lastTime; 
        lastTime = timestamp;
        
        if (isNaN(dt) || dt < 0) dt = 16;
        if (dt > 33) dt = 33; 

        if (gameState === "DROP_IN") {
            updateDropIn(dt);
            updateUI(dt);
        }
        else if (gameState === "BATTLE") {
            if (!roundConcluding) {
                matchTimerMs -= dt;
            } else {
                roundConcludeTimer -= dt;
                if (roundConcludeTimer <= 0) {
                    processRoundWinner();
                    return; 
                }
            }
            updatePhysics(dt);
            updateUI(dt);
            checkRoundCondition();
        }
        
        if (gameState === "BATTLE" || gameState === "DROP_IN") drawBattle(timestamp);
        if (gameState !== "ROUND_OVER") requestAnimationFrame(gameLoop);
    }
    
    drawArena();
</script>

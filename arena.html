    }

    function updatePhysics(dt) {
        // --- NEW: ROTATING STADIUM TRACKER ---
        let spinSpeed = window.activeStadium.physics.basinSpinSpeed || 0;
        let basinGrip = window.activeStadium.physics.basinGrip || 0;
        
        if (spinSpeed !== 0 && !roundConcluding) {
            window.basinAngle = (window.basinAngle || 0) + (spinSpeed * dt);
        }
        // -------------------------------------


        let inputX = 0; let inputY = 0;
        
		
		
        if (roundConcluding) {
            joyX = 0; joyY = 0;
        } else {
            if (keys.a || keys.arrowleft) inputX -= 1;
            if (keys.d || keys.arrowright) inputX += 1;
            if (keys.w || keys.arrowup) inputY -= 1;
            if (keys.s || keys.arrowdown) inputY += 1;

            if (inputX !== 0 || inputY !== 0) {
                let dist = Math.sqrt(inputX*inputX + inputY*inputY);
                joyX = inputX/dist; joyY = inputY/dist; 
            } else if (mouseTarget && gameState === "BATTLE") {
                let dx = mouseTarget.x - playerBey.x;
                let dy = mouseTarget.y - playerBey.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 15) { joyX = dx/dist; joyY = dy/dist; } 
                else { joyX = 0; joyY = 0; } 
            } else if (!isJoystickActive) {
                joyX = 0; joyY = 0;
            }
        }

        if (window.SkillEngine) window.SkillEngine.update(dt, playerBey, cpuBey, joyX, joyY);
        if (cpuBey && cpuBey.activeAttacks) cpuBey.activeAttacks.forEach(atk => { if (atk.currentCd > 0) atk.currentCd -= dt; });
        if (cpuBey && matchTimerMs <= 60000) { cpuBey.spirit += (0.002 * dt) * (1 + ((cpuBey.stats.spiritCharge||0)/100)); }
        if (cpuBey) cpuBey.spirit = Math.min(100, cpuBey.spirit);

        if (cpuData.aiScript && window.SkillEngine && cpuBey && !cpuBey.isBursted && !roundConcluding && !cpuBey.isGhost) { 
            // --- TOMA'S TUTORIAL OVERRIDE AI ---
            if (window.ActiveTutorial === "combat") {
                const cx = width / 2; const cy = height / 2;
                if (TutorialManager.combatPhase < 6) {
                    // Pull to center smoothly
                    let cdx = cx - cpuBey.x; let cdy = cy - cpuBey.y;
                    cpuBey.vx += cdx * 0.0015; cpuBey.vy += cdy * 0.0015;
                } else if (TutorialManager.combatPhase >= 7 && TutorialManager.combatPhase < 9) {
                    // Circle the basin
                    let cdx = cx - cpuBey.x; let cdy = cy - cpuBey.y;
                    let angle = Math.atan2(cdy, cdx) + (Math.PI / 2); 
                    cpuBey.vx += Math.cos(angle) * 0.06;
                    cpuBey.vy += Math.sin(angle) * 0.06;
                    cpuBey.vx += cdx * 0.0005; cpuBey.vy += cdy * 0.0005; // Keep him from flying out
                }
            } else {
                cpuData.aiScript(cpuBey, playerBey, window.SkillEngine); 
            }
        }
        
        const cx = width / 2; const cy = height / 2; const maxRadius = Math.min(width, height) / 2 * 0.9;
        const basinRadius = maxRadius * 0.3; const rampRadius = maxRadius * 0.65;

        TutorialManager.update(dt, playerBey, cx, cy);
		
		for (let i = activeProjectiles.length - 1; i >= 0; i--) {
            let proj = activeProjectiles[i];
            proj.x += proj.vx * (dt * 0.06); 
            proj.y += proj.vy * (dt * 0.06);

            proj.anim.timer += dt;
            if (proj.anim.timer >= proj.anim.frameSpeed) {
                proj.anim.timer = 0; proj.anim.currentFrame++;
            }

            let hitEnemy = false; let hitWall = false;

            // Check Wall Collision
            let distFromCenter = Math.sqrt((proj.x - cx)**2 + (proj.y - cy)**2);
            if (distFromCenter > maxRadius * 0.85) hitWall = true;

            // Check Enemy Collision
            let enemy = proj.owner === playerBey ? cpuBey : playerBey;
            if (!hitWall && !enemy.isGhost && !enemy.isBursted && !enemy.ringOut) {
                let pDist = Math.sqrt((proj.x - enemy.x)**2 + (proj.y - enemy.y)**2);
                if (pDist < proj.radius + enemy.radius) hitEnemy = true;
            }

            // Did it hit something, or did the animation finish?
            if (hitWall || hitEnemy || proj.anim.currentFrame > proj.anim.frameCount) {
                if (hitEnemy) {
                    enemy.currentHp -= proj.damage;
                    enemy.currentRpm -= proj.damage * 1.2; // Stun/Drain effect
                    enemy.currentHp = Math.max(0, enemy.currentHp);

                    // Add impact knockback to the enemy!
                    let knockbackForce = 4.5; // TWEAKABLE: Increase this if you want them to fly further!
                    let pSpeed = Math.max(0.1, Math.sqrt(proj.vx**2 + proj.vy**2));
                    enemy.vx += (proj.vx / pSpeed) * knockbackForce; 
                    enemy.vy += (proj.vy / pSpeed) * knockbackForce;

                    if (enemy.currentHp <= 0) triggerBurst(enemy, Math.sqrt(proj.vx**2 + proj.vy**2), proj.vx, proj.vy);
                }

                if (hitWall || hitEnemy) {
                    // Spawn Hit Effect!
                    activeHitEffects.push({
                        x: proj.x, y: proj.y, angle: proj.angle,
                        anim: { basePath: './images/beyblade_parts/arena_props/effects/Spinburst_hiteffect', ext: '.png', frameCount: 6, currentFrame: 1, timer: 0, frameSpeed: 15 }
                    });
                }
                activeProjectiles.splice(i, 1); // Delete Projectile
            }
        }
        
        // Update Hit Effect Animations
        for (let i = activeHitEffects.length - 1; i >= 0; i--) {
            let eff = activeHitEffects[i];
            eff.anim.timer += dt;
            if (eff.anim.timer >= eff.anim.frameSpeed) {
                eff.anim.timer = 0; eff.anim.currentFrame++;
            }
            if (eff.anim.currentFrame > eff.anim.frameCount) activeHitEffects.splice(i, 1);
        }

        // --- BALLOON COLLISION LOGIC ---
        if (activeBalloons.length > 0 && playerBey.z <= 0 && !playerBey.isBursted) {
            for (let i = activeBalloons.length - 1; i >= 0; i--) {
                let b = activeBalloons[i];
                let bDist = Math.sqrt((playerBey.x - b.x)**2 + (playerBey.y - b.y)**2);
                if (bDist < playerBey.radius + 35) { 
                    activeBalloons.splice(i, 1);
                    TutorialManager.balloonsPopped++;
                    document.getElementById('balloon-tally').innerText = `${TutorialManager.balloonsPopped} / 15`;
                    
                    let popSfx = new Audio('./audio/sounds/balloonpop.wav');
                    popSfx.volume = 0.5; popSfx.play().catch(e=>{});
                    
                    let colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'];
                    for(let p=0; p<15; p++) {
                        let ang = Math.random() * Math.PI*2; let spd = Math.random()*5+2;
                        particles.push({x: b.x, y: b.y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, life: 1.0, decay: 0.05, color: colors[Math.floor(Math.random()*colors.length)], size: 3});
                    }
                    TutorialManager.checkBalloons();
                }
            }
        }

        function processBey(bey, isPlayer) {
		// ==========================================
        // --- NEW: THE ABYSS FALL (RING OUT) OVERRIDE ---
        // ==========================================
        if (bey.ringOut) {
            // 1. Fade to black/transparent
            if (bey.opacity === undefined) bey.opacity = 1;
            bey.opacity -= dt * 0.001; // Fades out over 1 second
            bey.opacity = Math.max(0, bey.opacity);

            // 2. Shrink to simulate falling down a pit!
            if (bey.scale === undefined) bey.scale = 1;
            bey.scale -= dt * 0.0008; 
            bey.scale = Math.max(0.3, bey.scale);

            // 3. Continue exact trajectory off the screen
            bey.x += bey.vx * (dt * 0.06);
            bey.y += bey.vy * (dt * 0.06);

            // 4. Keep it visually spinning while it falls
            bey.rotation += (bey.currentRpm * 0.0002) * dt;

            // CRITICAL: Stop reading the rest of the physics function! 
            // (Skips gravity, friction, and wall collisions!)
            return; 
        }
            if (!bey || bey.isBursted) return;
			
			if (bey.skillState.actionState === "SPIN_BURST_CHARGE") {
                // 1. Anchor the Beyblade (Rapid friction brake)
                bey.vx *= 0.5; 
                bey.vy *= 0.5;
                bey.skillState.chargeTimer -= dt;

                if (bey.skillState.chargeTimer <= 0) {
                    // 2. FIRE THE PROJECTILE!
                    bey.skillState.actionState = "IDLE";
                    bey.isRpmFlashing = false;

                    let shootSfx = new Audio('./audio/sounds/Spinburst_shoot.wav');
                    shootSfx.volume = 0.6; shootSfx.play().catch(e=>{});

                    // --- TWEAKABLE VARIABLES ---
                    let projSpeed = 1.75;  // How fast the projectile moves (Multiplied by dt)
                    let blowbackForce = 4.25; // How far the Beyblade gets pushed back
                    
                    // DAMAGE FORMULA: 12 Base + (Attack * 0.8) + (Stamina * 0.5) + (Current RPM * 0.005)
                    let dmg = 12 + ((bey.stats.attack || 0) * 0.8) + ((bey.stats.stamina || 0) * 0.5) + (bey.currentRpm * 0.005);
                    // ---------------------------

                    // Calculate Shot Direction
                    let dx = bey.skillState.shootDirX; let dy = bey.skillState.shootDirY;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist === 0) { dx = 0; dy = -1; dist = 1; } // Failsafe (Shoot North)
                    let dirX = dx/dist; let dirY = dy/dist;

                    // 3. Apply Blowback (Push in opposite direction)
                    bey.vx = -dirX * blowbackForce;
                    bey.vy = -dirY * blowbackForce;

                    // 4. Spawn the Projectile
                    activeProjectiles.push({
                        x: bey.x, y: bey.y,
                        vx: dirX * projSpeed, vy: dirY * projSpeed,
                        angle: Math.atan2(dy, dx) + (Math.PI / 2), // +90 deg because art faces North
                        damage: dmg,
                        owner: bey,
                        radius: 38, // Projectile Hitbox Size
                        anim: { basePath: './images/beyblade_parts/arena_props/effects/Spinburst', ext: '.png', frameCount: 13, currentFrame: 1, timer: 0, frameSpeed: 13 } // frameSpeed controls dissipation time!
                    });
                }
             
            }

			if (bey.activeAuraDuration > 0) {
                bey.activeAuraDuration -= dt;
                if (bey.activeAuraDuration <= 0) {
                    bey.activeAura = null; 
                    bey.tempRecoilReduction = 0; 
                    bey.tempDefense = 0; 
                    bey.tempAttack = 0; 
                    bey.tempWeight = 0; 
                    bey.tempSpeed = 0; 
                    bey.tempGrip = 0; 
                    bey.tempStamina = 0; 
                    bey.tempEndurance = 0; 
                }
			}
			if (bey.activeOverlayAnim) {
            let anim = bey.activeOverlayAnim;
            anim.duration -= dt;
                
                if (anim.duration <= 0) {
                    bey.activeOverlayAnim = null; // Attack over, remove the animation
                } else {
                    anim.timer += dt;
                    if (anim.timer >= anim.frameSpeed) {
                        anim.timer = 0;
                        anim.currentFrame++;
                        // Loop back to frame 1 if we hit the end!
                        if (anim.currentFrame > anim.frameCount) anim.currentFrame = 1; 
                    }
                }
            }

            if (bey.spinSFX) {
                if (bey.spinSFX.duration && bey.spinSFX.currentTime >= bey.spinSFX.duration - 0.08) {
                    bey.spinSFX.currentTime = 0.20382;
                    if (bey.spinSFX.paused) bey.spinSFX.play().catch(e=>console.log(e));
                }

                let rpmRatio = bey.maxRpm > 0 ? bey.currentRpm / bey.maxRpm : 0;
                let targetVolume = 0;
                const maxVolume = 0.15;

                if (bey.isBursted || bey.ringOut || bey.currentRpm <= 0) {
                    targetVolume = 0;
                } else if (rpmRatio >= 0.50) {
                    targetVolume = maxVolume; 
                } else if (rpmRatio > 0.35) {
                    targetVolume = maxVolume * ((rpmRatio - 0.35) / 0.15);
                }

                bey.spinSFX.volume = Math.max(0, Math.min(maxVolume, targetVolume));
                
                if (targetVolume === 0 && !bey.spinSFX.paused) {
                    bey.spinSFX.pause();
                } else if (targetVolume > 0 && bey.spinSFX.paused) {
                    bey.spinSFX.play().catch(e=>console.log(e));
                }
            }
            
            let speedStat = safeNum(bey.stats.speed, 0) + safeNum(bey.tempSpeed, 0); 
            let gripStat = safeNum(bey.stats.grip, 0) + safeNum(bey.tempGrip, 0); 
            let staminaStat = safeNum(bey.stats.stamina, 0) + safeNum(bey.tempStamina, 0);
            
            let rpmRatio = bey.currentRpm / bey.maxRpm;
            let balanceStat = safeNum(bey.stats.balance, 0); 
            bey.wobbleFactor = rpmRatio > 0.45 ? 0 : (1.0 - (rpmRatio / 0.45)) * (1 - Math.min(0.8, balanceStat * 0.005));


            // --- NEW: TANGENTIAL SPINNING FLOOR FORCE ---
            let relX = bey.x - cx; 
            let relY = bey.y - cy;
			let currentDist = Math.sqrt(relX * relX + relY * relY);
            
			let basinSize = window.activeStadium.physics.basinRadius || 0.3;
			
            // If the floor is spinning AND we are inside the 30% basin radius...
            if (spinSpeed !== 0 && currentDist <= maxRadius * 0.3) {
                // Calculate the tangential vector (sweeping in a circle)
                let tangX = -relY;
                let tangY = relX;
                
                // The further from the exact center you are, the faster you get swept!
                bey.vx += tangX * spinSpeed * basinGrip;
                bey.vy += tangY * spinSpeed * basinGrip;
            }
            // --------------------------------------------


            if (bey.currentRpm > 0) {
                let spinSpeed = (bey.currentRpm * dt) / 25000; 
                if (spinSpeed > 0.8) spinSpeed = 0.8 + (spinSpeed * 0.01);
                bey.rotation += spinSpeed * bey.spinDir;
            }

            let dxCenter = cx - bey.x; let dyCenter = cy - bey.y;
            if (dxCenter === 0 && dyCenter === 0) { dxCenter = 0.1; dyCenter = 0.1; }
            let distFromCenter = Math.max(1, Math.sqrt(dxCenter**2 + dyCenter**2));
            
            let dirToCenterX = dxCenter / distFromCenter; 
            let dirToCenterY = dyCenter / distFromCenter;
            
            let autoX = 0; let autoY = 0;

            if (bey.tipShape === "Sharp") {
                autoX = dirToCenterX; autoY = dirToCenterY;
            } else if (bey.tipShape === "Flat") {
                autoX = -dirToCenterY * bey.spinDir; autoY = dirToCenterX * bey.spinDir;
            } else {
                autoX = (dirToCenterX * 0.5) + (-dirToCenterY * bey.spinDir * 0.5);
                autoY = (dirToCenterY * 0.5) + (dirToCenterX * bey.spinDir * 0.5);
            }

            let moveSpeed = speedStat * 0.00425; 
            let accelX = 0; let accelY = 0;

            if (bey.currentRpm > 0) {
                if (isPlayer) {
                    let controlWeight = Math.min(0.95, Math.max(0.1, 0.60 + (safeNum(bey.stats.mobility, 0) * 0.03)));
                    if (joyX === 0 && joyY === 0) controlWeight = 0; 

                    let autoWeight = 1.0 - controlWeight;
                    let finalDirX = (joyX * controlWeight) + (autoX * autoWeight);
                    let finalDirY = (joyY * controlWeight) + (autoY * autoWeight);
                    
                    let finalDist = Math.max(0.01, Math.sqrt(finalDirX**2 + finalDirY**2));
                    accelX = (finalDirX / finalDist) * moveSpeed; 
                    accelY = (finalDirY / finalDist) * moveSpeed;
                } else {
                    let dx = playerBey.x - bey.x; let dy = playerBey.y - bey.y; 
                    let d = Math.max(1, Math.sqrt(dx*dx + dy*dy)); 
                    accelX = (dx / d) * moveSpeed; accelY = (dy / d) * moveSpeed;
                }
                
                bey.vx += accelX; bey.vy += accelY;

                if (distFromCenter > basinRadius && distFromCenter <= rampRadius) { bey.vx += dirToCenterX * 0.017; bey.vy += dirToCenterY * 0.017; } 
                else if (distFromCenter > rampRadius) { bey.vx += dirToCenterX * 0.068; bey.vy += dirToCenterY * 0.068; }
            }

            // Use the stadium's custom friction!
            let stadiumFriction = window.activeStadium.physics ? window.activeStadium.physics.friction : 0.99;
            let friction = stadiumFriction - (gripStat * 0.0002) - (bey.wobbleFactor * 0.02); 
            if (bey.currentRpm <= 0) friction *= 0.90; 

            bey.vx *= friction; bey.vy *= friction;
            bey.x += bey.vx; bey.y += bey.vy;

            let newDist = Math.sqrt((bey.x - cx)**2 + (bey.y - cy)**2);
            
            if (newDist + bey.radius > maxRadius && newDist < maxRadius * 2 && !bey.isGhost) {
                let hitGap = false;
                if (bey.z <= 0 && gameState === "BATTLE" && Date.now() - battleStartTime > 500) {
                    let angle = Math.atan2(bey.y - cy, bey.x - cx);
                    if (angle < 0) angle += Math.PI * 2; 

                    // --- NEW: DYNAMIC RING-OUT MATH ---
                    if (window.activeStadium.ringOutZones) {
                        for (let zone of window.activeStadium.ringOutZones) {
                            if (zone.start > zone.end) {
                                // Handles pockets that wrap across the 0-degree line (like basicStadium_3)
                                if (angle >= zone.start || angle <= zone.end) hitGap = true;
                            } else {
                                // Standard pockets
                                if (angle >= zone.start && angle <= zone.end) hitGap = true;
                            }
                        }
                    }
                }

                if (hitGap) {
                    bey.currentHp = 0; 
                    bey.ringOut = true;
                    
                    // --- TUTORIAL RELAUNCH CHECK ---
                    if (isPlayer && TutorialManager.isActive && TutorialManager.tutorialType === "combat") {
                        if (TutorialManager.combatPhase >= 10 && !TutorialManager.relaunching) {
                            TutorialManager.relaunching = true;
                            TutorialManager.showVN([
                                "Don't sweat it, it happens. Get back in there, dude!"
                            ], () => {
                                TutorialManager.relaunching = false;
                                triggerTutorialRelaunch();
                            });
                        }
                    }

                } else {
                    bey.x = cx - dirToCenterX * (maxRadius - bey.radius); 
                    bey.y = cy - dirToCenterY * (maxRadius - bey.radius);
                    
                    let preImpactSpeed = Math.max(1, Math.sqrt(bey.vx**2 + bey.vy**2));

                    // --- PASSIVE: Wall Rebound Assist ---
                    if (bey.passives && bey.passives.includes("Wall Rebound Assist")) {
                        // Springboard effect! 120% speed aimed directly at the center.
                        bey.vx = dirToCenterX * (preImpactSpeed * 1.2);
                        bey.vy = dirToCenterY * (preImpactSpeed * 1.2);
                        
                        // Green flash to show the springboard activated!
                        bey.activeAura = "rgba(0, 255, 0, 0.8)";
                        bey.activeAuraDuration = 400;
                    } else {
                        // Normal wall bounce (loses 40% momentum)
                        bey.vx *= -0.6; 
                        bey.vy *= -0.6;
                    }
                    
                    let impactSpeed = Math.sqrt(bey.vx**2 + bey.vy**2);
                    let wobblePenalty = 1 + bey.wobbleFactor;
                    
                    let wallRecoilDmg = Math.max(0, (impactSpeed * safeNum(bey.stats.recoil, 0) * 0.05) - safeNum(bey.stats.recoilReduction, 0)) * wobblePenalty;
                    bey.currentHp -= wallRecoilDmg * 0.5; 
                    bey.currentRpm -= (impactSpeed * 2 + wallRecoilDmg) * wobblePenalty; 
                    
                    if (bey.currentHp <= 0 && !bey.isBursted && !bey.ringOut) {
                        triggerBurst(bey, impactSpeed, -dirToCenterX, -dirToCenterY); 
                    }
                }
            }
            
            let currentSpeed = Math.sqrt(bey.vx**2 + bey.vy**2);
			let baseDecay = 0.15 - (staminaStat * 0.001);
			let frameScale = dt / 16.667;

			// LAD from parts
			let ladValue = safeNum(bey.stats.lad, 0.0);
			ladValue = Math.max(0.0, Math.min(0.9, ladValue));

			// Skill-based passive drain modifier
			// 1.0 = normal drain
			// 0.90 = 10% less passive drain
			// 1.10 = 10% more passive drain
			let passiveRpmDrainMod = safeNum(bey.stats.passiveRpmDrainMod, 1.0);

			// Split stable vs wobble drain
			let stableDrain = baseDecay + (currentSpeed * 0.02);
			let wobbleDrain = bey.wobbleFactor * 2.0;

			// LAD only affects wobble drain
			wobbleDrain *= (1.0 - ladValue);

			// Recombine
			let passiveRpmDrain = Math.max(0.1, stableDrain + wobbleDrain);

			// Skill modifier affects the full passive drain
			passiveRpmDrain *= passiveRpmDrainMod;

			bey.currentRpm -= passiveRpmDrain * frameScale;
			bey.currentRpm = Math.max(0, bey.currentRpm);
			bey.currentHp = Math.max(0, bey.currentHp);
        }

        processBey(playerBey, true); 
        
        if (!cpuBey.isGhost) {
            processBey(cpuBey, false);

            let dx = cpuBey.x - playerBey.x; let dy = cpuBey.y - playerBey.y;
            let distance = Math.sqrt(dx * dx + dy * dy); let minDist = playerBey.radius + cpuBey.radius;
			
			// 1. Calculate the absolute height difference
        let pZ = playerBey.skillState ? (playerBey.skillState.z || 0) : 0;
        let cZ = cpuBey.skillState ? (cpuBey.skillState.z || 0) : 0;
        let zDiff = Math.abs(pZ - cZ);

        // Check if either Beyblade is currently doing any phase of Phantom Warp
            let pState = playerBey.skillState ? playerBey.skillState.actionState : "";
            let cState = cpuBey.skillState ? cpuBey.skillState.actionState : "";
            let isP1Ethereal = pState.includes("TELEPORT");
            let isCpuEthereal = cState.includes("TELEPORT");

        // 2. The Merged Collision Check! 
		// Checks distance, height, alive status, AND makes sure neither is teleporting!
            if (distance < minDist && zDiff < 12 && !playerBey.ringOut && !cpuBey.ringOut && !playerBey.isBursted && !cpuBey.isBursted && !isP1Ethereal && !isCpuEthereal) {
                
            if (distance === 0) { dx = 0.1; dy = 0.1; distance = Math.sqrt(dx * dx + dy * dy); }
                
            let overlap = minDist - distance; let nx = dx / distance; let ny = dy / distance;
            playerBey.x -= nx * (overlap / 2); playerBey.y -= ny * (overlap / 2); 
            cpuBey.x += nx * (overlap / 2); cpuBey.y += ny * (overlap / 2);

            let relVx = playerBey.vx - cpuBey.vx; let relVy = playerBey.vy - cpuBey.vy;
            let impactSpeed = Math.max(1, Math.sqrt(relVx*relVx + relVy*relVy));
                
            let isHeavyClash = (playerBey.auraDuration > 0 || cpuBey.auraDuration > 0 || impactSpeed > 15);
				
				// PASSIVE: Rollback Drift Activation
                if (impactSpeed >= 12) { // "Heavy" knockback threshold
                    [playerBey, cpuBey].forEach(bey => {
                        if (bey.passives && bey.passives.includes("Rollback Drift") && bey.skillState.rollbackTimer <= 0) {
                            let state = bey.skillState;
                            state.rollbackTimer = 8000; // 8-second buff
                            state.driftForceTimer = 600; // 0.6 seconds of intense steering
                            
                            state.rdAtkBonus = (bey.stats.attack || 0) * 0.05;
                            state.rdEndBonus = (bey.stats.endurance || 0) * 0.05;
                            
                            bey.stats.attack = (bey.stats.attack || 0) + state.rdAtkBonus;
                            bey.stats.endurance = (bey.stats.endurance || 0) + state.rdEndBonus;
                            bey.stats.rpmDamageResist = (bey.stats.rpmDamageResist || 0) + 0.04; // 4% RPM mitigation

                            // A bright cyan glow for the 8-second duration!
                            bey.activeAura = "rgba(0, 255, 255, 0.7)";
                            bey.activeAuraDuration = 8000;
                        }
                    });
                }

                if (isHeavyClash) {
                    let randHeavy = Math.floor(Math.random() * 5) + 1;
                    let clashSFX = new Audio(`./audio/sounds/Beyblade_Clash_Heavy${randHeavy}.wav`);
                    clashSFX.volume = 0.45;
                    clashSFX.play().catch(e => console.log("SFX blocked by browser:", e));
                } else {
                    let randNormal = Math.floor(Math.random() * 13) + 1;
                    let clashSFX = new Audio(`./audio/sounds/Beyblade_Clash_Normal${randNormal}.wav`);
                    clashSFX.volume = 0.40;
                    clashSFX.play().catch(e => console.log("SFX blocked by browser:", e));
                }
                
                let impactX = playerBey.x + (nx * playerBey.radius);
                let impactY = playerBey.y + (ny * playerBey.radius);
                let sparkCount = Math.min(20, Math.max(5, Math.floor(impactSpeed * 2)));
                
                for (let i = 0; i < sparkCount; i++) {
                    let angle = Math.random() * Math.PI * 2; 
                    let speed = Math.random() * 3 + 2 + (impactSpeed * 0.1);
                    particles.push({ x: impactX, y: impactY, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0, decay: Math.random() * 0.06 + 0.03, color: Math.random() > 0.5 ? '#ffcc00' : '#ffffff', size: Math.random() * 3 + 1 });
                }

                let pWeight = Math.max(1, safeNum(playerBey.stats.weight, 10) + safeNum(playerBey.tempWeight, 0)); 
                let cWeight = Math.max(1, safeNum(cpuBey.stats.weight, 10) + safeNum(cpuBey.tempWeight, 0));
                
                let pKnockbackMod = ((cWeight / pWeight) * 0.275) * (1 + playerBey.wobbleFactor); 
                let cKnockbackMod = ((pWeight / cWeight) * 0.275) * (1 + cpuBey.wobbleFactor);
                let baseBounce = impactSpeed * 0.8 + 4.5; 
				pKnockbackMod *= (1 - safeNum(playerBey.stats.knockbackResist, 0));
                cKnockbackMod *= (1 - safeNum(cpuBey.stats.knockbackResist, 0));
				pKnockbackMod *= (1 + safeNum(cpuBey.stats.knockbackPower, 0));
				cKnockbackMod *= (1 + safeNum(playerBey.stats.knockbackPower, 0));
                
                playerBey.vx = -nx * baseBounce * pKnockbackMod; playerBey.vy = -ny * baseBounce * pKnockbackMod;
                cpuBey.vx = nx * baseBounce * cKnockbackMod; cpuBey.vy = ny * baseBounce * cKnockbackMod;

                let pAtk = safeNum(playerBey.stats.attack, 0) + safeNum(playerBey.tempAttack, 0); let pDef = safeNum(playerBey.stats.defense, 0) + safeNum(playerBey.tempDefense, 0); let pEnd = safeNum(playerBey.stats.endurance, 0) + safeNum(playerBey.tempEndurance, 0);
                let cAtk = safeNum(cpuBey.stats.attack, 0) + safeNum(cpuBey.tempAttack, 0); let cDef = safeNum(cpuBey.stats.defense, 0) + safeNum(cpuBey.tempDefense, 0); let cEnd = safeNum(cpuBey.stats.endurance, 0) + safeNum(cpuBey.tempEndurance, 0);

                let pDmgToC_HP = Math.max(0.5, (pAtk * 0.5) + (impactSpeed * 1.0) - (cDef * 0.4));
                let pDmgToC_RPM = Math.max(1.0, (pAtk * impactSpeed * 0.3) - (cEnd * 0.8));
                let cDmgToP_HP = Math.max(0.5, (cAtk * 0.5) + (impactSpeed * 1.0) - (pDef * 0.4));
                let cDmgToP_RPM = Math.max(1.0, (cAtk * impactSpeed * 0.3) - (pEnd * 0.8));

                // 1. Calculate the actual damage AFTER the opponent's resistance is applied
				let finalDamageToCpu = pDmgToC_HP * (1 - safeNum(cpuBey.stats.hpDamageResist, 0));
				let finalDamageToPlayer = cDmgToP_HP * (1 - safeNum(playerBey.stats.hpDamageResist, 0));

				// 2. Subtract that final damage from the HP pools
				playerBey.currentHp -= finalDamageToPlayer;
				cpuBey.currentHp -= finalDamageToCpu;

				// 3. Apply the RPM damage (Exactly how you already had it)
				playerBey.currentRpm -= cDmgToP_RPM * (1 - safeNum(playerBey.stats.rpmDamageResist, 0));
				cpuBey.currentRpm -= pDmgToC_RPM * (1 - safeNum(cpuBey.stats.rpmDamageResist, 0));

				// 4. Update the match stats with the TRUE damage you dealt!
				matchStats.totalDamageDealt += finalDamageToCpu;

                let pRecoilStat = safeNum(playerBey.stats.recoil, 0); let pRecoilReduc = safeNum(playerBey.stats.recoilReduction, 0) + safeNum(playerBey.tempRecoilReduction, 0);
                let cRecoilStat = safeNum(cpuBey.stats.recoil, 0); let cRecoilReduc = safeNum(cpuBey.stats.recoilReduction, 0) + safeNum(cpuBey.tempRecoilReduction, 0);
                
                let pRecoilDmg = Math.max(0, (pDmgToC_HP * (pRecoilStat * 0.02)) - (pRecoilReduc * 0.1)) * (1 + playerBey.wobbleFactor);
                let cRecoilDmg = Math.max(0, (cDmgToP_HP * (cRecoilStat * 0.02)) - (cRecoilReduc * 0.1)) * (1 + cpuBey.wobbleFactor);

                playerBey.currentHp -= pRecoilDmg; playerBey.currentRpm -= pRecoilDmg * 2; 
                cpuBey.currentHp -= cRecoilDmg; cpuBey.currentRpm -= cRecoilDmg * 2;
                
                playerBey.currentHp = Math.max(0, playerBey.currentHp);
                cpuBey.currentHp = Math.max(0, cpuBey.currentHp);

                if (playerBey.currentHp === 0 && !playerBey.isBursted) triggerBurst(playerBey, impactSpeed, -nx, -ny);
                if (cpuBey.currentHp === 0 && !cpuBey.isBursted) triggerBurst(cpuBey, impactSpeed, nx, ny);

                p1Spirit += (impactSpeed * 0.2) * (1 + (safeNum(playerBey.stats.spiritCharge, 0)/100));

		// --- TELL THE TUTORIAL A COLLISION HAPPENED ---
                if (TutorialManager.isActive && TutorialManager.tutorialType === "combat") {
                    let usedSpecial = playerBey.tutorialSpecialUsed || false;
                    TutorialManager.registerCollision(usedSpecial);
                    playerBey.tutorialSpecialUsed = false; // Reset it after registering
                }
            }
        }

        // --- THE FIX: TUTORIAL INVINCIBILITY ---
        // Constantly regenerate HP and RPM during the lesson so nobody dies,
        // UNLESS they fall into a stadium pocket (ringOut)!
        if (window.ActiveTutorial) {
            if (playerBey && !playerBey.ringOut) {
                playerBey.currentHp = playerBey.maxHp;
                playerBey.currentRpm = playerBey.maxRpm;
            }
            if (cpuBey && !cpuBey.ringOut) {
                cpuBey.currentHp = cpuBey.maxHp;
                cpuBey.currentRpm = cpuBey.maxRpm;
            }
        }
    }

    function drawBattle(timestamp) {
        drawArena(); 
        
        // --- DRAW BALLOONS ---
        activeBalloons.forEach((b, i) => {
            let wobbleZ = b.baseZ + Math.sin(timestamp * 0.005 + i) * 5; 
            let scale = 1 + (wobbleZ * 0.003);
            let rSize = 75 * scale; 
            
            ctx.save();
            // Drop shadow
            ctx.beginPath();
            ctx.ellipse(b.x, b.y, 25, 12, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,0,0, 0.3)`;
            ctx.fill();
            
            // Image
            ctx.translate(b.x, b.y - wobbleZ);
            ctx.drawImage(balloonImg, -rSize/2, -rSize/2, rSize, rSize);
            ctx.restore();
        });

        function drawBey(bey) {
            if (!bey || bey.isGhost) return; 
            if (bey.isBursted || (bey.currentHp <= 0 && !bey.ringOut)) return; 
            
			
			// IF AIMING: Draw the Reticle and STOP drawing the Beyblade!
            if (bey.skillState && bey.skillState.actionState === "TELEPORT_AIM") {
                ctx.save();
                ctx.beginPath();
                ctx.arc(bey.skillState.tpTargetX, bey.skillState.tpTargetY, bey.radius * 2, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(255, 0, 0, 0.8)";
                ctx.lineWidth = 3;
                ctx.setLineDash([8, 4]); // Dashed sci-fi circle
                ctx.stroke();
                
                // Inner Crosshair
                ctx.beginPath();
                ctx.moveTo(bey.skillState.tpTargetX - 15, bey.skillState.tpTargetY);
                ctx.lineTo(bey.skillState.tpTargetX + 15, bey.skillState.tpTargetY);
                ctx.moveTo(bey.skillState.tpTargetX, bey.skillState.tpTargetY - 15);
                ctx.lineTo(bey.skillState.tpTargetX, bey.skillState.tpTargetY + 15);
                ctx.stroke();
                ctx.restore();
                return; // DO NOT draw the beyblade!
            }
			
			
            let isFallen = (bey.currentRpm <= 0 && bey.currentHp > 0 && !bey.ringOut);
            let wobbleOffsetX = 0; let wobbleOffsetY = 0;
            
            if (isFallen) {
                bey.rotation = Math.sin(timestamp * 0.01) * 0.35;
                wobbleOffsetX = Math.sin(timestamp * 0.01) * 2;
            } 
            else if (bey.wobbleFactor > 0) {
                let wobbleSpeed = timestamp * 0.05; 
                wobbleOffsetX = Math.sin(wobbleSpeed) * (bey.wobbleFactor * 4);
                wobbleOffsetY = Math.cos(wobbleSpeed * 1.3) * (bey.wobbleFactor * 4);
            }

            // 1. Z-AXIS AND SCALE MATH
            let renderZ = bey.z || 0;
            let skillZ = (bey.skillState && bey.skillState.z) ? bey.skillState.z : 0;
            let totalZ = renderZ + skillZ;

            let scale = 1 + (totalZ * 0.003); 
            let activeVisualRadius = bey.visualRadius || bey.radius;
            let renderSize = activeVisualRadius * 8.0 * scale;

            // 2. DRAW THE SHADOW ON THE FLOOR
            if (totalZ > 0) {
                ctx.save();
                ctx.beginPath();
                let shadowScale = Math.max(0.2, 1 - (totalZ / 400));
                ctx.ellipse(bey.x, bey.y, bey.radius * shadowScale, (bey.radius * 0.5) * shadowScale, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0,0,0, ${Math.max(0.1, 0.4 * shadowScale)})`;
                ctx.fill();
                ctx.restore();
            }

            // 3. MAIN BEYBLADE RENDERING BLOCK
            ctx.save(); // Lock the canvas

            // A. Move the canvas directly over the Beyblade and Lift it up!
            let visualLift = totalZ * 1.5; 
            ctx.translate(bey.x + wobbleOffsetX, bey.y + wobbleOffsetY - visualLift);

            // B. Apply the Uppercut Tilt!
            if (bey.skillState) {
                let tiltX = bey.skillState.visualTiltX || 0;
                let tiltY = bey.skillState.visualTiltY || 0;
                if (tiltX !== 0 || tiltY !== 0) {
                    ctx.transform(1, tiltY, tiltX, 1, 0, 0); 
                }
            }

            // C. Apply Scale and Opacity
            if (bey.opacity !== undefined) ctx.globalAlpha = bey.opacity;
            if (bey.scale !== undefined) ctx.scale(bey.scale, bey.scale);
            
            let rpmRatio = bey.maxRpm > 0 ? bey.currentRpm / bey.maxRpm : 0;
            let windFactor = 0;
            
            if (rpmRatio > 0.5) {
                windFactor = Math.min(1.0, (rpmRatio - 0.5) / 0.2); 
            }
            
            if (windFactor > 0 && !isFallen && !bey.isBursted && bey.windStreaks) {
                ctx.save();
                ctx.scale(1, 0.9); 
                ctx.globalCompositeOperation = 'screen';
                
                for (let streak of bey.windStreaks) {
                    streak.angle += streak.speed * bey.spinDir; 
                    let wobble = Math.sin(timestamp * streak.wobbleSpeed + streak.wobbleOffset) * 0.05;
                    let currentScale = streak.radiusScale + wobble;
                    let wSize = windSpriteSize * currentScale * scale; 

                    ctx.save();
                    ctx.rotate(streak.angle);
                    ctx.globalAlpha = streak.maxAlpha * windFactor; 
                    ctx.drawImage(windSprite, -wSize / 2, -wSize / 2, wSize, wSize);
                    ctx.restore();
                }
                ctx.restore();
            }
               

            // --- THE FIX: DRAW THE ACTIVE ATTACK LAYER ON TOP ---
            if (bey.passiveAura) {
                ctx.save();
                ctx.scale(1, 0.95); 
                ctx.globalCompositeOperation = 'screen'; 
                ctx.beginPath();
      
                // 1. Check if a custom size was provided. If not, default to 0.48!
                let auraSizeMod = bey.passiveAuraSize || 0.48;
                
                // 2. Use that custom modifier for the radius!
                ctx.arc(0, 0, renderSize * auraSizeMod, 0, Math.PI * 2);
                
                ctx.fillStyle = bey.passiveAura;
                ctx.shadowBlur = 20; 
                ctx.shadowColor = bey.passiveAura;
                ctx.fill();
                ctx.restore();
            }

            // --- THE FIX: DRAW THE ACTIVE ATTACK LAYER ON TOP ---
            if (bey.activeAura && bey.activeAuraDuration > 0) {
                ctx.save();
                ctx.scale(1, 0.95); 
                ctx.globalCompositeOperation = 'screen'; 
                let pulse = 1 + Math.sin(timestamp * 0.02) * 0.08;
                let fade = Math.min(1.0, bey.activeAuraDuration / 200); 
                
                ctx.beginPath();
                ctx.arc(0, 0, (renderSize * 0.45) * pulse, 0, Math.PI * 2);
                ctx.fillStyle = bey.activeAura;
                ctx.globalAlpha = fade * 0.8; 
                ctx.shadowBlur = 30; 
                ctx.shadowColor = bey.activeAura;
                ctx.fill();
                ctx.restore();
            }
                
            if (isFallen) {
                ctx.scale(1, 0.45); 
                ctx.translate(0, renderSize * 0.15); 
            }
            
            ctx.beginPath(); ctx.arc(0, 0, bey.radius * scale, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fill();
			
			
			            // --- PHANTOM WARP VISUALS ---
            let isTpOut = bey.skillState && bey.skillState.actionState === "TELEPORT_OUT";
            let isTpIn = bey.skillState && bey.skillState.actionState === "TELEPORT_IN";
            
            if (isTpOut || isTpIn) {
                let progress = 1 - (bey.skillState.tpTimer / 600); // Goes from 0.0 to 1.0
                if (isTpIn) progress = 1 - progress; // Reverses for teleporting back in
                
                // 1. Draw the Expanding Red Beam
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                let beamRadius = bey.radius * 2 + (progress * 25);
                let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, beamRadius);
                grad.addColorStop(0, `rgba(255, 0, 0, ${1 - progress})`);
                grad.addColorStop(1, `rgba(255, 0, 0, 0)`);
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(0, 0, beamRadius, 0, Math.PI*2); ctx.fill();
                ctx.restore();

                // 2. Apply the Silhouette Filter!
                // brightness(0) turns it pitch black. opacity fades it out to invisible!
                ctx.filter = `brightness(0) opacity(${1 - progress})`;
            }
			
			
			// --- HAMMER IMPACT SWEEP VISUAL ---
            if (bey.skillState && bey.skillState.actionState === "HAMMER_SWING") {
                ctx.save();
                
                // 1. Calculate how far along the 350ms swing we are (0.0 to 1.0)
                let sweepProgress = 1 - (bey.skillState.hammerTimer / 200);
                sweepProgress = Math.max(0, Math.min(1, sweepProgress)); // Keep it safely bound
                
                // 2. Calculate the exact angle (Full circle = Math.PI * 2)
                let currentAngle = sweepProgress * (Math.PI * 2);
                
                // 3. Determine direction based on your engine's spin property
                let spin = bey.spinDirection || "right"; 
                let isCW = (spin === "right" || spin === "cw" || bey.spinDir === 1);
                
                // Start the sweep at the "top" (12 o'clock)
                let startAngle = -Math.PI / 2; 
                let endAngle = startAngle + (isCW ? currentAngle : -currentAngle);

                ctx.beginPath();
                // arc(x, y, radius, startAngle, endAngle, counterclockwise boolean)
                // The radius is pushed slightly past the standard edge (0.6) to represent the +1 extended reach!
                ctx.arc(0, 0, renderSize * 0.2, startAngle, endAngle, !isCW);
                
                ctx.lineWidth = 15 * scale; // Thick, heavy energy ring
                ctx.lineCap = "butt"; // This forces the flat, blunt "loading bar" edge!
                ctx.strokeStyle = "rgba(255, 69, 0, 0.9)"; // Searing Red-Orange
                ctx.shadowBlur = 20;
                ctx.shadowColor = "rgba(255, 69, 0, 0.7)";
                ctx.stroke();
                
                ctx.restore();
            }
			
			
			// ==========================================
            // --- STONETIP RIPPLE VISUALS ---
            // ==========================================
            if (bey.skillState) {
                
                // 1. DRAWING THE CHARGE PHASE
                if (bey.skillState.actionState === "STONETIP_CHARGING") {
                    ctx.save();
                    
                    // A. The Pulsing Indicator Circle
                    // Pulses between opacity 0.2 and 0.6
                    let pulseAlpha = 0.4 + Math.sin(Date.now() * 0.005) * 0.2; 
                    
                    ctx.beginPath();
                    ctx.arc(0, 0, bey.skillState.expectedAoeSize * scale, 0, Math.PI * 2);
                    ctx.lineWidth = 4 * scale;
                    // Fades between gray and white based on the pulse
                    ctx.strokeStyle = `rgba(200, 200, 200, ${pulseAlpha})`; 
                    ctx.setLineDash([10, 10]); // Dashed indicator line
                    ctx.stroke();

                    // B. The Orbiting Amber Particles
                    if (bey.skillState.orbitParticles) {
                        for (let p of bey.skillState.orbitParticles) {
                            // Calculate their exact X/Y based on their current angle
                            let px = Math.cos(p.angle) * p.distance * scale;
                            let py = Math.sin(p.angle) * p.distance * scale;
                            
                            ctx.beginPath();
                            ctx.arc(px, py, p.size * scale, 0, Math.PI * 2);
                            ctx.fillStyle = "rgba(255, 191, 0, 0.9)"; // Amber
                            ctx.shadowBlur = 10;
                            ctx.shadowColor = "rgba(255, 140, 0, 1)"; // Dark Orange Glow
                            ctx.fill();
                        }
                    }
                    ctx.restore();
                }

                // 2. DRAWING THE EXPANDING WAVE
                else if (bey.skillState.actionState === "STONETIP_WAVE") {
                    ctx.save();
                    
                    // Fade out as it reaches its apex
                    let waveAlpha = Math.max(0, bey.skillState.waveTimer / 400); 

                    ctx.beginPath();
                    ctx.arc(0, 0, bey.skillState.waveRadius * scale, 0, Math.PI * 2);
                    ctx.lineWidth = 15 * waveAlpha * scale; // Line gets thinner as it fades
                    ctx.strokeStyle = `rgba(218, 165, 32, ${waveAlpha})`; // Goldenrod
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = "rgba(184, 134, 11, 1)"; // Dark Goldenrod
                    ctx.stroke();
                    
                    // Add a faint fill to the AoE
                    ctx.fillStyle = `rgba(218, 165, 32, ${waveAlpha * 0.2})`;
                    ctx.fill();

                    ctx.restore();
                }
            }
			
			// ==========================================
            // --- CIRCLE SLASH MULTI-LAYER CRESCENT ---
            // ==========================================
            if (bey.skillState && bey.skillState.csSlash && bey.skillState.csSlash.timer > 0) {
                let slash = bey.skillState.csSlash;
                
                ctx.save();
                
                // 1. Move canvas to the center of the SLASH (not the beyblade!)
                ctx.translate(slash.cx - bey.x, slash.cy - bey.y); 
                
                // 2. Fade out smoothly as the timer dies
                ctx.globalAlpha = Math.min(1.0, slash.timer / 200);

                let farAngle = slash.startAngle + Math.PI; 
                let baseRadius = slash.radius * scale;

                // 3. Define the Energy Layers! 
                // We use an array so we can draw multiple streaks with different properties.
                // rMod shifts the line slightly inward/outward. angleJitter makes the tips jagged.
                const layers = [
                    // Layer 1: Thick, faint outer gray glow
                    { rMod: 4, width: 16, color: "rgba(105, 105, 105, 0.4)", blur: 20, angleJitter: 0.12 },
                    // Layer 2: Core dark gray structure
                    { rMod: 1, width: 10, color: "rgba(169, 169, 169, 0.8)", blur: 10, angleJitter: 0.05 },
                    // Layer 3: Vibrant red inner streak
                    { rMod: -2, width: 8, color: "rgba(255, 20, 60, 0.9)", blur: 15, angleJitter: 0.18 },
                    // Layer 4: Bright, hot center core (pure red/white) to give it intense energy
                    { rMod: -4, width: 4, color: "rgba(255, 100, 100, 1.0)", blur: 5, angleJitter: 0.0 }
                ];

                // 4. Loop through and draw every layer on top of each other
                layers.forEach((layer) => {
                    ctx.beginPath();
                    
                    // We apply the 'angleJitter' so the layers don't start/end at the exact same pixel.
                    // This creates the brushed, streaky look at the tips of the crescent!
                    let start = (farAngle - (Math.PI / 2)) + layer.angleJitter;
                    let end = (farAngle + (Math.PI / 2)) - layer.angleJitter;

                    // arc(x, y, radius, startAngle, endAngle, counterclockwise boolean)
                    ctx.arc(0, 0, baseRadius + (layer.rMod * scale), start, end, false);

                    ctx.lineWidth = layer.width * scale;
                    ctx.lineCap = "round"; // This tapers the ends of the streaks nicely
                    ctx.strokeStyle = layer.color;
                    ctx.shadowBlur = layer.blur;
                    ctx.shadowColor = layer.color;
                    ctx.stroke();
                });

                ctx.restore();
            }
			

            ctx.rotate(bey.rotation);

            if (bey.images) {
                if (bey.images.bb) ctx.drawImage(bey.images.bb, -renderSize/2, -renderSize/2, renderSize, renderSize);
                if (bey.images.sg) ctx.drawImage(bey.images.sg, -renderSize/2, -renderSize/2, renderSize, renderSize);
                if (bey.images.wd) ctx.drawImage(bey.images.wd, -renderSize/2, -renderSize/2, renderSize, renderSize);
                if (bey.images.sar) ctx.drawImage(bey.images.sar, -renderSize/2, -renderSize/2, renderSize, renderSize);                 
                if (bey.images.ar) ctx.drawImage(bey.images.ar, -renderSize/2, -renderSize/2, renderSize, renderSize);
                if (bey.images.bc) ctx.drawImage(bey.images.bc, -renderSize/2, -renderSize/2, renderSize, renderSize);
            }
            
			
			// REMOVE THE FILTER so it doesn't affect other elements on the canvas!
            ctx.filter = 'none'; 

            ctx.restore(); // <--- Ends the rendering block for the physical Beyblade


			// ==========================================
            // --- CIRCLE SLASH IMAGE SEQUENCE ---
            // ==========================================
            if (bey.skillState && bey.skillState.csSlash && bey.skillState.csSlash.timer > 0) {
                let slash = bey.skillState.csSlash;
                
                // 1. Calculate frame index (0 to 5) based on the timer progress
                let progress = 1 - (slash.timer / 350); 
                progress = Math.max(0, Math.min(1, progress)); 
                let frameIndex = Math.min(5, Math.floor(progress * 6)); 
                
                let img = window.circleSlashImages ? window.circleSlashImages[frameIndex] : null;

                if (img && img.complete) {
					console.log("DRAWING SLASH FRAME:", frameIndex);
                    ctx.save();
                    
                    // 2. Center the canvas on the Slash's Anchor Point (relative to the Beyblade!)
                    ctx.translate(slash.cx - bey.x, slash.cy - bey.y); 
                    
                    // 3. Calculate Rotation
                    // farAngle is the true direction the slash was thrown
                    let farAngle = slash.startAngle + Math.PI; 
                    
                    // HTML Canvas 0 radians faces EAST (Right). 
                    // Because your artwork faces NORTH (Up), we add 90 degrees (Math.PI / 2) 
                    // to perfectly align your image's North with the attack direction!
                    ctx.rotate(farAngle + (Math.PI / 2));
                    
                    ctx.globalCompositeOperation = 'screen'; 
                    ctx.globalAlpha = Math.min(1.0, slash.timer / 150); // Fade out at the very end
                    
                    // Optional: Add a slight red glow behind your PNG
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "rgba(255, 20, 60, 1)";
                    
                    // 4. Draw using renderSize to perfectly match the 1:1 scale of the Beyblade canvas
                    ctx.drawImage(img, -renderSize/2, -renderSize/2, renderSize, renderSize);
                    
                    ctx.restore();
                }
            }


            // =======================================================
            // ---> 2. MODULAR ANIMATION OVERLAY (BOOST DASH) <---
            // =======================================================
            if (bey.activeOverlayAnim) {
                let anim = bey.activeOverlayAnim;
                let img = getAnimFrame(anim);
                
                // Track the last known angle so it doesn't snap to 0 when stopped
                let currentSpeed = Math.sqrt(bey.vx**2 + bey.vy**2);
                if (currentSpeed > 0.1) {
                    bey.lastMoveAngle = Math.atan2(bey.vy, bey.vx);
                }
                
                // Add 90 degrees (Math.PI / 2) because your art faces NORTH!
                let drawAngle = (bey.lastMoveAngle || 0) + (Math.PI / 2);

                ctx.save();
                // Move to the Beyblade's actual 3D altitude!
                ctx.translate(bey.x + wobbleOffsetX, bey.y + wobbleOffsetY - renderZ);
                ctx.rotate(drawAngle);
                
                // Blend mode to make fireballs look hot and glowy!
                ctx.globalCompositeOperation = 'screen'; 
                
                // 1. Check if the attack requested a specific opacity, otherwise default to 1.0 (fully solid)
                let maxOpacity = anim.opacity !== undefined ? anim.opacity : 1.0;
                
                // 2. Calculate the smooth fade-out at the end (goes from 1.0 down to 0.0)
                let fade = Math.min(1.0, anim.duration / 200); 
                
                // 3. Multiply them together! 
                // If maxOpacity is 0.65, it stays at 0.65 until the very end, then fades to 0!
                ctx.globalAlpha = fade * maxOpacity;
                
                // Draw it roughly 2.2x the size of the Beyblade so it engulfs it
                let overlaySize = renderSize * 2.2; 
                if (img && img.complete) {
                    ctx.drawImage(img, -overlaySize/2, -overlaySize/2, overlaySize, overlaySize);
                }
                
				ctx.restore();
            }

            if (bey.wobbleFactor > 0.5 && !isFallen) {
                ctx.beginPath(); ctx.arc(bey.x + wobbleOffsetX, bey.y + wobbleOffsetY, bey.radius * scale, 0, Math.PI * 2);
                ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 2; ctx.stroke();
            }

            if (bey.visualText) {
                ctx.fillStyle = bey.visualTextColor; ctx.font = 'bold 16px Arial';
                ctx.fillText(bey.visualText, bey.x - 40, bey.y - 30);
            }
        }

        // --- DYNAMIC Z-SORTING (Depth rendering) ---
        let renderQueue = [playerBey, cpuBey];
        
        // Sort them so the Beyblade with the lowest Z is drawn first (in the back),
        // and the Beyblade with the highest Z is drawn last (on top of everything else!)
        renderQueue.sort((a, b) => {
            let aZ = (a.z || 0) + (a.skillState ? (a.skillState.z || 0) : 0);
            let bZ = (b.z || 0) + (b.skillState ? (b.skillState.z || 0) : 0);
            return aZ - bZ;
        });

        // Loop through the sorted array and draw them
        renderQueue.forEach(bey => drawBey(bey));
		
		// --- DRAW PROJECTILES & HIT EFFECTS ---
        ctx.globalCompositeOperation = 'screen';
        activeProjectiles.forEach(proj => {
            let img = getAnimFrame(proj.anim);
            if (img && img.complete) {
                ctx.save(); ctx.translate(proj.x, proj.y); ctx.rotate(proj.angle);
                ctx.drawImage(img, -80, -80, 160, 160); // TWEAKABLE: Size of projectile
                ctx.restore();
            }
        });
        activeHitEffects.forEach(effect => {
            let img = getAnimFrame(effect.anim);
            if (img && img.complete) {
                ctx.save(); ctx.translate(effect.x, effect.y); ctx.rotate(effect.angle);
                ctx.drawImage(img, -100, -100, 200, 200); // TWEAKABLE: Size of Hit Effect
                ctx.restore();
            }
        });
        ctx.globalCompositeOperation = 'source-over'; // Reset blend mode
        
        for (let i = 0; i < burstParticles.length; i++) {
            let bp = burstParticles[i];
            bp.x += bp.vx; bp.y += bp.vy;
            bp.vx *= bp.friction; bp.vy *= bp.friction; 
            bp.rotation += bp.rotSpeed; bp.rotSpeed *= bp.friction; 
            
            ctx.save();
            ctx.translate(bp.x, bp.y); ctx.rotate(bp.rotation);
            ctx.drawImage(bp.img, -bp.size/2, -bp.size/2, bp.size, bp.size);
            ctx.restore();
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life -= p.decay; 
            if (p.life <= 0) { particles.splice(i, 1); } 
            else {
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0; 
            }
        }
    }

    function checkRoundCondition() {
        if (roundConcluding) return; 
        
        if (window.ActiveTutorial) return; // Never auto-end during tutorials

        let pAlive = playerBey.currentHp > 0 && playerBey.currentRpm > 0 && !playerBey.ringOut;
        let cAlive = cpuBey.currentHp > 0 && cpuBey.currentRpm > 0 && !cpuBey.ringOut;
        let timeOut = matchTimerMs <= 0;

        if (!pAlive || !cAlive || timeOut) {
            roundConcluding = true;
            roundConcludeTimer = 2500; 
        }
    }

	function processRoundWinner() {
        gameState = "ROUND_OVER";
        
        if (playerBey && playerBey.spinSFX) { playerBey.spinSFX.pause(); playerBey.spinSFX = null; }
        if (cpuBey && cpuBey.spinSFX) { cpuBey.spinSFX.pause(); cpuBey.spinSFX = null; }
        
        let winner = "DRAW";
        let finishType = "SPIN"; // Default
        
        let pAlive = playerBey.currentHp > 0 && playerBey.currentRpm > 0 && !playerBey.ringOut;
        let cAlive = cpuBey.currentHp > 0 && cpuBey.currentRpm > 0 && !cpuBey.ringOut;
        let timeOut = matchTimerMs <= 0;

        // 1. Determine Winner and Finish Type
        if (timeOut) {
            let pPercent = (playerBey.currentHp / playerBey.maxHp) + (playerBey.currentRpm / playerBey.maxRpm);
            let cPercent = (cpuBey.currentHp / cpuBey.maxHp) + (cpuBey.currentRpm / cpuBey.maxRpm);
            winner = pPercent > cPercent ? "PLAYER" : (cPercent > pPercent ? "CPU" : "DRAW");
        } else if (pAlive && !cAlive) {
            winner = "PLAYER";
            if (cpuBey.ringOut) finishType = "RING_OUT";
            else if (cpuBey.currentHp <= 0) finishType = "BURST";
        } else if (cAlive && !pAlive) {
            winner = "CPU";
            if (playerBey.ringOut) finishType = "RING_OUT";
            else if (playerBey.currentHp <= 0) finishType = "BURST";
        } else if (!pAlive && !cAlive) {
            // Both died at the exact same time
            winner = "DRAW";
            if (playerBey.ringOut || cpuBey.ringOut) finishType = "RING_OUT";
            else if (playerBey.currentHp <= 0 || cpuBey.currentHp <= 0) finishType = "BURST";
        }

        // 2. Setup the Visuals based on Finish Type
        let titleText = "DRAW";
        let gradientClass = "spin-finish"; 
        
        if (finishType === "SPIN") { titleText = "SPIN FINISH!"; gradientClass = "spin-finish"; }
        else if (finishType === "BURST") { titleText = "BURST FINISH!"; gradientClass = "burst-finish"; }
        else if (finishType === "RING_OUT") { titleText = "RING OUT FINISH!"; gradientClass = "ring-out-finish"; }

        // 3. Update Scores and Build the Subtitle
        let subtitleText = "It's a Tie!";
        if (winner === "PLAYER") {
            p1Score++; 
            document.getElementById(`p1-pt${p1Score}`).classList.add('filled');
            matchStats.playerScore = p1Score;
            
            if (playerBey.currentHp >= playerBey.maxHp) matchStats.perfectRounds++;
            if (playerBey.currentHp / playerBey.maxHp <= 0.25 || playerBey.currentRpm / playerBey.maxRpm <= 0.25) matchStats.turnaboutsAchieved++;                
            
            let pName = window.PlayerData ? (window.PlayerData.accountName || "Player") : "Player";
            subtitleText = `${pName} WINS A POINT!`;
            
        } else if (winner === "CPU") {
            cpuScore++; 
            document.getElementById(`cpu-pt${cpuScore}`).classList.add('cpu-filled'); 
            matchStats.cpuScore = cpuScore; 
            
            let cName = cpuData ? cpuData.name : "CPU";
            subtitleText = `${cName} WINS A POINT!`;
        }

        // 4. Inject the HTML into the Overlay
        let resultOverlay = document.getElementById('next-round-overlay');
        resultOverlay.innerHTML = `
            <div class="finish-title ${gradientClass}">${titleText}</div>
            <div class="finish-subtitle">${subtitleText}</div>
            <div style="font-size: 24px; color: #fff; animation: blink 1.5s infinite;">Click anywhere to continue...</div>
        `;

        matchStats.roundsPlayed++;
        matchStats.totalTimeElapsed += (120000 - Math.max(0, matchTimerMs)); 

        resultOverlay.style.display = 'flex'; 
    }

	window.advanceMatch = function() {
        document.getElementById('next-round-overlay').style.display = 'none';
        
        // Check if the overall match is over (someone hit 3 points)
        if (p1Score >= 3 || cpuScore >= 3) {
            
            // --- NEW: THE MATCH-END INTERCEPTOR ---
            if (window.CourseManager && window.CourseManager.isActive) {
                // 🛑 ABORT NORMAL ROUTING! Let the Course logic handle it!
                window.processCourseMatchEnd(p1Score, cpuScore);
            } else {
                // 🟢 Normal Free Battle/Story routing
                if (p1Score >= 3) { endMatch("YOU WIN!", "#00ffff"); } 
                else if (cpuScore >= 3) { endMatch("YOU LOSE...", "#ff4400"); } 
            }
            
        } else {
            // No one has 3 points yet. Keep fighting!
            resetRound(); 
        }
    }
	
	
	// ==========================================
    // --- COURSE ADVANCEMENT ENGINE ---
    // ==========================================
    window.processCourseMatchEnd = function(playerScore, cpuScore) {
        let didPlayerWin = playerScore >= 3; 

        if (!didPlayerWin) {
            alert("You were defeated! Course Failed.");
            window.PlayerData.activeCourse = null;
            if (window.savePlayerData) window.savePlayerData();
            window.navigateTo('coursebattle.html'); 
            return;
        }

        let course = window.CourseManager.courseData;
        let currentIndex = window.CourseManager.currentStageIndex;
        let currentStage = course.stages[currentIndex];

        // 1. Advance the Stage Index
        let nextIndex = currentIndex + 1;
        window.PlayerData.activeCourse.currentStageIndex = nextIndex;
        let nextStage = course.stages[nextIndex];

        // 2. Check for Scenes
        let pendingScene = null;
        if (currentStage.postScene) {
            pendingScene = currentStage.postScene; // Boss defeated scene
        } else if (nextStage && nextStage.preScene) {
            pendingScene = nextStage.preScene; // Next opponent intro scene
        }

        // 3. CRITICAL FIX: Update the SPA's memory NO MATTER WHAT!
        window.PlayerData.activeCourse.pendingScene = pendingScene;

        // 4. FIREBASE AUTOSAVE (Checkpoint System)
        if (window.CurrentUser && window.PlayerData.activeCourse) {
            // We use standard try/catch so a network blip doesn't crash the transition
            try {
                // Note: Make sure 'db', 'doc', and 'updateDoc' are imported at the top of arena.html!
                const userRef = doc(db, "users", window.CurrentUser.uid);
                
                // Push the exact state of the course (including their new stage index and carried-over HP)
                updateDoc(userRef, { 
                    activeCourse: window.PlayerData.activeCourse 
                }).then(() => {
                    console.log(`Course Checkpoint Saved: Stage ${nextIndex}`);
                });
            } catch (error) {
                console.error("Autosave failed, but letting player continue:", error);
            }
        }

        // 5. Route the Player
        if (pendingScene) {
            // We have dialogue! Route to Adventure engine.
            window.navigateTo('adventure.html');
        } else if (!nextStage) {
            // ==========================================
            // 🎉 COURSE CLEARED LOGIC
            // ==========================================
            let unlockedNames = [];
            let unlockedPartNames = [];
            
            // 1. Process Opponent Unlocks
            if (course.unlockOpponents) {
                if (!window.PlayerData.unlockedOpponents) window.PlayerData.unlockedOpponents = [];
                
                course.unlockOpponents.forEach(oppId => {
                    if (!window.PlayerData.unlockedOpponents.includes(oppId)) {
                        window.PlayerData.unlockedOpponents.push(oppId);
                        
                        let oppData = window.opponentsDB ? window.opponentsDB.find(o => o.id === oppId) : null;
                        if (oppData) unlockedNames.push(oppData.name);
                    }
                });
            }

            // 2. Process Part Unlocks
            if (course.unlockParts && Array.isArray(course.unlockParts)) {
                if (!window.PlayerData.unlockedStyles) window.PlayerData.unlockedStyles = [];

                course.unlockParts.forEach(reward => {
                    // A. Ensure the category array exists in the player's inventory
                    if (!window.PlayerData[reward.partType]) {
                        window.PlayerData[reward.partType] = [];
                    }

                    // B. Grant the Base Part ID if they don't have it
                    if (!window.PlayerData[reward.partType].includes(reward.id)) {
                        window.PlayerData[reward.partType].push(reward.id);
                    }

                    // C. Grant the specific Style ID
                    if (reward.styleId && !window.PlayerData.unlockedStyles.includes(reward.styleId)) {
                        window.PlayerData.unlockedStyles.push(reward.styleId);
                    }

                    // D. Fetch the name for the Alert Box (Safely)
                    if (window.equipmentDB && window.equipmentDB[reward.partType]) {
                        let partData = window.equipmentDB[reward.partType].find(p => p.id === reward.id);
                        if (partData) {
                            let styleName = "";
                            if (reward.styleId && partData.styles) {
                                let styleObj = partData.styles.find(s => s.styleId === reward.styleId);
                                if (styleObj) styleName = styleObj.styleName;
                            }
                            unlockedPartNames.push(styleName || partData.name);
                        } else {
                            unlockedPartNames.push(reward.id); // Fallback
                        }
                    }
                });
            }

            // 3. Pay the BP & Clear the run
            window.PlayerData.bp += course.rewardBP;
            window.PlayerData.activeCourse = null;

            if (window.savePlayerData) window.savePlayerData();

            // 4. Alert the player and kick them to the menu!
            let alertMsg = `COURSE CLEARED!\nEarned ${course.rewardBP} BP!`;
            
            if (unlockedNames.length > 0) {
                alertMsg += `\n\nUnlocked Opponents:\n${unlockedNames.join(", ")}`;
            }
            if (unlockedPartNames.length > 0) {
                alertMsg += `\n\nAcquired New Parts:\n${unlockedPartNames.join("\n")}`;
            }
            
            alert(alertMsg);
            
            window.navigateTo('coursebattle.html');
            // ==========================================
            
        } else {
            // No scenes. Seamlessly transition to the next battle!
            window.triggerSeamlessNextStage(nextIndex);
        }
    };

    window.triggerSeamlessNextStage = function(nextIndex) {
        let overlay = document.getElementById('course-splash-overlay');
        document.getElementById('splash-stage-text').innerText = `STAGE ${nextIndex + 1}`;
        
        overlay.style.display = 'flex';
        
        // Fade to black
        setTimeout(() => {
            overlay.style.opacity = '1';
        }, 50);

        // While the screen is black, swap the variables in the background!
        setTimeout(() => {
            window.hotSwapCourseStage(nextIndex);
        }, 600);
        
        // After the swap is done, fade the black screen away
        setTimeout(() => {
            overlay.style.opacity = '0';
        }, 1500);

        // Hide the overlay completely
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 2000);
    };
	
	window.hotSwapCourseStage = function(nextIndex) {
        // 1. Update the Tracker
        window.CourseManager.currentStageIndex = nextIndex;
        let course = window.CourseManager.courseData;
        let nextStage = course.stages[nextIndex];
        
        // 2. Fetch and Overwrite the Opponent
        let newOpponent = window.opponentsDB.find(o => o.id === nextStage.opponent);
        window.ActiveOpponent = newOpponent;
        cpuData = newOpponent; // Overwrite the local arena variable!

        // 3. Reset the Scoreboard & Round Counter
        p1Score = 0;
        cpuScore = 0;
        currentRound = 0; // resetRound() will immediately ++ this to 1
		p1Spirit = 0;
        
        // Reset the UI Pips
        for(let i=1; i<=3; i++) {
            let p1Pip = document.getElementById(`p1-pt${i}`);
            let cpuPip = document.getElementById(`cpu-pt${i}`);
            if(p1Pip) p1Pip.classList.remove('filled');
            if(cpuPip) cpuPip.classList.remove('cpu-filled');
        }
        
        // 4. Manage Health & Stamina based on Course Mode
        if (course.mode === "SURVIVAL") {
            // Keep player HP/RPM exactly where it is, but fully heal the NEW opponent
            cpuBey.currentHp = cpuBey.maxHp;
            cpuBey.currentRpm = cpuBey.maxRpm;
        } else {
            // It's Exhibition. Fully heal everyone for a fair match.
            playerBey.currentHp = playerBey.maxHp;
            playerBey.currentRpm = playerBey.maxRpm;
            cpuBey.currentHp = cpuBey.maxHp;
            cpuBey.currentRpm = cpuBey.maxRpm;
        }
        
        // 5. Re-initialize the Skill Engine to apply new passives
        if (window.SkillEngine && window.SkillEngine.init) {
            window.SkillEngine.init(playerBey, cpuBey);
        }

        // 6. Trigger your existing round reset logic
        resetRound();
    };

    // --- THE FIX: DYNAMIC ROUTING ---
    window.returnFromArena = function() {
        // Did we drop a breadcrumb from adventure.html?
        if (localStorage.getItem('isStoryBattle') === 'true') {
			window.stopArenaAudio(); // <--- Kills the audio before leaving!
            localStorage.removeItem('isStoryBattle'); // Clean up the breadcrumb
            window.navigateTo('adventure.html'); // Go back to the story!
        } else {
            window.navigateTo('beybattle.html'); // Default to free battle
        }
    };

    function resetRound() {
        currentRound++;
        document.getElementById('round-text').innerText = `ROUND ${currentRound}`;
        document.getElementById('ui-layer').style.display = 'none';
        document.getElementById('minigame-overlay').style.display = 'flex';
        
        document.getElementById('launcher-container').style.display = 'none';
        document.getElementById('countdown-text').innerText = '';
        instruction.innerText = "Tap the arena on your side to choose your launch site!";
        
        setupLaunchMinigame(); 
        playerLaunchSite = null;
        cpuLaunchSite = null;
        gameState = "SELECT_LAUNCH";
        
        burstParticles = []; 
        drawArena(); 
    }

    function endMatch(title, color) {
        document.getElementById('ui-layer').style.display = 'none';
        const splash = document.getElementById('splash-screen');
        const titleEl = document.getElementById('splash-title');
        
        document.getElementById('top-info-bar').style.display = 'flex';
        
        splash.style.display = 'flex';
        titleEl.innerText = title;
        titleEl.style.color = color;
        titleEl.style.textShadow = `0 0 20px ${color}`;
        
        localStorage.setItem('postMatchReceipt', JSON.stringify(matchStats));
    }

    function gameLoop(timestamp) {
        if (!lastTime) lastTime = timestamp; 
        let dt = timestamp - lastTime; 
        lastTime = timestamp;
        
        if (isNaN(dt) || dt < 0) dt = 16;
        if (dt > 33) dt = 33; 

        if (gameState === "DROP_IN") {
            updateDropIn(dt);
            updateUI(dt);
        }
        else if (gameState === "BATTLE") {
            if (!roundConcluding) {
                matchTimerMs -= dt;
            } else {
                roundConcludeTimer -= dt;
                if (roundConcludeTimer <= 0) {
                    processRoundWinner();
                    return; 
                }
            }
            updatePhysics(dt);
            updateUI(dt);
            checkRoundCondition();
        }
        
        if (gameState === "BATTLE" || gameState === "DROP_IN") drawBattle(timestamp);
        if (gameState !== "ROUND_OVER") requestAnimationFrame(gameLoop);
    }
    
    drawArena();
	
	if (window.CourseManager && window.CourseManager.isActive) {
        let overlay = document.getElementById('course-splash-overlay');
        if (overlay) {
            document.getElementById('splash-stage-text').innerText = `STAGE ${window.CourseManager.currentStageIndex + 1}`;
            
            // Start with the screen black and text visible
            overlay.style.display = 'flex';
            overlay.style.opacity = '1';

            // Fade away the black screen, leaving the text floating over the stadium
            setTimeout(() => {
                overlay.style.opacity = '0';
            }, 1500);

            // Hide it completely so it doesn't block clicks during the minigame
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 2000);
        }
    }
</script>

<style>
    /* Top Left Back Button */
    .back-btn { 
        position: absolute; 
        top: 15px; 
        left: 15px; 
        background: #333; 
        color: #fff; 
        border: 1px solid #555; 
        padding: 5px 15px; 
        cursor: pointer; 
        border-radius: 4px; 
        font-family: inherit;
        font-size: 14px;
        z-index: 50;
    }
    .back-btn:active { background: #555; }
	
	/* Phase 1: Selection Screen */
    #selection-screen { padding: 20px; text-align: center; height: 100%; box-sizing: border-box; }
    .opp-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-top: 40px; }
    .opp-card { background: #222; border: 2px solid #444; border-radius: 8px; padding: 20px; width: 150px; cursor: pointer; transition: 0.2s; }
    .opp-card.selected { border-color: #ffaa00; background: #332200; transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 170, 0, 0.4); }
    .opp-card h3 { margin: 0 0 10px 0; color: #00aaff; }
    
    #btn-let-it-rip { position: absolute; bottom: 30px; right: 30px; padding: 15px 30px; font-size: 24px; font-weight: bold; font-style: italic; background: #ff4400; color: white; border: none; border-radius: 5px; cursor: pointer; display: none; transition: 0.2s; box-shadow: 0 4px 10px rgba(255, 68, 0, 0.5); }
    #btn-let-it-rip:active { background: #cc3300; transform: scale(0.95); }



    /* Style the portrait */
    #vn-portrait { 
        position: absolute; 
        bottom: 0; 
        left: 50%; 
        transform: translateX(-50%); 
        max-height: 85%; 
        z-index: 5; 
        opacity: 0; 
        transition: opacity 0.5s ease-in-out; 
        pointer-events: none; 
    }

    /* Unified VN Textbox */
    #vn-textbox { position: absolute; bottom: 5%; left: 5%; width: 90%; height: 25%; background: linear-gradient(to bottom, #222, #000); border: 3px solid #ccc; border-radius: 10px; padding: 20px; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 10; }

    /* Phase 2: VN Overlay */
    #vn-overlay { 
        display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background-color: #111; z-index: 10; 
        transition: background-image 0.3s; /* Smooth transition if backgrounds change */
    }
    
    #vn-name { position: absolute; top: -30px; left: 20px; background: #ccc; color: #000; padding: 5px 15px; font-weight: bold; border-radius: 5px 5px 0 0; font-size: 18px; }
    
    /* Updated VN Text (Now Scrollable) */
    #vn-text { 
        font-size: 20px; 
        line-height: 1.5; 
        white-space: pre-wrap; 
        word-wrap: break-word; 
        max-height: 120px; 
        overflow-y: auto; 
        pointer-events: auto; 
        padding-right: 10px; 
    }
    
    /* Custom scrollbar for the receipt */
    #vn-text::-webkit-scrollbar { width: 6px; }
    #vn-text::-webkit-scrollbar-thumb { background: #00aaff; border-radius: 3px; }

    /* The "Return to Arena" Side Decal */
    #return-decal { position: absolute; right: -100px; top: 50%; transform: translateY(-50%); background: rgba(0, 150, 255, 0.2); border: 2px solid rgba(0, 150, 255, 0.6); border-right: none; border-radius: 10px 0 0 10px; color: #fff; padding: 30px 15px; font-family: "Courier New", Courier, monospace; font-weight: bold; font-size: 16px; cursor: pointer; transition: right 0.4s ease-out, background 0.2s; z-index: 30; display: flex; align-items: center; justify-content: center; text-shadow: 1px 1px 0 #000; }
    #return-decal:active { background: rgba(0, 150, 255, 0.5); }
    #return-decal.slide-in { right: 0; }

    #vn-next { position: absolute; bottom: 15px; right: 20px; font-size: 24px; color: #ffaa00; cursor: pointer; display: none; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Phase 3: VS Screen Overlay */
    #vs-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20; justify-content: center; align-items: center; flex-direction: column; cursor: pointer; }
    #vs-text { font-size: 12vw; font-weight: 900; font-style: italic; color: #fff; text-transform: uppercase; transform: rotate(-10deg) scale(5); opacity: 0; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, -3px -3px 0px #ff00ff, 3px 3px 0px #00ffff; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
    #vs-text.slam { transform: rotate(-10deg) scale(1); opacity: 1; }
    #tap-to-battle { margin-top: 50px; font-size: 20px; color: #aaa; animation: blink 1.5s infinite; opacity: 0; transition: opacity 1s; }
</style>

<div id="selection-screen">
    <button class="back-btn" onclick="window.navigateTo('home-menu.html')">Back to Home</button>
    <h2>Select Your Opponent</h2>
    <div class="opp-grid" id="opp-grid">
    </div>
    <button id="btn-let-it-rip">Challenge!</button>
</div>

<div id="vn-overlay">
    <img id="vn-portrait" src="" alt=""> 
    <div id="return-decal" onclick="window.returnToSelection()">
       <br>Opponent Selection<br>▶
    </div>
    <div id="vn-textbox">
        <div id="vn-name">Name</div>
        <div id="vn-text"></div>
        <div id="vn-next" onclick="window.advanceDialogue()">▶</div>
    </div>
</div>

<div id="vs-overlay" onclick="window.enterArena()">
    <div id="vs-text">VS NAME</div>
    <div id="tap-to-battle">Tap screen to battle!</div>
</div>

<script type="module">
    // --- BGM AUDIO SETUP ---
    window.AudioManager.playBGM('./audio/music/Free_To_Challenge_The_Sky_ForFreeBattle.wav', 19.4429575);

    import { db } from './firebase-config.js';
    import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let selectedOpponent = null;
    let dialogueLines = [];
    let currentLineIndex = 0;
    let isTyping = false;
    let typeInterval;
	let vnMode = "PRE_BATTLE";

    // --- Post-Match Payout Logic ---
	// --- Phase 4: Post-Match Flow ---
    function processPostMatch() {
        let stats = JSON.parse(localStorage.getItem('postMatchReceipt'));
        let opp = window.ActiveOpponent || JSON.parse(localStorage.getItem('activeOpponent'));
        
        if (!stats || !opp) {
            window.returnToSelection();
            return;
        }

        // Did the player score 3 points?
        let isWin = stats.playerScore >= 3;
        vnMode = isWin ? "POST_MATCH_WIN" : "POST_MATCH_LOSS";

        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('return-decal').classList.add('slide-in');
        
        const vnOverlay = document.getElementById('vn-overlay');
        let bgFileName = opp.dialogueBG || 'default_arena.png';
        vnOverlay.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('./images/dialogue_backgrounds/${bgFileName}')`;
        vnOverlay.style.backgroundSize = 'cover';
        vnOverlay.style.backgroundPosition = 'center';
        vnOverlay.style.display = 'block';

        const portraitImg = document.getElementById('vn-portrait');
        let portraitFileName = opp.portrait ? opp.portrait : `${opp.name}.png`;
        portraitImg.src = `./images/dialogue_portraits/${portraitFileName}`;
        portraitImg.onerror = () => { portraitImg.style.opacity = 0; };
        portraitImg.onload = () => { setTimeout(() => { portraitImg.style.opacity = 1; }, 50); };

        document.getElementById('vn-name').innerText = opp.name;

        // NOTE: Make sure your equipment.js opponents have "loseDialogue" and "winDialogue" arrays!
        let rawDialogue = isWin ? opp.loseDialogue : opp.winDialogue;
        
        // Failsafe in case you haven't written their win/loss dialogue yet!
        if (!rawDialogue) {
            rawDialogue = isWin ? ["Ugh... I can't believe you beat my Bit Beast!"] : ["Hah! Better luck next time, rookie!"];
        }

        let playerName = window.PlayerData.accountName || "Rookie";
        let coloredName = `<span style="color: #00aaff;">${playerName}</span>`;
        dialogueLines = rawDialogue.map(line => line.replaceAll("<player>", coloredName));

        currentLineIndex = 0;
        playDialogueLine();
    }

    async function showRefereeReceipt() {
        let stats = JSON.parse(localStorage.getItem('postMatchReceipt'));
        if (!stats) return; 

        let totalBP = 0;
        let receiptHTML = ``;

        let avgTime = stats.totalTimeElapsed / Math.max(1, stats.roundsPlayed);
        let timeScore = Math.floor(Math.max(0, (120000 - avgTime) / 120000) * 30); 
        let dmgScore = Math.floor(stats.totalDamageDealt * 0.5); 
        
        totalBP += 50 + timeScore + dmgScore;

        receiptHTML += `<div style="font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 5px;">BASE VICTORY: +50</div>`;
        receiptHTML += `<div style="font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 5px;">TIME EFFICIENCY: +${timeScore}</div>`;
        receiptHTML += `<div style="font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 10px;">TOTAL DAMAGE: +${dmgScore}</div>`;
        receiptHTML += `<hr style="border: 1px solid #444; margin: 10px 0;">`;

        let bonuses = [];
        if (stats.playerScore === 3 && stats.cpuScore === 0) bonuses.push({ name: "Clean Sweep", val: 40 });
        if (stats.turnaboutsAchieved > 0) bonuses.push({ name: "Turnabout", val: 30 * stats.turnaboutsAchieved });
        if (stats.perfectRounds > 0) bonuses.push({ name: "Untouchable", val: 25 * stats.perfectRounds });
        if (stats.ultimateFinishes > 0) bonuses.push({ name: "Showstopper", val: 20 * stats.ultimateFinishes });

        bonuses.forEach(b => {
            totalBP += b.val;
            receiptHTML += `<div style="display: flex; justify-content: space-between; font-size: 14px; color: #ccc; margin-bottom: 3px;">
                                <span>${b.name}</span><span>+${b.val}</span>
                            </div>`;
        });

        receiptHTML += `<hr style="border: 1px solid #444; margin: 10px 0;">`;
        receiptHTML += `<div style="font-size: 22px; font-weight: 900; color: #00ffff; text-align: center; margin-top: 10px;">TOTAL EARNED: ${totalBP} BP</div>`;

        // Load default arena background for the Referee Receipt
        const vnOverlay = document.getElementById('vn-overlay');
        vnOverlay.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('./images/dialogue_backgrounds/default_arena.png')`;
        
        // Hide the opponent portrait since the Referee is speaking
        document.getElementById('vn-portrait').style.opacity = 0;
        
        document.getElementById('vn-name').innerText = "REFEREE";
        document.getElementById('vn-next').style.display = 'none'; 
        document.getElementById('vn-text').innerHTML = receiptHTML; 
        
        window.PlayerData.bp += totalBP;
        document.getElementById('player-bp-display').innerText = window.PlayerData.bp;

        try {
            const userRef = doc(db, "users", window.CurrentUser.uid);
            await updateDoc(userRef, { bp: window.PlayerData.bp });
        } catch (e) {
            console.error("Failed to save BP to cloud!", e);
        }

        // Do NOT clear localStorage here anymore, we clear it in returnToSelection so early bail-outs are safe!
    }


    // --- Phase 1: Selection Logic ---
    function initSelection() {
        const grid = document.getElementById('opp-grid');
        
        // NEW: Wipe the grid completely clean before we build it!
        grid.innerHTML = ""; 
        
        if (!window.opponentsDB) {
            grid.innerHTML = "<p>Opponents data missing!</p>";
            return;
        }

        // Filter logic to only show unlocked or active event opponents!
        let unlockedIds = window.PlayerData.unlockedOpponents || [];
        let activeEvents = window.ActiveEvents || []; 

        let availableOpponents = window.opponentsDB.filter(opp => {
            return opp.alwaysUnlocked === true || 
                   unlockedIds.includes(opp.id) || 
                   (opp.eventTag && activeEvents.includes(opp.eventTag));
        });

        if (availableOpponents.length === 0) {
            grid.innerHTML = "<p style='color:#aaa;'>No opponents unlocked yet! Play the story to unlock challengers.</p>";
            return;
        }

        availableOpponents.forEach(opp => {
            const card = document.createElement('div');
            card.className = 'opp-card';
            card.id = `card-${opp.id}`;
            card.innerHTML = `<h3>${opp.name}</h3><span style="font-size:12px;color:#888;">${opp.beyName}</span>`;
            card.onclick = () => window.selectOpponent(opp);
            grid.appendChild(card);
        });
    }

    window.selectOpponent = function(opp) {
        document.querySelectorAll('.opp-card').forEach(c => c.classList.remove('selected'));
        document.getElementById(`card-${opp.id}`).classList.add('selected');
        selectedOpponent = opp;
        document.getElementById('btn-let-it-rip').style.display = 'block';
    }

    document.getElementById('btn-let-it-rip').addEventListener('click', () => {
        if (!selectedOpponent) return;
        startVN();
    });

	// --- Phase 2: VN Logic ---
    function startVN() {
		vnMode = "PRE_BATTLE"; // NEW: Reset state to pre-battle!
        document.getElementById('selection-screen').style.display = 'none';
		
		// --- NEW: Slide the return button in! ---
        document.getElementById('return-decal').classList.add('slide-in');
        
        // NEW: Load the specific background for this opponent!
        const vnOverlay = document.getElementById('vn-overlay');
        let bgFileName = selectedOpponent.dialogueBG || 'default_arena.png';
        
        // We add a dark gradient over the image so the character and text are still easy to read
        vnOverlay.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('./images/dialogue_backgrounds/${bgFileName}')`;
        vnOverlay.style.backgroundSize = 'cover';
        vnOverlay.style.backgroundPosition = 'center';
        
        vnOverlay.style.display = 'block';
        
        const portraitImg = document.getElementById('vn-portrait');
        
        // THE FIX: Grab the filename, then prepend the folder path!
        let portraitFileName = selectedOpponent.portrait ? selectedOpponent.portrait : `${selectedOpponent.name}.png`;
        let imagePath = `./images/dialogue_portraits/${portraitFileName}`;
        
        portraitImg.src = imagePath;
        portraitImg.onerror = () => { portraitImg.style.opacity = 0; };
        portraitImg.onload = () => { setTimeout(() => { portraitImg.style.opacity = 1; }, 50); };
        
        document.getElementById('vn-name').innerText = selectedOpponent.name;
        
        // Parse the dialogue to inject the player's account name with BLUE formatting!
        let playerName = window.PlayerData.accountName || "Rookie";
        let coloredName = `<span style="color: #00aaff;">${playerName}</span>`;
        
        // Used replaceAll just in case they say your name twice in one sentence!
        dialogueLines = selectedOpponent.dialogue.map(line => line.replaceAll("<player>", coloredName));
        
        currentLineIndex = 0;
        
        playDialogueLine();
    }

    function playDialogueLine() {
        isTyping = true;
        document.getElementById('vn-next').style.display = 'none';
        const textElement = document.getElementById('vn-text');
        textElement.innerHTML = ""; // Switched to innerHTML to allow colored text
        
        let fullText = dialogueLines[currentLineIndex];
        let charIndex = 0;

        clearInterval(typeInterval);
        typeInterval = setInterval(() => {
            // HTML-Aware Typewriter logic: Skips over < > brackets instantly
            if (fullText.charAt(charIndex) === '<') {
                while (charIndex < fullText.length && fullText.charAt(charIndex) !== '>') {
                    charIndex++;
                }
            }
            
            charIndex++;
            textElement.innerHTML = fullText.slice(0, charIndex); 
            
            if (charIndex >= fullText.length) {
                clearInterval(typeInterval);
                finishTyping();
            }
        }, 30); 
    }

    function finishTyping() {
        isTyping = false;
        document.getElementById('vn-next').style.display = 'block';
    }

    window.advanceDialogue = function() {
        if (isTyping) {
            clearInterval(typeInterval);
            // Switched to innerHTML so skipping early keeps the blue color
            document.getElementById('vn-text').innerHTML = dialogueLines[currentLineIndex];
            finishTyping();
            return;
        }

	currentLineIndex++;
        if (currentLineIndex < dialogueLines.length) {
            playDialogueLine();
        } else {
            // --- NEW: DYNAMIC END-OF-DIALOGUE ROUTING ---
            if (vnMode === "PRE_BATTLE") {
                startVsScreen();
            } else if (vnMode === "POST_MATCH_WIN") {
                showRefereeReceipt(); // Go to the BP payout!
            } else {
                window.returnToSelection(); // Go straight back to grid!
            }
        }
    }

    // --- Phase 3: VS Screen Logic ---
    function startVsScreen() {
        window.AudioManager.stopBGM(); 

        document.getElementById('vn-overlay').style.display = 'none';
        const vsOverlay = document.getElementById('vs-overlay');
        const vsText = document.getElementById('vs-text');
        const tapText = document.getElementById('tap-to-battle');
        
        vsOverlay.style.display = 'flex';
        vsText.innerText = `VS ${selectedOpponent.name.toUpperCase()}`;
        
        setTimeout(() => {
            vsText.classList.add('slam');
            setTimeout(() => { tapText.style.opacity = 1; }, 800);
        }, 50);
    }

		window.enterArena = function() {
        // --- NEW: THE MIRROR MATCH INJECTOR ---
        if (selectedOpponent.id === "opp_mirorbey") {
            let pBuild = window.ActiveBey; // The player's featured build
            
            // Generate the total stats of the player's build
            let mStats = { hp: 0, rpm: 0, attack: 0, recoil: 0, recoilReduction: 0, defense: 0, endurance: 0, stamina: 0, balance: 0, weight: 0, speed: 0, mobility: 0, grip: 0, spiritCharge: 0, cdr: 0 };
            let mPassives = [];
            let mAttacks = [];
            let mUltimate = null;

            Object.values(pBuild.parts).forEach(part => {
                if (!part) return;
                if (part.stats) {
                    for (let s in part.stats) { if (mStats[s] !== undefined) mStats[s] += part.stats[s]; }
                }
                if (part.passives) part.passives.forEach(p => mPassives.push(p));
                if (part.attacks) part.attacks.forEach(a => mAttacks.push(a));
                if (part.ultimate) mUltimate = part.ultimate;
            });

            // Overwrite Miror B's data with the player's data!
            selectedOpponent.stats = mStats;
            selectedOpponent.passives = mPassives;
            selectedOpponent.attacks = mAttacks;
            selectedOpponent.ultimate = mUltimate;
            selectedOpponent.beyName = `Miror ${pBuild.name}`;
            
            // Attempt to grab the Bit Beast name if it exists on the chip
            if (pBuild.parts.bitChip && pBuild.parts.bitChip.name) {
                selectedOpponent.bitBeast = `Miror ${pBuild.parts.bitChip.name}`;
            }
        }

	// Save the customized opponent to the global state
        window.ActiveOpponent = selectedOpponent; 
        window.navigateTo('arena.html');
    } // <-- Ends enterArena properly. (The duplicate lines that were here are gone!)

    // ==========================================
    // --- NEW: SEAMLESS RETURN LOGIC ---
    window.returnToSelection = function() {
        clearInterval(typeInterval);
        isTyping = false;
        
        // --- NEW: Clear the receipt here so it's safe if the player bails out early! ---
        localStorage.removeItem('postMatchReceipt');

        document.getElementById('vn-overlay').style.display = 'none';
        document.getElementById('selection-screen').style.display = 'block';
        document.getElementById('return-decal').classList.remove('slide-in');
        document.getElementById('vn-text').innerHTML = '';
        document.getElementById('vn-next').style.display = 'none';

        initSelection();
    };
    // ==========================================

    // --- Initialization ---
    if (localStorage.getItem('postMatchReceipt')) {
        processPostMatch(); // Replaced showBattleReceipt()
    } else {
        initSelection();
    }
    // (The duplicate initialization block that was here is gone!)
</script>

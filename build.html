<script type="module">

function fitBuildPageToHost() {
    const root = document.getElementById('build-page-root');
    if (!root) return;

    const host = root.parentElement;
    const rect = root.getBoundingClientRect();

    const viewportHeight = window.visualViewport
        ? window.visualViewport.height
        : window.innerHeight;

    const availableHeight = Math.max(0, Math.floor(viewportHeight - rect.top));

    root.style.height = `${availableHeight}px`;
    root.style.maxHeight = `${availableHeight}px`;
    root.style.minHeight = '0';
    root.style.overflow = 'hidden';

    if (host) {
        host.style.minHeight = '0';
        host.style.overflow = 'hidden';
    }
}

function setupBuildPageSizing() {
    fitBuildPageToHost();

    const root = document.getElementById('build-page-root');
    if (!root) return;

    if (window.ResizeObserver) {
        const ro = new ResizeObserver(() => fitBuildPageToHost());
        ro.observe(root);
        if (root.parentElement) ro.observe(root.parentElement);
    }

    window.addEventListener('resize', fitBuildPageToHost);

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', fitBuildPageToHost);
        window.visualViewport.addEventListener('scroll', fitBuildPageToHost);
    }

    requestAnimationFrame(fitBuildPageToHost);
    setTimeout(fitBuildPageToHost, 0);
    setTimeout(fitBuildPageToHost, 50);
}

setupBuildPageSizing();



    window.AudioManager.playBGM('./audio/music/Get_The_Wrench_ForBuildScreen.wav', 10.2934375, 0.4);
    
    import { db } from './firebase-config.js';

    document.getElementById('player-bp-display').innerText = myInventory.bp;

    function getOwnedParts(categoryStr) {
        let ownedIds = myInventory[categoryStr] || [];
        let allCategoryParts = window.equipmentDB[categoryStr] || [];
        return allCategoryParts.filter(part => ownedIds.includes(part.id));
    }

    // Include the new arrays!
    var availableBitChips = getOwnedParts("bitChips");
    var availableAttackRings = getOwnedParts("attackRings");
	var availableSubAttackRings = getOwnedParts("subAttackRings");
    var availableWeightDisks = getOwnedParts("weightDisks");
    var availableSpinGears = getOwnedParts("spinGears");
    var availableBladeBases = getOwnedParts("bladeBases");
    var availableLaunchers = getOwnedParts("launchers");
    var availableRipCords = getOwnedParts("ripCords");

    // NEW: Build object now explicitly tracks the tools
    var currentBuild = { 
    bitChip: null,
    attackRing: null,
    subAttackRing: null,
    weightDisk: null,
    spinGear: null,
    bladeBase: null,
    launcher: null,
    ripCord: null 
};

    if (!window.PlayerData.saves) window.PlayerData.saves = new Array(10).fill(null);
    if (window.PlayerData.saves.length < 10) {
        let oldSaves = window.PlayerData.saves;
        window.PlayerData.saves = new Array(10).fill(null);
        for (let i = 0; i < oldSaves.length; i++) {
            window.PlayerData.saves[i] = oldSaves[i];
        }
    }
    for (let i = 0; i < window.PlayerData.saves.length; i++) {
        if (window.PlayerData.saves[i] && !window.PlayerData.saves[i].parts) {
            window.PlayerData.saves[i] = { name: `Legacy Build ${i+1}`, parts: window.PlayerData.saves[i] };
        }
    }

    var isSavingMode = false;

    function getSafeImage(part, isTopDown = false) {
        if (!part) return '';
        let key = isTopDown ? 'topDownImage' : 'image';
        if (part.activeStyle && part.activeStyle[key]) return part.activeStyle[key];
        if (part.styles && part.styles.length > 0 && part.styles[0][key]) return part.styles[0][key];
        return part.fallbackImage || part[key] || '';
    }

    const sfx = new Audio('./audio/sounds/negative.wav');
    sfx.volume = 0.7;

}

function requiredSubRingType() {
    const ar = currentBuild.attackRing;
    if (!ar || ar.subRing !== true) return null;
    return ar.subRingType || null;
}

function validateEquippedSubAttackRing() {
    const requiredType = requiredSubRingType();

    if (!requiredType) {
        currentBuild.subAttackRing = null;
        return;
    }

    if (
        currentBuild.subAttackRing &&
        currentBuild.subAttackRing.subRingType !== requiredType
    ) {
        currentBuild.subAttackRing = null;
    }
}

function buildIsSaveReady() {
    const baseReady =
        currentBuild.bitChip &&
        currentBuild.attackRing &&
        currentBuild.weightDisk &&
        currentBuild.spinGear &&
        currentBuild.bladeBase &&
        currentBuild.launcher &&
        currentBuild.ripCord;

    if (!baseReady) return false;

    const requiredType = requiredSubRingType();
    if (!requiredType) return true;

    return !!(
        currentBuild.subAttackRing &&
        currentBuild.subAttackRing.subRingType === requiredType
    );
}

    function calculateAndRenderTotals() {
        let totals = { hp: 0, rpm: 0, attack: 0, recoil: 0, recoilReduction: 0, defense: 0, endurance: 0, stamina: 0, balance: 0, weight: 0, speed: 0, mobility: 0, grip: 0, spiritCharge: 0, cdr: 0 };
        let passives = [];
        let attacks = [];
        let ultimate = null;
        
        let spinDirection = "[No Spin Gear]";
        if (currentBuild.spinGear) {
            spinDirection = currentBuild.spinGear.spinDirection || "Right";
        }

        const slotNames = { 
    bitChip: "Bit Chip",
    attackRing: "Attack Ring",
    subAttackRing: "Sub-Attack Ring",
    weightDisk: "Weight Disk",
    spinGear: "Spin Gear",
    bladeBase: "Blade Base",
    launcher: "Launcher",
    ripCord: "Rip Cord"
};

        Object.entries(currentBuild).forEach(([slot, part]) => {
            if (!part) return;
            let partName = part.activeStyle ? part.activeStyle.styleName : part.name;
            let originText = `${slotNames[slot]}: ${partName}`;

            if (part.stats) {
                for (let stat in part.stats) {
                    if (totals[stat] !== undefined) totals[stat] += part.stats[stat];
                }
            }
            
            if (part.passives) {
                part.passives.forEach(passiveName => {
                    let desc = "";
                    if (window.SkillsDB && window.SkillsDB.passives && window.SkillsDB.passives[passiveName]) {
                        desc = window.SkillsDB.passives[passiveName].desc;
                    }
                    passives.push({ name: passiveName, desc: desc, source: originText });
                });
            }
            
            if (part.attacks) {
                part.attacks.forEach(atkObj => {
                    let desc = "";
                    if (window.SkillsDB && window.SkillsDB.attacks && window.SkillsDB.attacks[atkObj.name]) {
                        desc = window.SkillsDB.attacks[atkObj.name].desc;
                    }
                    attacks.push({ name: atkObj.name, cd: atkObj.cd, desc: desc, source: originText });
                });
            }
            
            // Look for special launches on Tools!
            if (part.specialLaunch) {
                part.specialLaunch.forEach(sl => {
                    // 1. Construct the exact name as it appears in skills.js (e.g., "Special Launch: Power Shoot")
                    let skillKey = `Special Launch: ${sl}`; 
                    let desc = "";
                    
                    // 2. Look it up inside the passives database!
                    if (window.SkillsDB && window.SkillsDB.passives && window.SkillsDB.passives[skillKey]) {
                        desc = window.SkillsDB.passives[skillKey].desc;
                    }
                    
                    // 3. Push it to the UI array
                    passives.push({ name: skillKey, desc: desc, source: originText });
                });
            }

            if (part.ultimate) {
                ultimate = { name: part.ultimate.name, desc: part.ultimate.desc, source: originText };
            }
        });
        
        let atkScore = totals.attack + totals.speed + totals.mobility + totals.grip;
        let defScore = totals.defense + totals.recoilReduction + (totals.weight * 0.2) + (totals.hp * 0.3);
        let staScore = totals.stamina + totals.balance + (totals.rpm * 0.275) + totals.endurance;
        
        let maxScore = Math.max(atkScore, defScore, staScore);
        let type = "Unknown";
        
        if (maxScore > 0) {
            let threshold = maxScore * 0.85; 
            let closeScores = [atkScore, defScore, staScore].filter(score => score >= threshold).length;
            if (closeScores > 1) type = "Balance";
            else if (maxScore === atkScore) type = "Attack";
            else if (maxScore === defScore) type = "Defense";
            else type = "Stamina";
        }
        
        const statOrder = [
            "hp", "rpm", "attack", "defense", "stamina", "endurance", 
            "speed", "mobility", "grip", "balance", "weight", 
            "recoil", "recoilReduction", "spiritCharge", "cdr"
        ];
        const statLabels = {
            hp: "HP", rpm: "RPM", attack: "ATTACK", defense: "DEFENSE", 
            stamina: "STAMINA", endurance: "ENDURANCE", speed: "SPEED", 
            mobility: "MOBILITY", grip: "GRIP", balance: "BALANCE", 
            weight: "WEIGHT", recoil: "RECOIL", recoilReduction: "RECOIL RED.", 
            spiritCharge: "SPIRIT CHARGE", cdr: "COOLDOWN RED."
        };

        const percentStats = ["recoilReduction", "spiritCharge", "cdr"];
        let statHtml = '';
        statOrder.forEach(key => {
            if (totals[key] !== undefined) {
                let suffix = percentStats.includes(key) ? "%" : (key === "weight" ? "g" : "");
                statHtml += `<div><b>${statLabels[key]}:</b> ${totals[key]}${suffix}</div>`;
            }
        });
        
        statHtml += `<div style="grid-column: span 2; margin-top: 10px; padding-top: 10px; border-top: 1px solid #444; color: #00ffff;">
                        <b>TYPE:</b> ${type} &nbsp;|&nbsp; <b>SPIN:</b> ${spinDirection}
                     </div>`;
                     
        document.getElementById('total-stats').innerHTML = statHtml;

        const safeParse = window.parseKeywords || function(text) { return text; };

        let passiveHtml = '';
        if (passives.length === 0) passiveHtml = `<div style="color: #666; font-style: italic; font-size: 12px; margin-top: 5px;">None equipped</div>`;
        passives.forEach(p => {
            let descText = p.desc ? `<div style="font-size: 11px; color: #ccc; margin-top: 4px; line-height: 1.3;">${safeParse(p.desc)}</div>` : '';
            passiveHtml += `<div class="passive-box">
                                <span class="skill-source">${p.source}</span>
                                <strong style="color: #fff; font-size: 13px;">${p.name}</strong>
                                ${descText}
                            </div>`;
        });
        document.getElementById('passives-list').innerHTML = passiveHtml;
        
        let attackHtml = '';
        if (attacks.length === 0) attackHtml = `<div style="color: #666; font-style: italic; font-size: 12px; margin-top: 5px;">None equipped</div>`;
        attacks.forEach(atk => {
            let descText = atk.desc ? `<div style="font-size: 11px; color: #ccc; margin-top: 4px; line-height: 1.3;">${safeParse(atk.desc)}</div>` : '';
            attackHtml += `<div class="attack-box">
                               <span class="skill-source">${atk.source}</span>
                               <strong style="color: #fff; font-size: 13px;">${atk.name}</strong> 
                               <span style="font-size:11px; color:#ddd; float:right;">${atk.cd}s</span>
                               ${descText}
                           </div>`;
        });
        document.getElementById('attacks-list').innerHTML = attackHtml;

        if (ultimate) {
            document.getElementById('ultimate-container').innerHTML = `
                <div class="ultimate-box">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <span style="color: #ffaa00; font-size: 12px; font-weight: 900; letter-spacing: 1px;">ULTIMATE TECHNIQUE</span>
                        <span class="skill-source" style="text-align: right; margin: 0;">${ultimate.source}</span>
                    </div>
                    <strong style="font-size: 16px; color: #fff; display: block; margin: 5px 0;">${ultimate.name}</strong>
                    <span style="font-size: 13px; color: #ccc; line-height: 1.4;">${safeParse(ultimate.desc)}</span>
                </div>`;
        } else {
            document.getElementById('ultimate-container').innerHTML = '';
        }
        
        window.renderAssemblyVisual();
        window.renderSaveSlots();
    }

    // BOOT SEQUENCE
    window.switchTab('bitChips');
    window.renderSaveSlots(); 
</script>

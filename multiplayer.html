    <style>
        :root {
            --p1-color: #e51c23; /* Deep Red */
            --p2-color: #0c58e0; /* Deep Blue */
            --mid-color: #b000ff; /* Vivid Purple */
            --p1-glow: rgba(229, 28, 35, 0.8);
            --p2-glow: rgba(12, 88, 224, 0.8);
        }

        html, body {
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            overflow: hidden !important; 
            background-color: #0a0a12;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff;
            user-select: none; -webkit-user-select: none;
            background-image: 
                linear-gradient(rgba(0, 170, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 170, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- UI OVERLAYS --- */
        #top-bar {
            position: absolute; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between;
            padding: 15px 30px; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100; pointer-events: none;
        }
        .back-btn { 
            background: #222; color: #fff; border: 1px solid #00aaff; padding: 8px 20px; 
            cursor: pointer; border-radius: 6px; font-weight: bold; pointer-events: auto;
            font-family: inherit; transition: 0.2s;
        }
        .back-btn:hover { background: #00aaff; color: #000; box-shadow: 0 0 10px #00aaff; }

        /* --- VERSUS SCREEN LAYER --- */
        #vs-arena {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden;
            background: linear-gradient(to right, var(--p1-color) 0%, var(--p1-color) calc(50% - 6.5px), var(--mid-color) 50%, var(--p2-color) calc(50% + 6.5px), var(--p2-color) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; opacity: 0; pointer-events: none; transform: scale(1, 0.005); filter: brightness(3);
            transition: opacity 0.3s ease-out; 
        }

        #vs-arena.active {
            pointer-events: auto;
            animation: tv-turn-on 0.4s cubic-bezier(0.8, 0, 0.2, 1) forwards;
            animation-delay: 0.2s; 
        }
        @keyframes tv-turn-on {
            0% { transform: scale(1, 0.005); opacity: 0; filter: brightness(4); }
            50% { transform: scale(1, 0.005); opacity: 1; filter: brightness(2); }
            100% { transform: scale(1, 1); opacity: 1; filter: brightness(1); }
        }

        .grid-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.25) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.25) 1px, transparent 1px);
            background-size: calc(100% / 17) calc(100% / 17); z-index: 1; pointer-events: none;
        }

        .aura-clash {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 150px; height: 100%; z-index: 2; pointer-events: none;
            animation: clash-pulse 4s infinite ease-in-out;
        }
        @keyframes clash-pulse {
            0% { box-shadow: inset 40px 0 80px -20px var(--p1-color), inset -40px 0 80px -20px var(--p2-color); }
            33% { box-shadow: inset 80px 0 100px -20px var(--p1-glow), inset -20px 0 50px -20px var(--p2-color); }
            66% { box-shadow: inset 20px 0 50px -20px var(--p1-color), inset -80px 0 100px -20px var(--p2-glow); }
            100% { box-shadow: inset 40px 0 80px -20px var(--p1-color), inset -40px 0 80px -20px var(--p2-color); }
        }

        .top-shadow {
            position: absolute; top: 0; left: 0; width: 100%; height: 40%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 40%, transparent 100%);
            z-index: 3; pointer-events: none;
        }

        /* --- VS BEYBLADE SHOWCASES --- */
        .showcase-container {
            position: absolute; top: 40%; display: flex; flex-direction: column; align-items: center; z-index: 15;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .showcase-container.active { opacity: 1; pointer-events: auto; }
        
        #vs-p1-showcase { left: 25%; transform: translate(-50%, -50%); }
        #vs-p2-showcase { right: 25%; transform: translate(50%, -50%); }

        .bey-wrapper { width: 400px; height: 400px; position: relative; }
        
        #vs-p1-bey-wrapper { transform: translateX(-50vw); }
        #vs-p2-bey-wrapper { transform: translateX(50vw); }

        .roll-in-anim { animation: roll-in-overshoot 1s cubic-bezier(0.25, 1, 0.5, 1.2) forwards; }
        .roll-in-anim-p2 { animation: roll-in-overshoot-p2 1s cubic-bezier(0.25, 1, 0.5, 1.2) forwards; }
        
        @keyframes roll-in-overshoot { 0% { transform: translateX(-50vw); } 70% { transform: translateX(20px); } 100% { transform: translateX(0); } }
        @keyframes roll-in-overshoot-p2 { 0% { transform: translateX(50vw); } 70% { transform: translateX(-20px); } 100% { transform: translateX(0); } }

        .bey-stack { width: 100%; height: 100%; filter: drop-shadow(0 20px 20px rgba(0,0,0,0.8)); }

        .build-name {
            margin-top: 15px; font-size: 20px; font-weight: 900; color: #ffaa00;
            text-shadow: 2px 2px 0px #000; text-transform: uppercase; letter-spacing: 2px; text-align: center;
        }

        .cycle-btn {
            margin-top: 10px; background: rgba(0,0,0,0.7); border: 1px solid #00ffff; color: #00ffff;
            padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s;
        }
        .cycle-btn:hover { background: #00ffff; color: #000; transform: scale(1.05); box-shadow: 0 0 15px #00ffff; }

        /* Spark Effect */
        .spark-effect {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(0,255,255,0.8) 15%, transparent 60%);
            opacity: 0; pointer-events: none; z-index: 20; mix-blend-mode: screen;
        }
        .spark-anim { animation: spark-flash 0.5s ease-out forwards; }
        @keyframes spark-flash {
            0% { transform: translate(-50%, -50%) scale(0.2) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5) rotate(45deg); opacity: 0; }
        }

        /* Particles */
        .particle { position: absolute; z-index: 4; pointer-events: none; }
        .particle-h { -webkit-mask-image: linear-gradient(to right, transparent 0%, black 40%, black 60%, transparent 100%); mask-image: linear-gradient(to right, transparent 0%, black 40%, black 60%, transparent 100%); }
        .particle-v { -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 60%, transparent 100%); mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 60%, transparent 100%); }
        .particle-core { position: absolute; background-color: #ffffff; box-shadow: 0 0 12px 4px #ffffff; border-radius: 50%; }
        .particle-h .particle-core { top: 0; left: 50%; width: 80px; height: 100%; transform: translateX(-50%); }
        .particle-v .particle-core { left: 0; top: 50%; height: 80px; width: 100%; transform: translateY(-50%); }

        /* VS Controls (Center Screen) */
        #vs-controls { position: relative; z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 15px; text-shadow: 2px 2px 5px #000; }
        #vs-waiting-text { font-size: 32px; font-weight: 900; font-style: italic; color: #fff; letter-spacing: 2px; text-align: center;}
        
        .vs-btn { background: rgba(0,0,0,0.7); font-size: 16px; font-weight: bold; padding: 12px 30px; display: none; transition: 0.3s; color: #fff; border: 2px solid; border-radius: 8px; cursor: pointer; }
        #vs-close-btn { border-color: #ffaa00; color: #ffcc00; }
        #vs-close-btn:hover { background: #ffaa00; color: #000; box-shadow: 0 0 20px rgba(255, 170, 0, 0.6); }
        
        #vs-ready-btn { border-color: #00aaff; color: #00ffff; }
        #vs-ready-btn:hover { background: #00aaff; color: #000; box-shadow: 0 0 20px rgba(0, 170, 255, 0.6); }

        #vs-start-btn { border-color: #0f0; color: #0f0; font-size: 24px; padding: 15px 50px; background: rgba(0,255,0,0.2); }
        #vs-start-btn:hover { background: #0f0; color: #000; box-shadow: 0 0 30px #0f0; }

        /* Nameplates */
        .ui-layer { position: absolute; bottom: 50px; width: 100%; display: flex; z-index: 10; pointer-events: none; }
        .ui-half { width: 50%; display: flex; justify-content: center; position: relative; }
        .nameplate { display: flex; align-items: center; height: 45px; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 2; }
        .plate-bg { flex-grow: 1; height: 100%; display: flex; align-items: center; padding: 0 20px; color: white; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        .p1-nameplate .plate-bg { background-color: #b01015; border: 2px solid #ff4d4d; border-right: none; }
        .p2-nameplate .plate-bg { background-color: #0b3d99; border: 2px solid #4d88ff; border-left: none; justify-content: flex-end; }
        .chevron { width: 40px; height: 55px; background: linear-gradient(135deg, #e0e0e0 0%, #ffffff 50%, #9e9e9e 100%); border: 2px solid #555; }
        .p1-nameplate .chevron { clip-path: polygon(0 0, 60% 50%, 0 100%, 40% 100%, 100% 50%, 40% 0); margin-left: -5px; }
        .p2-nameplate .chevron { clip-path: polygon(100% 0, 40% 50%, 100% 100%, 60% 100%, 0 50%, 60% 0); margin-right: -5px; }

        /* --- THE UPGRADED READY CHECKMARK --- */
        .ready-check {
            position: absolute; left: calc(50% + 185px); top: 50%; transform: translateY(-50%);
            font-size: 48px; font-weight: 900;
            background: linear-gradient(to top, #d9534f, #ffaa00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0; transition: 0.3s; filter: drop-shadow(0 4px 10px rgba(255,100,0,0.5));
            z-index: 1;
        }

        /* --- LOBBY LAYOUT --- */
        #lobby-wrapper {
            position: absolute; top: 70px; left: 0; width: 100%; height: calc(100% - 70px);
            display: flex; justify-content: center; align-items: stretch; padding: 20px; box-sizing: border-box; gap: 40px;
            z-index: 20; pointer-events: none; overflow: hidden;
        }

        .panel {
            background: rgba(15, 20, 30, 0.85); border: 2px solid #334; border-radius: 12px;
            width: 45%; max-width: 500px; display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            pointer-events: auto; overflow: hidden; 
            transition: transform 0.6s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.6s ease;
        }

        .slide-left { transform: translateX(-150vw) !important; opacity: 0; pointer-events: none; }
        .slide-right { transform: translateX(150vw) !important; opacity: 0; pointer-events: none; }

        .panel-header { background: linear-gradient(90deg, #112, #224); padding: 20px; border-bottom: 2px solid #556; text-align: center; }
        .panel-header h2 { margin: 0; font-size: 28px; color: #fff; font-style: italic; letter-spacing: 2px; }
        .host-header { border-bottom-color: #00aaff; }
        .host-header h2 { color: #00ffff; text-shadow: 0 0 10px #00aaff; }
        .join-header { border-bottom-color: #ffaa00; }
        .join-header h2 { color: #ffcc00; text-shadow: 0 0 10px #ffaa00; }

        .panel-content { padding: 30px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; flex: 1; }

		.form-row { display: flex; gap: 15px; width: 100%; } /* NEW: Puts items side-by-side */
        .form-row .form-group { flex: 1; } /* NEW: Makes them share the space equally 50/50 */

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 14px; color: #aaa; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        select, input[type="text"], input[type="password"] {
            background: #0a0a12; color: #fff; border: 1px solid #445; padding: 12px;
            border-radius: 6px; font-size: 16px; font-family: inherit; outline: none; transition: 0.2s;
        }
        select:focus, input:focus { border-color: #00aaff; box-shadow: 0 0 10px rgba(0, 170, 255, 0.3); }
        option { background: #112; }

        /* Future Proofing: Match Type Toggle */
        .match-type-btn {
            background: linear-gradient(90deg, var(--p1-color) 0%, var(--p2-color) 100%);
            color: white; border: 1px solid #445; padding: 12px; border-radius: 6px;
            font-size: 16px; font-weight: 900; letter-spacing: 2px; cursor: not-allowed; opacity: 0.5; transition: 0.3s;
        }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; background: #0a0a12; padding: 12px; border-radius: 6px; border: 1px solid #445; }
        .toggle-label { font-weight: bold; color: #ddd; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334; transition: .4s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ffaa00; box-shadow: 0 0 10px #ffaa00; }
        input:checked + .slider:before { transform: translateX(24px); }

        #passcode-container { display: none; animation: slideDown 0.3s ease-out forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .action-btn {
            background: #223; color: #fff; border: 2px solid; padding: 15px; font-size: 20px; font-weight: 900;
            border-radius: 8px; cursor: pointer; transition: 0.2s; letter-spacing: 1px; margin-top: auto; font-family: inherit;
        }
        .host-btn { border-color: #00aaff; color: #00ffff; }
        .host-btn:hover { background: #00aaff; color: #000; box-shadow: 0 0 20px rgba(0, 170, 255, 0.6); }
        .join-btn { border-color: #ffaa00; color: #ffcc00; }
        .join-btn:hover { background: #ffaa00; color: #000; box-shadow: 0 0 20px rgba(255, 170, 0, 0.6); }

        /* --- ROOM LIST UI --- */
        .room-list { display: flex; flex-direction: column; gap: 10px; }
        .room-card { background: #0a0a12; border: 1px solid #445; border-radius: 8px; padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; pointer-events: auto; }
        .room-card:hover { border-color: #ffaa00; background: #1a1a24; }
        
        .room-card.disabled { pointer-events: none; opacity: 0.6; filter: grayscale(1); }

        .room-left-section { display: flex; align-items: center; gap: 15px; }
        .room-info { display: flex; flex-direction: column; gap: 5px; }
        .room-name { font-weight: bold; font-size: 16px; color: #fff; display: flex; align-items: center; gap: 10px;}
        .player-count { font-size: 11px; color: #ffaa00; font-style: italic; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px;}
        .room-host { font-size: 12px; color: #889; }
        .host-glow-red { color: #ff4444; text-shadow: 0 0 8px #ff0000; font-weight: bold; }
        .host-glow-blue { color: #00aaff; text-shadow: 0 0 8px #00aaff; font-weight: bold; }
        .room-status { font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .status-open { color: #00ff00; }
        .status-locked { color: #ff4444; }

        @keyframes spin-right { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-left { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        .bey-spin-right { animation: spin-right 1.0s linear infinite; }
        .bey-spin-left { animation: spin-left 1.0s linear infinite; }
        .lobby-bey-stack { position: relative; width: 55px; height: 55px; flex-shrink: 0; }
        .lobby-bey-part { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }

    </style>

    <div id="top-bar">
        <button class="back-btn" onclick="leaveLobby()">◀ Back</button>
    </div>

    <div id="vs-arena">
        <div class="top-shadow"></div>
        <div class="grid-overlay"></div>
        <div class="aura-clash"></div>

        <div id="vs-p1-showcase" class="showcase-container">
            <div id="vs-p1-spark" class="spark-effect"></div>
            <div id="vs-p1-bey-wrapper" class="bey-wrapper">
                <div id="vs-p1-bey-stack" class="bey-stack"></div>
            </div>
            <div id="vs-p1-build-name" class="build-name">LOADING...</div>
            <button class="cycle-btn" id="vs-p1-cycle-btn" onclick="cycleVsLoadout()">⟳ CYCLE LOADOUT</button>
        </div>

        <div id="vs-p2-showcase" class="showcase-container">
            <div id="vs-p2-spark" class="spark-effect"></div>
            <div id="vs-p2-bey-wrapper" class="bey-wrapper">
                <div id="vs-p2-bey-stack" class="bey-stack"></div>
            </div>
            <div id="vs-p2-build-name" class="build-name">LOADING...</div>
            <button class="cycle-btn" id="vs-p2-cycle-btn" onclick="cycleVsLoadout()" style="display:none;">⟳ CYCLE LOADOUT</button>
        </div>

        <div id="vs-controls">
            <div id="vs-waiting-text">CONNECTING LOBBY...</div>
            
            <button class="vs-btn" id="vs-close-btn" onclick="cancelLobby()">CLOSE ROOM</button>
            <button class="vs-btn" id="vs-start-btn" onclick="startMatch()">START!</button>

            <button class="vs-btn" id="vs-ready-btn" onclick="toggleReady()">READY</button>
            <button class="vs-btn" id="vs-leave-btn" onclick="leaveGuestLobby()">LEAVE ROOM</button>
        </div>

        <div class="ui-layer">
            <div class="ui-half">
                <div class="nameplate p1-nameplate">
                    <div class="plate-bg"><span id="vs-p1-name">PLAYER 1</span></div>
                    <div class="chevron"></div>
                </div>
            </div>
            
            <div class="ui-half">
                <div class="nameplate p2-nameplate" style="opacity: 0.5;">
                    <div class="chevron"></div>
                    <div class="plate-bg"><span id="vs-p2-name">SEARCHING...</span></div>
                </div>
                <div id="p2-ready" class="ready-check">✔</div>
            </div>
        </div>
    </div>

    <div id="lobby-wrapper">
        <div class="panel" id="host-panel">
            <div class="panel-header host-header">
                <h2>HOST MATCH</h2>
            </div>
            <div class="panel-content">
                <div class="form-group">
                    <label>Lobby Name</label>
                    <select id="host-room-name">
                        <option value="Let It Rip!">Let It Rip!</option>
                        <option value="Go Shoot!">Go Shoot!</option>
                        <option value="Hey! Over Here!">Hey! Over Here!</option>
                        <option value="Anything Goes Battle">Anything Goes Battle</option>
                        <option value="Testing A New Build">Testing A New Build</option>
                        <option value="Beginners Welcome">Beginners Welcome</option>
                        <option value="Short On Time">Short On Time</option>
                    </select>
                </div>
				<div class="form-row">
                    <div class="form-group">
                        <label>Number of Players</label>
                        <select id="host-player-count" disabled style="opacity: 0.5; cursor: not-allowed;">
                            <option value="2" selected>2 Players</option>
                            <option value="3">3 Players</option>
                            <option value="4">4 Players</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Match Type</label>
                        <button type="button" class="match-type-btn teams" disabled>TEAMS</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Stadium / Map</label>
                    <select id="host-stadium">
                        <option value="standard_dish">Standard BBA Dish</option>
                        <option value="nikotama_river">Nikotama River</option>
                        <option value="street_alley">Back-Alley Concrete</option>
                    </select>
                </div>
				<div class="form-row">
                    <div class="form-group">
                        <label>Battle BGM</label>
                        <select id="host-music">
                            <option value="track_tension">Tension</option>
                            <option value="track_heavy_rock">Heavy Rock</option>
                            <option value="track_electronic">Electronic Surge</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Lobby BGM</label>
                        <select id="host-lobbymusic">
                            <option value="track_tension">Jazzy</option>
                            <option value="track_heavy_rock">Punk Rock Funk</option>
                            <option value="track_electronic">EDM Hype</option>
                        </select>
                    </div>
                </div>
                <div class="toggle-row">
                    <div class="toggle-label">Private Match (Requires Code)</div>
                    <label class="switch">
                        <input type="checkbox" id="host-private-toggle" onchange="togglePasscodeField()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="form-group" id="passcode-container">
                    <label>4-Digit Passcode</label>
                    <input type="password" id="host-passcode" maxlength="4" placeholder="0000" pattern="\d{4}" oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');">
                </div>
                <button class="action-btn host-btn" id="create-lobby-btn" style="margin-top: auto;" onclick="initializeHost()">HOST ROOM</button>
            </div>
        </div>

        <div class="panel" id="join-panel">
            <div class="panel-header join-header">
                <h2>JOIN MATCH</h2>
            </div>
            <div class="panel-content">
                <div class="room-list" id="active-rooms-container"></div>
                <div style="text-align: center; color: #667; font-size: 14px; margin-top: 20px; font-style: italic;">
                    Scanning network for challengers...
                </div>
                <button class="action-btn join-btn" onclick="refreshRoomList()" style="margin-top: auto;">REFRESH LIST</button>
            </div>
        </div>
    </div>

<script type="module">
        import { rtdb, db } from './firebase-config.js';
        import { ref, set, push, onValue, get, update, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { rtcManager } from './webrtc-manager.js';

        let playerName = window.PlayerData?.accountName || window.PlayerData?.displayName || window.CurrentUser?.displayName || "Anonymous Blader";
        let playerUid = window.CurrentUser?.uid || Math.random().toString(36).substring(2, 9);

        let currentRoomRef = null;
        let guestDisconnectRef = null;
        let roomListenerUnsubscribe = null;
        let countdownInterval = null;
        let isVsActive = false;
        
        window.AudioManager.playBGM('./audio/music/BounceAround_ForVersusLobby.wav', 6.455);

        // --- GLOBAL HELPER FOR IMAGE EXTRACTION ---
        function getSafeImage(partData, category, isTopDown = false) {
            if (!partData) return '';
            let partObj = partData;
            if (typeof partData === 'string' && window.equipmentDB && window.equipmentDB[category]) {
                partObj = window.equipmentDB[category].find(p => p.id === partData) || partData;
            }
            let key = isTopDown ? 'topDownImage' : 'image';
            if (partObj.activeStyle && partObj.activeStyle[key]) return partObj.activeStyle[key];
            if (partObj.styles && partObj.styles.length > 0 && partObj.styles[0][key]) return partObj.styles[0][key];
            return partObj.fallbackImage || partObj[key] || '';
        }

        // --- RENDER VS BEYBLADE LOGIC ---
        function getLocalBuildData() {
            let saves = window.PlayerData?.saves || [];
            let saveIndex = window.PlayerData?.featuredBuildIndex || 0;
            let currentSave = window.ActiveBey || saves[saveIndex];
            let buildData = { bb: '', sg: '', wd: '', ar: '', bc: '', spinDir: 'Right', name: 'CUSTOM BUILD' };

            if (currentSave && currentSave.parts) {
                buildData.bb = getSafeImage(currentSave.parts.bladeBase, 'bladeBases', true);
                buildData.sg = getSafeImage(currentSave.parts.spinGear, 'spinGears', true);
                buildData.wd = getSafeImage(currentSave.parts.weightDisk, 'weightDisks', true);
                buildData.ar = getSafeImage(currentSave.parts.attackRing, 'attackRings', true);
                buildData.bc = getSafeImage(currentSave.parts.bitChip, 'bitChips', true);
                buildData.name = currentSave.name || "CUSTOM BUILD";
                if (currentSave.parts.spinGear && currentSave.parts.spinGear.spinDirection) {
                    buildData.spinDir = currentSave.parts.spinGear.spinDirection;
                }
            }
            return buildData;
        }

        function applyShowcaseUI(playerNum, buildData) {
            document.getElementById(`vs-p${playerNum}-build-name`).innerText = buildData.name;
            const stack = document.getElementById(`vs-p${playerNum}-bey-stack`);
            const fallbackIcon = !buildData.ar ? `<img src="./images/menu_icons/AR_icon.png" class="lobby-bey-part" style="opacity: 0.5;">` : '';
            stack.innerHTML = `
                ${buildData.bb ? `<img src="${buildData.bb}" class="lobby-bey-part" style="z-index: 1;">` : ''}
                ${buildData.sg ? `<img src="${buildData.sg}" class="lobby-bey-part" style="z-index: 2;">` : ''}
                ${buildData.wd ? `<img src="${buildData.wd}" class="lobby-bey-part" style="z-index: 3;">` : ''}
                ${buildData.ar ? `<img src="${buildData.ar}" class="lobby-bey-part" style="z-index: 4;">` : ''}
                ${buildData.bc ? `<img src="${buildData.bc}" class="lobby-bey-part" style="z-index: 5;">` : ''}
                ${fallbackIcon}
            `;
            
            stack.className = 'bey-stack ' + (buildData.spinDir === 'Left' ? 'bey-spin-left' : 'bey-spin-right');
            
            if (hasRolledIn[playerNum]) {
                stack.style.animation = 'none'; 
            } else {
                stack.style.animation = ''; 
            }
        }

        function renderLocalShowcase(playerNum) {
            let buildData = getLocalBuildData();
            applyShowcaseUI(playerNum, buildData);
            return buildData;
        }

        function renderRemoteShowcase(playerNum, buildImages, spinDir, buildName) {
            let buildData = { ...buildImages, spinDir: spinDir, name: buildName || "OPPONENT BUILD" };
            applyShowcaseUI(playerNum, buildData);
        }

        let hasRolledIn = { 1: false, 2: false };
        function triggerRollIn(playerNum) {
            if (hasRolledIn[playerNum]) return;
            hasRolledIn[playerNum] = true;
            
            document.getElementById(`vs-p${playerNum}-showcase`).classList.add('active');
            
            setTimeout(() => {
                const wrapper = document.getElementById(`vs-p${playerNum}-bey-wrapper`);
                const stack = document.getElementById(`vs-p${playerNum}-bey-stack`);
                const spark = document.getElementById(`vs-p${playerNum}-spark`);
                
                wrapper.classList.add(playerNum === 1 ? 'roll-in-anim' : 'roll-in-anim-p2');
                
                wrapper.addEventListener('animationend', () => {
                    stack.style.animation = 'none'; 
                    spark.classList.add('spark-anim'); 
                }, { once: true });
            }, 1500);
        }

        window.cycleVsLoadout = async function() {
            if (window.ActiveMatch?.guestReady) return; 

            let saves = window.PlayerData?.saves || [];
            if (!saves.some(s => s && s.parts)) return;

            let startingIndex = window.PlayerData.featuredBuildIndex || 0;
            let activeSaveIndex = startingIndex;
            do {
                activeSaveIndex++;
                if (activeSaveIndex >= 10) activeSaveIndex = 0;
                if (activeSaveIndex === startingIndex) break; 
            } while (!saves[activeSaveIndex] || !saves[activeSaveIndex].parts);
            
            window.PlayerData.featuredBuildIndex = activeSaveIndex;
            window.ActiveBey = saves[activeSaveIndex]; 
            
            let playerNum = window.ActiveMatch?.role === 'GUEST' ? 2 : 1;
            let buildData = renderLocalShowcase(playerNum);
            
            document.getElementById(`vs-p${playerNum}-bey-stack`).style.animation = 'none'; 
            const spark = document.getElementById(`vs-p${playerNum}-spark`);
            spark.classList.remove('spark-anim');
            void spark.offsetWidth; 
            spark.classList.add('spark-anim');

            if (window.CurrentUser && window.CurrentUser.uid) {
                updateDoc(doc(db, "users", window.CurrentUser.uid), { featuredBuildIndex: activeSaveIndex }).catch(e => e);
            }

            if (currentRoomRef) {
                let updatePayload = window.ActiveMatch?.role === 'GUEST' 
                    ? { guestBuildImages: { bb: buildData.bb, sg: buildData.sg, wd: buildData.wd, ar: buildData.ar, bc: buildData.bc }, guestSpin: buildData.spinDir }
                    : { hostBuildImages: { bb: buildData.bb, sg: buildData.sg, wd: buildData.wd, ar: buildData.ar, bc: buildData.bc }, hostSpin: buildData.spinDir };
                await update(currentRoomRef, updatePayload);
            }
        };

        // --- WEBRTC PREP - INTERCEPTING START ---
        window.startMatch = async function() {
            if (currentRoomRef) await update(currentRoomRef, { status: "ESTABLISHING_LINK" });
        };

        window.toggleReady = async function() {
            if (!currentRoomRef) return;
            let isReady = !window.ActiveMatch.guestReady;
            window.ActiveMatch.guestReady = isReady; 

            let btn = document.getElementById('vs-ready-btn');
            btn.innerText = isReady ? "CANCEL READY" : "READY";
            btn.style.background = isReady ? "rgba(255,170,0,0.5)" : "rgba(0,0,0,0.7)";
            
            let cycleBtn = document.getElementById('vs-p2-cycle-btn');
            cycleBtn.style.opacity = isReady ? '0.3' : '1';
            cycleBtn.style.pointerEvents = isReady ? 'none' : 'auto';
            
            let leaveBtn = document.getElementById('vs-leave-btn');
            leaveBtn.style.opacity = isReady ? '0.4' : '1';
            leaveBtn.style.pointerEvents = isReady ? 'none' : 'auto';

            await update(currentRoomRef, { guestReady: isReady });
        };


        // --- ASYNC NAVIGATION & CLEANUP ---
        window.leaveLobby = async function() {
            if (window.ActiveMatch?.role === 'GUEST') {
                await window.leaveGuestLobby();
            } else {
                await window.cancelLobby(); 
            }
            window.navigateTo('home-menu.html');
        };

        window.leaveGuestLobby = async function() {
            const roomToLeave = currentRoomRef;
            const disconnectRef = guestDisconnectRef;

            window.cancelLobby(); 
            
            if (roomToLeave) {
                try {
                    if (disconnectRef) { onDisconnect(disconnectRef).cancel().catch(e=>e); }
                    await update(roomToLeave, { 
                        guestUid: null, guestName: null, guestBuildImages: null, guestSpin: null, guestReady: null 
                    });
                } catch(e) { console.error("Error leaving room:", e); }
            }
        };

        window.cancelLobby = async function() {
            if (roomListenerUnsubscribe) { roomListenerUnsubscribe(); roomListenerUnsubscribe = null; }
            if (guestDisconnectRef) { onDisconnect(guestDisconnectRef).cancel().catch(e=>e); guestDisconnectRef = null; }
            
            const roomToDestroy = currentRoomRef;
            const isHost = window.ActiveMatch?.role === 'HOST';

            isVsActive = false; window.ActiveMatch = null; currentRoomRef = null;
            if (countdownInterval) clearInterval(countdownInterval);
            
            document.getElementById('vs-arena').classList.remove('active');
            
            hasRolledIn = { 1: false, 2: false };
            [1, 2].forEach(p => {
                document.getElementById(`vs-p${p}-showcase`).classList.remove('active');
                document.getElementById(`vs-p${p}-bey-wrapper`).classList.remove(p === 1 ? 'roll-in-anim' : 'roll-in-anim-p2');
                document.getElementById(`vs-p${p}-spark`).classList.remove('spark-anim');
            });
            
            ['vs-close-btn', 'vs-start-btn', 'vs-ready-btn', 'vs-leave-btn'].forEach(id => {
                let el = document.getElementById(id);
                el.style.display = 'none'; el.style.opacity = '1'; el.style.pointerEvents = 'auto';
            });

            document.getElementById('vs-p2-name').innerText = 'SEARCHING...';
            document.querySelector('.p2-nameplate').style.opacity = '0.5';
            document.getElementById('p2-ready').style.opacity = '0';
            
            let readyBtn = document.getElementById('vs-ready-btn');
            readyBtn.innerText = "READY"; readyBtn.style.background = "rgba(0,0,0,0.7)";
            
            let cycleBtn = document.getElementById('vs-p2-cycle-btn');
            cycleBtn.style.opacity = '1'; cycleBtn.style.pointerEvents = 'auto';

            document.getElementById('host-panel').classList.remove('slide-left');
            document.getElementById('join-panel').classList.remove('slide-right');
            document.getElementById('vs-waiting-text').innerText = "CONNECTING LOBBY...";

            if (isHost && roomToDestroy) { 
                try { await remove(roomToDestroy); } 
                catch(e) { console.error("Failed to delete room:", e); }
            }
        };

        window.togglePasscodeField = function() {
            const isPrivate = document.getElementById('host-private-toggle').checked;
            document.getElementById('passcode-container').style.display = isPrivate ? 'flex' : 'none';
            if (isPrivate) { document.getElementById('host-passcode').value = ''; document.getElementById('host-passcode').focus(); } 
        };

        // --- ROOM NETWORKING ---
        function attachRoomListener(roomId) {
            if (roomListenerUnsubscribe) roomListenerUnsubscribe(); 
            
            roomListenerUnsubscribe = onValue(currentRoomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    if (window.ActiveMatch?.role === 'GUEST') { alert("The host closed the room."); window.leaveLobby(); }
                    return;
                }

                if (data.status === "ESTABLISHING_LINK") {
                    if (countdownInterval) clearInterval(countdownInterval);
                    document.getElementById('vs-waiting-text').innerText = "ESTABLISHING PEER CONNECTION...";
                    ['vs-close-btn', 'vs-start-btn', 'vs-ready-btn', 'vs-leave-btn'].forEach(id => {
                        document.getElementById(id).style.display = 'none';
                    });
                    console.log("READY FOR WEBRTC STUN/TURN HANDSHAKE!");
                    
                    // --- FIRE UP THE WEBRTC MANAGER! ---
                    rtcManager.initConnection(roomId, window.ActiveMatch.role);
                    
                    return; 
                } 

                document.getElementById('vs-p1-name').innerText = data.hostName;
                if (data.guestName) {
                    document.getElementById('vs-p2-name').innerText = data.guestName;
                    document.querySelector('.p2-nameplate').style.opacity = '1';
                    document.getElementById('vs-waiting-text').innerText = data.guestReady ? "CHALLENGER READY!" : "CHALLENGER JOINED!";
                } else {
                    document.getElementById('vs-p2-name').innerText = "SEARCHING...";
                    document.querySelector('.p2-nameplate').style.opacity = '0.5';
                    document.getElementById('vs-waiting-text').innerText = "WAITING FOR CHALLENGER...";
                }

                document.getElementById('p2-ready').style.opacity = data.guestReady ? '1' : '0';

                // Sync Host UI
                if (window.ActiveMatch?.role === 'HOST') {
                    if (data.guestUid) {
                        renderRemoteShowcase(2, data.guestBuildImages, data.guestSpin, data.guestName);
                        triggerRollIn(2);
                        
                        document.getElementById('vs-close-btn').style.display = 'block'; 
                        document.getElementById('vs-start-btn').style.display = data.guestReady ? 'block' : 'none';
                    } else {
                        document.getElementById('vs-p2-showcase').classList.remove('active');
                        document.getElementById('vs-p2-bey-wrapper').classList.remove('roll-in-anim-p2');
                        document.getElementById('vs-p2-spark').classList.remove('spark-anim');
                        hasRolledIn[2] = false;
                        
                        document.getElementById('vs-close-btn').style.display = 'block';
                        document.getElementById('vs-start-btn').style.display = 'none';
                    }
                } 
                // Sync Guest UI
                else if (window.ActiveMatch?.role === 'GUEST') {
                    renderRemoteShowcase(1, data.hostBuildImages, data.hostSpin, data.hostName);
                    triggerRollIn(1);
                    triggerRollIn(2);
                }
            });
        }

        window.initializeHost = async function() {
            if (currentRoomRef) return; 

            const roomName = document.getElementById('host-room-name').value;
            const stadium = document.getElementById('host-stadium').value;
            const isLocked = document.getElementById('host-private-toggle').checked;
            const passcode = document.getElementById('host-passcode').value;

            if (isLocked && passcode.length !== 4) { alert("Please enter a valid 4-digit passcode for your private room."); return; }

            window.ActiveMatch = { role: 'HOST', guestReady: false };
            let buildData = renderLocalShowcase(1);

            const roomsRef = ref(rtdb, 'rooms');
            currentRoomRef = push(roomsRef); 
            const roomId = currentRoomRef.key;

            const lobbySettings = {
                hostUid: playerUid, hostName: playerName, hostGlow: 'host-glow-red', 
                hostBuildImages: { bb: buildData.bb, sg: buildData.sg, wd: buildData.wd, ar: buildData.ar, bc: buildData.bc },
                hostSpin: buildData.spinDir, guestUid: null, guestName: null, guestReady: false,
                settings: { roomName, stadiumId: stadium, isLocked, passcode: isLocked ? passcode : null },
                status: "WAITING_FOR_CHALLENGER"
            };

            try {
                await set(currentRoomRef, lobbySettings);
                onDisconnect(currentRoomRef).remove();

                document.getElementById('host-panel').classList.add('slide-left');
                document.getElementById('join-panel').classList.add('slide-right');
                
                document.getElementById('vs-arena').classList.add('active');
                document.getElementById('vs-p1-cycle-btn').style.display = 'block';
                document.getElementById('vs-p2-cycle-btn').style.display = 'none';
                
                isVsActive = true;
                startParticleSystem();
                triggerRollIn(1);

                const vsCloseBtn = document.getElementById('vs-close-btn');
                vsCloseBtn.style.display = 'block';
                vsCloseBtn.style.opacity = '0.4'; 
                vsCloseBtn.style.pointerEvents = 'none'; 
                let countdown = 3;
                vsCloseBtn.innerText = `CLOSE ROOM (${countdown})`;
                
                countdownInterval = setInterval(() => {
                    countdown--;
                    if (countdown > 0) { vsCloseBtn.innerText = `CLOSE ROOM (${countdown})`; } 
                    else {
                        clearInterval(countdownInterval);
                        vsCloseBtn.innerText = `CLOSE ROOM`; vsCloseBtn.style.opacity = '1'; vsCloseBtn.style.pointerEvents = 'auto'; 
                    }
                }, 1000);

                attachRoomListener(roomId); 
            } catch (error) { console.error("Failed to host room:", error); currentRoomRef = null; }
        };

        window.promptJoin = async function(roomId, isLocked) {
            if (currentRoomRef) { alert("You cannot join a room while you are hosting one! Please close your room first."); return; }
            const specificRoomRef = ref(rtdb, `rooms/${roomId}`);
            
            try {
                const snapshot = await get(specificRoomRef);
                if (!snapshot.exists()) { alert("This room no longer exists."); return; }
                const roomData = snapshot.val();
                
                if (isLocked) {
                    const code = prompt("This room is locked. Enter the 4-digit passcode:");
                    if (code === null) return; 
                    if (code !== roomData.settings.passcode) { alert("Incorrect passcode!"); return; }
                }
                if (roomData.guestUid) { alert("Room is already full!"); return; }

                window.ActiveMatch = { roomId: roomId, role: 'GUEST', guestReady: false };
                let buildData = renderLocalShowcase(2);

                await update(specificRoomRef, { 
                    guestUid: playerUid, guestName: playerName, guestReady: false, guestSpin: buildData.spinDir,
                    guestBuildImages: { bb: buildData.bb, sg: buildData.sg, wd: buildData.wd, ar: buildData.ar, bc: buildData.bc }
                });
                
                currentRoomRef = specificRoomRef;
                guestDisconnectRef = ref(rtdb, `rooms/${roomId}/guestUid`);
                onDisconnect(guestDisconnectRef).set(null); 

                document.getElementById('host-panel').classList.add('slide-left');
                document.getElementById('join-panel').classList.add('slide-right');
                
                document.getElementById('vs-arena').classList.add('active');
                document.getElementById('vs-p1-cycle-btn').style.display = 'none';
                document.getElementById('vs-p2-cycle-btn').style.display = 'block';
                
                document.getElementById('vs-ready-btn').style.display = 'block';
                document.getElementById('vs-leave-btn').style.display = 'block';
                
                isVsActive = true;
                startParticleSystem();
                attachRoomListener(roomId); 

            } catch (error) { console.error("Failed to join room:", error); }
        };

        const divisions = 17;
        function spawnParticle() {
            if (!isVsActive) return; 
            const vsArena = document.getElementById('vs-arena');
            const particle = document.createElement('div');
            const core = document.createElement('div'); core.classList.add('particle-core'); particle.appendChild(core);
            
            const isHorizontal = Math.random() < 0.5;
            const redState = { backgroundColor: '#ff4d4d', boxShadow: '0 0 25px 8px #ff4d4d' };
            const purpleState = { backgroundColor: '#d633ff', boxShadow: '0 0 30px 10px #d633ff' };
            const blueState = { backgroundColor: '#4d88ff', boxShadow: '0 0 25px 8px #4d88ff' };
            const speed = 800 + Math.random() * 700; 

            if (isHorizontal) {
                particle.classList.add('particle', 'particle-h');
                particle.style.height = '4px'; particle.style.width = '600px'; 
                particle.style.marginLeft = '-300px'; particle.style.marginTop = '-2px'; 
                particle.style.top = `${(Math.floor(Math.random() * (divisions - 2)) + 1) * (window.innerHeight / divisions)}px`;
                const isLeftToRight = Math.random() < 0.5;
                const startX = isLeftToRight ? -400 : window.innerWidth + 400; const endX = isLeftToRight ? window.innerWidth + 400 : -400;

                particle.animate(isLeftToRight ? [
                    { left: `${startX}px`, opacity: 0, ...redState }, { left: `${window.innerWidth/2}px`, offset: 0.5, ...purpleState }, { left: `${endX}px`, opacity: 0, ...blueState }
                ] : [
                    { left: `${startX}px`, opacity: 0, ...blueState }, { left: `${window.innerWidth/2}px`, offset: 0.5, ...purpleState }, { left: `${endX}px`, opacity: 0, ...redState }
                ], { duration: speed, easing: 'linear' }).onfinish = () => particle.remove();
            } else {
                particle.classList.add('particle', 'particle-v');
                particle.style.width = '4px'; particle.style.height = '600px';
                particle.style.marginTop = '-300px'; particle.style.marginLeft = '-2px'; 
                const startX = (Math.floor(Math.random() * (divisions - 2)) + 1) * (window.innerWidth / divisions);
                particle.style.left = `${startX}px`;
                let staticState = startX < (window.innerWidth / 2) - 10 ? redState : (startX > (window.innerWidth / 2) + 10 ? blueState : purpleState);
                const isTopToBottom = Math.random() < 0.5;
                const startY = isTopToBottom ? -400 : window.innerHeight + 400; const endY = isTopToBottom ? window.innerHeight + 400 : -400;

                particle.animate([ { top: `${startY}px`, opacity: 0, ...staticState }, { top: `${endY}px`, opacity: 0, ...staticState } ], { duration: speed, easing: 'linear' }).onfinish = () => particle.remove();
            }
            vsArena.appendChild(particle);
        }

        function startParticleSystem() {
            if (!isVsActive) return; spawnParticle(); setTimeout(startParticleSystem, 400 + (Math.random() * 1000));
        }

        // --- PUBLIC LOBBY LIST (SAFE STRING CONCATENATION) ---
        function startRoomListener() {
            window.refreshRoomList = startRoomListener; // Keep reference for the button
            const activeRoomsContainer = document.getElementById('active-rooms-container');
            
            onValue(ref(rtdb, 'rooms'), (snapshot) => {
                activeRoomsContainer.innerHTML = ''; 
                const rooms = snapshot.val();
                if (!rooms) { activeRoomsContainer.innerHTML = '<div style="text-align: center; color: #667; font-size: 14px; font-style: italic; margin-top: 20px;">No active rooms found. Be the first to host!</div>'; return; }

                Object.keys(rooms).forEach(roomId => {
                    const room = rooms[roomId];
                    if (room.status === "WAITING_FOR_CHALLENGER") {
                        const isFull = !!room.guestUid;
                        const statusClass = isFull ? "status-locked" : (room.settings.isLocked ? "status-locked" : "status-open");
                        const statusText = isFull ? "2/2 FULL" : (room.settings.isLocked ? "🔒 LOCKED" : "1/2 OPEN");
                        const cardDisabled = isFull ? 'disabled' : '';
                        
                        const imgs = room.hostBuildImages || {};
                        const fallbackIcon = !imgs.ar ? '<img src="./images/menu_icons/AR_icon.png" class="lobby-bey-part" style="opacity: 0.5;">' : '';

                        // THE FIX: Safely construct the click string without nested backticks!
                        const clickHandler = isFull ? "" : "promptJoin('" + roomId + "', " + room.settings.isLocked + ")";
                        const hostNameDisplay = "<span class='host-glow-red'>" + room.hostName + "</span>";
                        const vsDisplay = isFull ? " <span style='color:#889;'>vs</span> <span class='host-glow-blue'>" + room.guestName + "</span>" : "";

                        activeRoomsContainer.innerHTML += `
                            <div class="room-card ${cardDisabled}" onclick="${clickHandler}">
                                <div class="room-left-section">
                                    <div class="lobby-bey-stack ${room.hostSpin === 'Left' ? 'bey-spin-left' : 'bey-spin-right'}">
                                        ${imgs.bb ? `<img src="${imgs.bb}" class="lobby-bey-part" style="z-index: 1;">` : ''}
                                        ${imgs.sg ? `<img src="${imgs.sg}" class="lobby-bey-part" style="z-index: 2;">` : ''}
                                        ${imgs.wd ? `<img src="${imgs.wd}" class="lobby-bey-part" style="z-index: 3;">` : ''}
                                        ${imgs.ar ? `<img src="${imgs.ar}" class="lobby-bey-part" style="z-index: 4;">` : ''}
                                        ${imgs.bc ? `<img src="${imgs.bc}" class="lobby-bey-part" style="z-index: 5;">` : ''}
                                        ${fallbackIcon}
                                    </div>
                                    <div class="room-info">
                                        <span class="room-name">${room.settings.roomName} <span class="player-count">${isFull ? '2/2' : '1/2'} Players</span></span>
                                        <span class="room-host">Host: ${hostNameDisplay}${vsDisplay}</span>
                                    </div>
                                </div>
                                <div class="room-status ${statusClass}">${statusText}</div>
                            </div>
                        `;
                    }
                });
            });
        }
        startRoomListener(); 
    </script>
